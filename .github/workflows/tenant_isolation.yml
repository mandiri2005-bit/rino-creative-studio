# =============================================================================
#  .github/workflows/tenant_isolation.yml
#
#  Phase 1 CI: tenant-isolation tests, then full E2E.
#
#  Job graph:
#    isolation  →  e2e          (e2e runs only if isolation passes: `needs: isolation`)
#
#  Both jobs boot the Docker Compose stack, wait for health, and run their bash
#  suite against http://localhost:8080 (nginx). Secrets come from repo settings.
#
#  Required repository secrets:
#    CLERK_SECRET_KEY, CLERK_PUBLISHABLE_KEY, CLERK_WEBHOOK_SECRET, CLERK_JWT_ISSUER
#    DATABASE_URL, DATABASE_POOL_URL, DATABASE_POOL_URL_DEV   (Neon)
#    DATABASE_URL_DEV                                         (psql conn for tests)
#    GEMINI_API_KEY, LAOZHANG_API_KEY                         (+ optional others)
# =============================================================================
name: Phase 1 — Tenant Isolation & E2E

on:
  # Auto-run dimatikan (Rino: "email annoying"). Job ini boot Docker Compose + Neon +
  # banyak repo-secret CI yang belum di-wire (DB sudah pindah ke Neon Singapore) → gagal
  # tiap push = spam email. Manual-only sampai secret/DB CI dibenerin (Run workflow).
  workflow_dispatch: {}

# Avoid piling up runs on the same ref
concurrency:
  group: phase1-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: http://localhost:8080

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  #  Job 1 — Tenant isolation (T01–T08)
  # ───────────────────────────────────────────────────────────────────────────
  isolation:
    name: Tenant Isolation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLERK_SECRET_KEY:       ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY:  ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_WEBHOOK_SECRET:   ${{ secrets.CLERK_WEBHOOK_SECRET }}
      CLERK_JWT_ISSUER:       ${{ secrets.CLERK_JWT_ISSUER }}
      DATABASE_URL:           ${{ secrets.DATABASE_URL }}
      DATABASE_POOL_URL:      ${{ secrets.DATABASE_POOL_URL }}
      DATABASE_POOL_URL_DEV:  ${{ secrets.DATABASE_POOL_URL_DEV }}
      DATABASE_URL_DEV:       ${{ secrets.DATABASE_URL_DEV }}
      GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
      LAOZHANG_API_KEY:       ${{ secrets.LAOZHANG_API_KEY }}
      NODE_ENV:               development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Build & start stack
        run: |
          docker compose up -d --build
          echo "Waiting for /api/health…"
          for i in $(seq 1 40); do
            if curl -sf --max-time 3 "${BASE_URL}/api/health" >/dev/null; then
              echo "Stack healthy after ${i} tries"; exit 0
            fi
            sleep 3
          done
          echo "::error::Stack did not become healthy in time"
          docker compose ps
          docker compose logs --tail=120
          exit 1

      - name: Run tenant isolation suite
        run: bash tests/integration/test_tenant_isolation.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  #  Job 2 — E2E Phase 1 (E01–E15) — runs only if isolation passed
  # ───────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Phase 1 Tests
    runs-on: ubuntu-latest
    needs: isolation          # ← gate: e2e starts only after isolation succeeds
    timeout-minutes: 30
    env:
      CLERK_SECRET_KEY:       ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_PUBLISHABLE_KEY:  ${{ secrets.CLERK_PUBLISHABLE_KEY }}
      CLERK_WEBHOOK_SECRET:   ${{ secrets.CLERK_WEBHOOK_SECRET }}
      CLERK_JWT_ISSUER:       ${{ secrets.CLERK_JWT_ISSUER }}
      DATABASE_URL:           ${{ secrets.DATABASE_URL }}
      DATABASE_POOL_URL:      ${{ secrets.DATABASE_POOL_URL }}
      DATABASE_POOL_URL_DEV:  ${{ secrets.DATABASE_POOL_URL_DEV }}
      DATABASE_URL_DEV:       ${{ secrets.DATABASE_URL_DEV }}
      GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
      LAOZHANG_API_KEY:       ${{ secrets.LAOZHANG_API_KEY }}
      NODE_ENV:               development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Build & start stack
        run: |
          docker compose up -d --build
          echo "Waiting for /api/health…"
          for i in $(seq 1 40); do
            if curl -sf --max-time 3 "${BASE_URL}/api/health" >/dev/null; then
              echo "Stack healthy after ${i} tries"; exit 0
            fi
            sleep 3
          done
          echo "::error::Stack did not become healthy in time"
          docker compose ps
          docker compose logs --tail=120
          exit 1

      - name: Run E2E Phase 1 suite
        # E06/E08 restart containers via `docker compose restart`, which works
        # because the stack runs on this same runner. Tests that need psql use
        # DATABASE_URL_DEV; MCP test (E14) self-skips unless the mcp profile is up.
        run: bash tests/integration/test_e2e_phase1.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v
