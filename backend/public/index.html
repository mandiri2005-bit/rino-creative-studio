const VO_OPTIMIZE_SYSTEM=`You are a Senior Documentary VO Script Editor with 20 years experience at PBS Frontline, BBC, and Netflix Documentary Division. You specialize in converting brilliant written prose into narration that BREATHES - text designed to be spoken aloud, heard once, and felt immediately.

YOUR TASK: Optimize this narasi for audio/VO delivery.
Do NOT change facts, arguments, or the intellectual core.
Change ONLY how it sounds when spoken aloud by a narrator.

=======================================================================
STEP 0 - IDENTIFY ANCHOR LINES FIRST (before touching anything)
=======================================================================

Before optimizing, read the entire manuscript and identify ANCHOR lines —
the emotional pillars of the narasi.

TARGET: exactly 4 ANCHOR lines per chapter.
For chapters under 500 words, 3 is acceptable.
For chapters over 1000 words, 5 is the ceiling.

Criteria for ANCHOR lines:
- Short (under 12 words)
- Standalone quotable - could be screenshotted out of context
- Reversal or paradox structure
- Emotionally irreversible - cannot be unsaid

Mark each ANCHOR line with [ANCHOR] in the output.
These lines must appear VERBATIM - do not change a single word.
Everything around them can breathe. They cannot.

=======================================================================
THE CORE PROBLEM YOU ARE FIXING: "RELENTLESSLY PROFOUND"
=======================================================================

A common failure of brilliant writers: every sentence sounds monumental.
When everything is profound, nothing is.
The listener's brain fatigues. Hierarchy disappears. Impact flattens.

THE SOLUTION - three types of sentences must be woven between strong ones:

TYPE 1 - PLAIN SENTENCE
  Simple declarative. No metaphor. No compression. Just fact.
  Purpose: reset the listener's ear. Give the brain a rest.

TYPE 2 - BREATHING SENTENCE
  One observation. Present tense or slow rhythm. Atmospheric.
  Purpose: create pause without silence. Let the previous big idea land.

TYPE 3 - OBSERVATIONAL SENTENCE
  Concrete, sensory, non-interpretive. What you SEE or HEAR, not what it MEANS.
  Purpose: give the listener an image to hold while absorbing the idea before it.

RATIO TARGET: for every 2-3 profound/aphoristic sentences,
insert at least 1 plain/breathing/observational sentence.

=======================================================================
AUDIO DENSITY RULES
=======================================================================

RULE 1 - ONE IDEA PER BREATH:
  A VO narrator takes one breath per 15-20 words.
  Any clause longer than 25 words must be broken into separate sentences.

RULE 2 - PRESERVE REGISTER - CRITICAL:
  Breaking a long sentence into shorter ones must NOT lower the register.
  Indonesian documentary narration operates at formal/literary level.
  Do NOT simplify vocabulary. Do NOT make it conversational.
  The goal is shorter BREATH UNITS, not simpler LANGUAGE.
  WRONG: "Ibu petani Hemudu? Dua tahun sudah cukup." (conversational, informal)
  RIGHT: "Ibu petani Hemudu menyapih di usia dua tahun." (formal, same weight)

RULE 3 - APHORISM SPACING:
  Never place two aphoristic/quote-worthy sentences in the same paragraph.
  If you find two, keep the stronger one (or the ANCHOR line).
  Convert the weaker to a plain or breathing sentence.
  Max ONE aphoristic sentence per paragraph.

RULE 4 - CLAUSE COMPRESSION LIMIT:
  Maximum 2 subordinate clauses per sentence in VO script.
  Written prose allows 4-5. VO allows 2.
  Break the rest into separate sentences at the same formal register.

RULE 5 - RHYTHM VARIATION:
  Vary sentence length deliberately: LONG > SHORT > LONG > SHORT > VERY SHORT.
  The very short sentence (3-7 words) is the detonator. Place it after setup.

RULE 6 - SILENT BEAT MARKERS:
  After every major revelation or emotional peak, add a [BEAT] marker.
  [BEAT] tells the director: pause here, cut to visual, let it land.
  The sentence before [BEAT] must be short - the landing strip, not the runway.

RULE 7 - PROPER NOUN AND TECHNICAL TERM GLOSS - CRITICAL:
  A documentary viewer cannot pause and google. They hear the word once.
  For EVERY proper noun or technical term without prior explanation,
  add an inline micro-gloss of 2-5 words immediately after.

  WRONG: "situs Hemudu, delta Sungai Yangtze"
  RIGHT: "situs Hemudu - desa kuno di delta Sungai Yangtze"

  WRONG: "haplogroup Q dan P"
  RIGHT: "penanda genetik yang disebut haplogroup Q dan P"

  WRONG: "leksikostatistik"
  RIGHT: "metode perbandingan kosakata yang disebut leksikostatistik"

  WRONG: "nekara tipe Heger I"
  RIGHT: "nekara perunggu bergaya Heger I - klasifikasi yang dibuat para arkeolog"

  Rule: if a first-time listener would think "what is that?" - gloss it.
  The gloss must be natural, not parenthetical. Weave it into the sentence.

  FOR PERSON NAMES specifically:
  - First mention: [Name], [role/field in 2-4 words].
    Example: "Robert Blust, linguis dari Universitas Hawaii"
    Example: "Ambra Calo, arkeolog yang meneliti distribusi nekara"
  - Do NOT include nationality unless it is directly relevant to the argument.
  - Do NOT use "seorang ... bernama" — state name + role directly.
  - Subsequent mentions in the same chapter: last name only, no re-gloss.
  - If the same person appears in a later chapter: re-gloss briefly on first mention
    in that chapter ("Bellwood, arkeolog Austronesia yang sudah disebut sebelumnya"
    is too heavy — just "Bellwood" is fine if they appeared in the previous chapter).

RULE 8 - CHAPTER CLOSING:
  The final paragraph and final [ANCHOR] of each chapter are the most important
  real estate in the script. Two constraints:

  a) NO ECHO CLOSING: The final [ANCHOR] must be a DIFFERENT sentence from the
     paragraph immediately before it — never an echo, restatement, or semantic
     variation of the preceding line. If the paragraph says "ketiadaan," the anchor
     cannot say "ketiadaan" again in different words.
     WRONG: "Yang mereka tinggalkan adalah jejak negatif..." → [ANCHOR] "Yang mereka tinggalkan adalah ketiadaan."
     RIGHT: "Yang mereka tinggalkan adalah ketiadaan..." → [ANCHOR] "Dan kemunculan tembikar bermotif serupa, ratusan tahun kemudian, di gua-gua Filipina utara."

  b) FORWARD MOMENTUM: The closing anchor should either introduce a new image,
     a temporal shift, or a consequence — something that opens a door to the next
     chapter rather than summarizing this one. The listener should feel pulled
     forward, not settled.

RULE 9 - ADDED SENTENCES:
  You may — and should — add TYPE 1/2/3 sentences for rhythm and breathing room.
  But observe strict limits on what you may invent:

  ALLOWED additions:
  - Observational/atmospheric sentences ("Kayu membusuk. Air asin menghancurkan.")
  - Epistemic reframes of stances already present in the text
    ("Kita bekerja dengan bayangan, bukan potret.")
  - Structural transitions ("Tiga kondisi memungkinkan ini terjadi.")
  - Summaries of what was just said, in plainer language

  FORBIDDEN additions:
  - New factual claims not present in or directly inferable from the source
    ("tanaman pangan tertua di Asia Timur" — unless the source says so)
  - New dates, statistics, or attributions
  - New scholarly interpretations or arguments
  - New proper nouns or place names

  When in doubt: reframe what is there, do not introduce what is not.

=======================================================================
SPECIFIC ATTENTION - AUTO-DETECT HIGH DENSITY
=======================================================================

Before processing each bab, mentally count the ratio of aphoristic sentences
to total sentences. Apply these interventions based on density:

HIGH DENSITY (aphoristic ratio > 40%):
- Reduce aphoristic density by converting ~30% of weaker aphorisms
  to plain or breathing sentences.
- Add 2-3 observational sentences before abstract passages.
- Break up any paragraph where compression exceeds VO listener capacity.

SENSORY-FIRST OPENINGS:
- If a bab opens with a concrete sensory image (sound, texture, physical scene),
  protect it — these are already VO-ready. Do not add explanation before them.

STRONG CLOSINGS:
- If a bab ends with a two-line closing that has paradox or reversal structure,
  treat both lines as ANCHOR candidates and protect them.

DATA-DENSE PASSAGES (statistics, distributions, geographic lists):
- Break with a breathing sentence every 2-3 data points.
- Rhetorical questions work well for VO in these sections — keep or add them.

=======================================================================
OUTPUT FORMAT
=======================================================================

Output the complete optimized narasi:
1. [ANCHOR] markers on the protected verbatim lines
2. [BEAT] markers where director should pause or cut to visual
3. Preserve ## Bab headers and markdown structure
4. After each ## Bab header, one line: "// VO Note: [what changed in this bab]"
   List specific interventions: which terms were glossed, which sentences were
   broken, which breathing sentences were added, which anchor lines were protected.
5. Output is the script only - no checklists, no analysis, no preamble

FINAL TEST before outputting each bab:
- Read each paragraph aloud. Run out of breath? Break it.
- Three consecutive profound sentences? One must become plain.
- Unfamiliar proper noun with no gloss? Add micro-gloss.
- Two aphorisms in one paragraph? One must go or become plain.
- Register dropped to conversational? Restore formal tone.
- Final anchor echoes the paragraph before it? Rewrite the anchor.
- Added a sentence with new facts? Remove it.
- Anchor count for this bab: is it 3-5? Adjust if not.`;

    for(const line of lines){
      const h2=line.match(/^##\s+(.+)/);
      if(h2){
        if(cur!==null&&curKey!==null)map[curKey]=cur.join("\n").trim();
        const title=h2[1].trim();
        const nm=title.match(/Bab\s+(\d+)/i);
        curKey=nm?parseInt(nm[1]):title;
        cur=[];
      } else if(cur!==null){cur.push(line);}
    }
    if(cur!==null&&curKey!==null)map[curKey]=cur.join("\n").trim();
    return map;
  },[fileContent]);

  const getBabKey=title=>{const m=(title||"").match(/Bab\s+(\d+)/i);return m?parseInt(m[1]):title;};

  const [originals,setOriginals]=useState({});

    if(!reviewBabs.length)return;

      const next={...prev};
      reviewBabs.forEach(sec=>{
        if(!next[sec.title]){
          const txt=fileBabs[getBabKey(sec.title)]||"";
          if(txt)next[sec.title]=txt;
        }
      });
      return next;
    });
  },[reviewBabs,fileBabs]);

  const getRecText=sec=>sec.lines.join("\n").trim();
  const hasNoIssues=sec=>getRecText(sec).toLowerCase().includes("tidak ada kelemahan signifikan");

  const fixBab=async(sec)=>{
    const orig=(originals[sec.title]||"").trim();

    setResults(r=>({...r,[sec.title]:""}));
    try{
      const sys=`You are a master narrative writer enforcing the Harari/Diamond Big History style guide. Rewrite the given chapter section implementing ALL editor recommendations exactly. Rules: preserve original voice, style, and approximate length; implement every recommendation; do NOT add new facts; output ONLY the rewritten text without explanation or preamble.`;
      const userMsg=`REKOMENDASI EDITOR UNTUK BAB INI:\n${getRecText(sec)}\n\nTEKS ASLI BAB:\n${orig}\n\nTulis ulang mengimplementasikan SEMUA rekomendasi. Output hanya teks yang sudah diperbaiki.`;
      let full="";
      await streamCallFn(sys,userMsg,chunk=>{full+=chunk;setResults(r=>({...r,[sec.title]:full}));});
      setStatuses(s=>({...s,[sec.title]:"done"}));
    }catch(e){
      if(e.name!=="AbortError"){setStatuses(s=>({...s,[sec.title]:"error"}));showToast(e.message||"Fix gagal","err");}
    }
  };

  const fixAll=async()=>{
    for(const sec of reviewBabs){
      if(hasNoIssues(sec))continue;
      if((originals[sec.title]||"").trim()&&statuses[sec.title]!=="done"){
        await fixBab(sec);
      }
    }
  };

  const download=()=>{
    const parts=reviewBabs.map(s=>`## ${s.title}\n\n${results[s.title]||originals[s.title]||""}`).join("\n\n---\n\n");

  };

  if(!reviewBabs.length)return null;

  const fixableBabs=reviewBabs.filter(s=>!hasNoIssues(s));
  const doneCount=reviewBabs.filter(s=>statuses[s.title]==="done").length;
  const anyLoading=reviewBabs.some(s=>statuses[s.title]==="loading");
  const allDone=fixableBabs.length>0&&fixableBabs.every(s=>statuses[s.title]==="done");

  return(

      <div style={{borderTop:"1px solid var(--br)",paddingTop:20,marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:15,display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          ⚡ Auto-Fix per Bab
          <span style={{fontSize:11,padding:"2px 8px",background:allDone?"var(--sus)":"var(--be2)",color:allDone?"var(--su)":"var(--td)",borderRadius:999,fontWeight:700}}>{doneCount}/{fixableBabs.length} selesai</span>
          {fixableBabs.length<reviewBabs.length&&<span style={{fontSize:11,color:"var(--td)"}}>{reviewBabs.length-fixableBabs.length} bab di-skip</span>}
        </div>
        <div style={{fontSize:12,color:"var(--td)",marginBottom:14}}>Teks asli otomatis diambil dari file yang diupload. Edit jika perlu, lalu fix per bab atau sekaligus.</div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn pri" style={{fontSize:12}} disabled={anyLoading||allDone} onClick={fixAll}>
            {anyLoading?<><span className="spin"/> Memproses...</>:"⚡ Fix Semua Bab Sekaligus"}
          </button>
          <button className="btn sec" style={{fontSize:12}} disabled={doneCount===0} onClick={download}>
            ⬇ Download Semua ({reviewBabs.length} bab — {doneCount} fixed + {reviewBabs.length-fixableBabs.length} asli)
          </button>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {reviewBabs.map((sec,si)=>{
          const status=statuses[sec.title]||"idle";
          const result=results[sec.title]||"";
          const st=getSectionStyle(sec.title);
          const hasOrig=!!(originals[sec.title]||"").trim();
          return(
            <div key={si} style={{border:"1px solid var(--br)",borderRadius:12,overflow:"hidden"}}>
              {/* Header */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"var(--be2)",borderBottom:"1px solid var(--br)"}}>
                <span style={{fontWeight:700,fontSize:13,color:st.accent}}>{st.icon} {sec.title}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {status==="done"&&<span style={{fontSize:11,color:"#4ade80",fontWeight:700}}>✅ Done</span>}
                  {status==="error"&&<span style={{fontSize:11,color:"#f87171",fontWeight:700}}>❌ Error</span>}
                  {status==="loading"&&<span className="spin" style={{width:14,height:14,display:"inline-block"}}/>}
                  {hasNoIssues(sec)?(
                    <span style={{fontSize:11,color:"#4ade80",fontWeight:600}}>✅ Tidak ada isu — skip</span>
                  ):(
                    <button className="btn pri" style={{fontSize:11,padding:"4px 12px"}}
                      disabled={status==="loading"||!hasOrig}
                      onClick={()=>fixBab(sec)}>
                      {status==="done"?"🔄 Re-fix":"Fix Bab Ini"}
                    </button>
                  )}
                </div>
              </div>

              {/* 2-col body */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",minHeight:180}}>
                {/* Left: recommendations */}
                <div style={{padding:"12px 16px",borderRight:"1px solid var(--br)",background:"var(--be)",overflowY:"auto",maxHeight:400}}>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--td)",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Rekomendasi Editor</div>
                  <div style={{fontSize:12,lineHeight:1.75}}>{renderSectionLines(sec.lines)}</div>
                </div>

                {/* Right: textarea or result */}
                <div style={{padding:"12px 16px",background:"var(--be)",display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--td)",textTransform:"uppercase",letterSpacing:"0.06em"}}>
                    {status==="done"||status==="loading"?"Hasil Fix":"Teks Asli"}
                    {!hasOrig&&status==="idle"&&<span style={{color:"#fb923c",marginLeft:6}}>⚠ belum ada teks</span>}
                  </div>
                  {status==="done"||status==="loading"?(
                    <div style={{fontSize:12,lineHeight:1.8,color:"var(--fg)",whiteSpace:"pre-wrap",flex:1,overflowY:"auto",maxHeight:360}}>
                      {result||<span style={{color:"var(--td)"}}>Memproses...</span>}
                    </div>
                  ):(
                    <textarea className="inp w" style={{fontSize:12,lineHeight:1.7,flex:1,minHeight:160,resize:"vertical"}}
                      value={originals[sec.title]||""}
                      onChange={e=>setOriginals(o=>({...o,[sec.title]:e.target.value}))}
                      placeholder="Teks asli bab ini (otomatis dari file yang diupload)..."/>
                  )}
                  {status==="done"&&(
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn sec" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>navigator.clipboard.writeText(result).then(()=>showToast("Copied","ok"))}>📋 Copy</button>
                      <button className="btn sec" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>setStatuses(s=>({...s,[sec.title]:"idle"}))}>✏️ Edit asli</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function _docName(s){return ((s||"narasi").slice(0,48).trim().replace(/\s+/g,"-").replace(/[^a-zA-Z0-9-]/g,"")||"narasi");}
function _docEsc(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function _docBlob(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);}
function _docHtml(md,title){
  const lines=(md||"").split("\n");
  let meta=""; const mi=lines.findIndex(l=>l.trim().startsWith(">"));
  if(mi!==-1){meta=lines[mi].replace(/^>\s?/,"").replace(/\*\*/g,"");lines.splice(mi,1);}
  const bodyMd=lines.join("\n").replace(/^\s*---+\s*$/m,"").trim();
  const inner=(typeof DOMPurify!=="undefined"&&typeof marked!=="undefined")?DOMPurify.sanitize(marked.parse(bodyMd)):_docEsc(bodyMd);
  const t=(title||"Narasi").trim();
  const today=new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
  return '<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+_docEsc(t)+'</title>'
    +'<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'
    +'<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">'
    +'<style>:root{--ink:#0b0a10;--paper:#f5f1e8;--accent:#c8341f;--mute:#6a6475;--line:rgba(11,10,16,.13)}'
    +'*{margin:0;padding:0;box-sizing:border-box}body{background:var(--paper);color:var(--ink);font-family:Inter,sans-serif;line-height:1.75;-webkit-font-smoothing:antialiased}'
    +'.wrap{max-width:760px;margin:0 auto;padding:0 28px}header{padding:64px 0 0;border-bottom:2.5px solid var(--ink)}'
    +'.eyebrow{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--mute)}'
    +'h1{font-family:Fraunces,serif;font-weight:900;font-size:clamp(32px,6vw,58px);line-height:1.02;letter-spacing:-.02em;margin:18px 0 14px}'
    +'.meta{font-family:"Spline Sans Mono",monospace;font-size:12px;color:var(--accent);padding-bottom:24px}main{padding:36px 0 10px}'
    +'main h2{font-family:Fraunces,serif;font-weight:600;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.01em;margin:40px 0 14px;line-height:1.15}'
    +'main h3{font-family:Fraunces,serif;font-weight:600;font-size:20px;margin:26px 0 10px}main p{font-size:16.5px;margin:0 0 16px;color:#26242c}'
    +'main blockquote{border-left:3px solid var(--accent);background:rgba(200,52,31,.05);padding:12px 18px;margin:18px 0;font-style:italic;color:#3a3320}'
    +'main strong{font-weight:600}main em{font-style:italic}main code{font-family:"Spline Sans Mono",monospace;font-size:.85em;background:rgba(22,35,63,.07);padding:1.5px 6px;border-radius:3px}'
    +'main hr{border:0;border-top:1px solid var(--line);margin:30px 0}main ul,main ol{margin:0 0 16px 22px}main li{margin-bottom:6px}'
    +'footer{border-top:1px solid var(--line);margin-top:48px;padding:26px 0 60px;text-align:center}footer .fm{font-family:Fraunces,serif;font-style:italic;font-size:16px}'
    +'footer .fn{font-family:"Spline Sans Mono",monospace;font-size:11px;color:var(--mute);letter-spacing:.08em;margin-top:8px}@media print{body{background:#fff}}</style></head><body><div class="wrap">'
    +'<header><div class="eyebrow">Rino Creative Studio · Narasi</div><h1>'+_docEsc(t)+'</h1>'+(meta?'<div class="meta">'+_docEsc(meta)+'</div>':'')+'</header>'
    +'<main>'+inner+'</main><footer><div class="fm">Rino Creative Studio</div><div class="fn">Dibuat '+_docEsc(today)+'</div></footer></div></body></html>';
}
function exportDoc(fmt,md,baseName,title,showToast){
  const name=_docName(baseName);
  if(fmt==="txt"){
    const txt=(md||"").replace(/^>\s?/gm,"").replace(/^#{1,6}\s+/gm,"").replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`([^`]+)`/g,"$1").replace(/\[(.+?)\]\((.*?)\)/g,"$1").replace(/^\s*---+\s*$/gm,"").replace(/\n{3,}/g,"\n\n").trim()+"\n";
    _docBlob(new Blob([txt],{type:"text/plain;charset=utf-8"}),name+".txt");
  }else if(fmt==="html"){
    _docBlob(new Blob([_docHtml(md,title)],{type:"text/html;charset=utf-8"}),name+".html");
  }else{
    const w=window.open("","_blank"); if(!w){showToast&&showToast("Popup diblokir — izinkan popup untuk simpan PDF","err");return;}
    w.document.write(_docHtml(md,title)); w.document.close(); setTimeout(()=>{try{w.focus();w.print();}catch(e){}},700);
  }
}
function NarasiReviewSection({settings,showToast}){

function NarasiSection({settings,showToast}){

    {value:"id",label:"🇮🇩 Bahasa Indonesia"},
    {value:"en",label:"🇺🇸 English"},
    {value:"jv",label:"🪯 Basa Jawa"},
    {value:"su",label:"🌄 Basa Sunda"},

    {value:"ban",label:"🛕 Basa Bali"},
    {value:"min",label:"🏔️ Baso Minangkabau"},
    {value:"ar",label:"🇸🇦 العربية"},
    {value:"zh",label:"🇨🇳 中文"},
    {value:"ja",label:"🇯🇵 日本語"},
    {value:"es",label:"🇪🇸 Español"},
    {value:"fr",label:"🇫🇷 Français"},
    {value:"nl",label:"🇳🇱 Nederlands"},
  ];
  const _langKnown=NARASI_LANGS.some(l=>l.value===language);
  const[langMode,setLangMode]=useState(_langKnown?language:"other");
  const[langCustom,setLangCustom]=useState(_langKnown?"":language);

  const[wordMax,setWordMax]=useState(()=>Number(localStorage.getItem("rc_nar_wmax")||4500));

  const[useRag,setUseRag]=useState(()=>localStorage.getItem("rc_nar_rag")==="true");
  const[outline,setOutline]=useState(()=>{try{return JSON.parse(localStorage.getItem("rc_nar_outline")||"null");}catch{return null;}});
  const[outlineText,setOutlineText]=useState(()=>localStorage.getItem("rc_nar_outline_text")||"");
  const[reviseInput,setReviseInput]=useState("");
  const[outlineBusy,setOutlineBusy]=useState(false);

  const abortRef=useRef(false);
  const jobIdRef=useRef(null);
  const[savedJobId,setSavedJobId]=useState(()=>localStorage.getItem("rc_nar_job_id")||null);
  const[pastJobs,setPastJobs]=useState([]);
  const[chapRatings,setChapRatings]=useState([]);
  const[ratingJobId,setRatingJobId]=useState(null);
  const[narasiRating,setNarasiRating]=useState(0);
  const[doneInfo,setDoneInfo]=useState(null);

  useEffect(()=>{
    localStorage.setItem("rc_nar_mode",apiMode);
    if(!freeModel&&apiMode==="google"&&!chatModel.startsWith("gemini")){
      setChatModel("gemini-2.5-flash");
    }
  },[apiMode]);

  // Also guard when style changes auto-switches model while on Google API
  useEffect(()=>{
    if(!freeModel&&apiMode==="google"&&!chatModel.startsWith("gemini")){
      setChatModel("gemini-2.5-flash");
    }
  },[chatModel,apiMode]);
  useEffect(()=>{if(!freeModel&&apiMode==="laozhang"){const styleModels=NARASI_STYLE_MODELS[style]||NARASI_STYLE_MODELS["storytelling"];const valid=styleModels.map(m=>m.value);if(!valid.includes(chatModel))setChatModel(styleModels[0].value);}},[style,apiMode]);
  useEffect(()=>{localStorage.setItem("rc_nar_model",chatModel);},[chatModel]);
  useEffect(()=>{localStorage.setItem("rc_nar_freemodel",freeModel);},[freeModel]);
  useEffect(()=>{localStorage.setItem("rc_nar_gkey",googleKey);},[googleKey]);
  useEffect(()=>{localStorage.setItem("rc_nar_topic",topic);},[topic]);
  useEffect(()=>{localStorage.setItem("rc_nar_style",style);},[style]);
  useEffect(()=>{localStorage.setItem("rc_nar_lang",language);},[language]);
  useEffect(()=>{localStorage.setItem("rc_nar_wmin",wordMin);},[wordMin]);
  useEffect(()=>{localStorage.setItem("rc_nar_wmax",wordMax);},[wordMax]);
  useEffect(()=>{localStorage.setItem("rc_nar_chaps",chapCount);},[chapCount]);
  useEffect(()=>{localStorage.setItem("rc_nar_video",videoMode);},[videoMode]);
  useEffect(()=>{localStorage.setItem("rc_nar_rag",useRag);},[useRag]);
  useEffect(()=>{try{localStorage.setItem("rc_nar_outline",JSON.stringify(outline));}catch{}},[outline]);
  useEffect(()=>{localStorage.setItem("rc_nar_outline_text",outlineText);},[outlineText]);
  useEffect(()=>{localStorage.setItem("rc_nar_result",narasi);},[narasi]);

  const tokenCalc=useMemo(()=>{
    if(!outline||!outline.length)return null;
    const heaviest=Math.max(...outline.map(c=>c.words||0));
    const tokensNeeded=Math.ceil(heaviest*WORDS_TO_TOKENS);
    const limit=MODEL_OUTPUT_LIMITS[chatModel]||4000;
    return{heaviest,tokensNeeded,limit,safe:tokensNeeded<=limit};
  },[outline,chatModel]);

  const splitHeavyChapters=(chapters,model)=>{
    const limit=MODEL_OUTPUT_LIMITS[model]||4000;
    const result=[];
    for(const c of chapters){
      const tokens=Math.ceil((c.words||0)*WORDS_TO_TOKENS);
      if(tokens>limit){
        const parts=Math.ceil(tokens/limit);
        const wordsEach=Math.ceil(c.words/parts);
        for(let i=0;i<parts;i++){
          const suffix=String.fromCharCode(97+i);
          result.push({...c,id:`${c.id}${suffix}`,title:`${c.title} (Bagian ${suffix.toUpperCase()})`,words:wordsEach});
        }
      }else{result.push(c);}
    }
    return result;
  };

  const dsRoute=settings?.deepseekRoute||"deepseek";
  const lzHdrs=()=>({"Content-Type":"application/json","X-DeepSeek-Route":dsRoute});
  const lzHdrsFresh=async()=>({"Content-Type":"application/json","X-DeepSeek-Route":dsRoute,...(await authHdrFresh())});
  const callAI=async(body)=>{
    const extra=apiMode==="google"&&googleKey.trim()?{google_api_key:googleKey.trim()}:{};
    return apiMode==="google"
      ?await api.narasiOutlineGoogle({...body,...extra})
      :await fetch("/api/narasi/outline",{method:"POST",headers:(await lzHdrsFresh()),body:JSON.stringify(body)}).then(r=>r.json());
  };
  const callGenerate=async(body)=>{
    const extra=apiMode==="google"&&googleKey.trim()?{google_api_key:googleKey.trim()}:{};
    return apiMode==="google"
      ?await api.narasiGenerateGoogle({...body,...extra})
      :await fetch("/api/narasi/generate",{method:"POST",headers:(await lzHdrsFresh()),body:JSON.stringify(body)}).then(r=>r.json());
  };

  const generateOutline=async(revise=false)=>{
    if(!topic.trim())return showToast("Masukkan judul/tema narasi","err");
    setOutlineBusy(true);
    try{
      const r=await callAI({action:"outline",model:chatModel,topic,style,language,
        word_min:wordMin,word_max:wordMax,chap_count:chapCount,video_mode:videoMode,
        ...(revise&&reviseInput.trim()&&{revise_instruction:reviseInput.trim(),current_outline:outlineText})});
      if(r.error)throw new Error(r.error);
      if(!r.chapters||!Array.isArray(r.chapters)||r.chapters.length===0)throw new Error("Outline kosong atau format tidak valid — coba lagi");
      setOutline(r.chapters);setOutlineText(r.outline_text||"");setReviseInput("");setStage("outline");
      showToast(`Outline: ${r.chapters.length} bab`,"ok");
    }catch(e){showToast(e.message,"err");}
    setOutlineBusy(false);
  };

  const cancelGenerate=async()=>{
    if(cancelling)return;
    setCancelling(true);
    abortRef.current=true;
    const jid=savedJobId||jobIdRef.current;
    if(jid){
      try{
        const r=await api.narasiCancel(jid);
        if(r&&r.ok===false) throw new Error(r.detail||r.error||"cancel ditolak");
        showToast("Cancel terkirim — bab berjalan selesai dulu","ok");
      }catch(e){
        showToast("Cancel GAGAL terkirim: "+(e.message||e)+" — refresh & coba lagi","err");
        setCancelling(false);
        return;
      }
    }else{
      showToast("Tidak ada job aktif untuk dibatalkan","err");
    }
    jobIdRef.current=null;
    localStorage.removeItem("rc_nar_job_id");setSavedJobId(null);
    setGenerating(false);
    setCancelling(false);
  };

  const loadPastJobs=async()=>{ try{ const r=await api.narasiJobs(); if(r&&r.ok) setPastJobs(r.jobs||[]); }catch{} };
  const loadChapterRatings=async(jid)=>{ if(!jid){setChapRatings([]);setRatingJobId(null);setNarasiRating(0);return;} try{ const r=await api.narasiChapters(jid); if(r&&r.ok){const chs=r.chapters||[];setChapRatings(chs);setRatingJobId(jid);setNarasiRating((chs[0]&&chs[0].rating)||0);} }catch{} };
  const rateNarasi=async(rating)=>{ if(!ratingJobId){showToast("Narasi belum siap dinilai","err");return;} setNarasiRating(rating); setChapRatings(p=>p.map(c=>({...c,rating}))); try{ const r=await api.narasiRateAll(ratingJobId,rating); if(!r||!r.ok) throw new Error((r&&r.error)||"gagal"); showToast(`Rating ${rating}★ tersimpan (${r.rated||"semua"} bab)`,"ok"); }catch(e){ showToast("Rating gagal: "+e.message,"err"); } };
  const requireRating=()=>{ if(!narasiRating){ showToast("⚠️ Beri rating narasi dulu sebelum mengunduh","err"); const el=document.getElementById("narasi-rating-card"); if(el)el.scrollIntoView({behavior:"smooth",block:"center"}); return false; } return true; };
  useEffect(()=>{ loadPastJobs(); },[]);
  useEffect(()=>{
    const unrated=!!(narasi&&!narasiRating);
    window.__rcsNarasiUnrated=unrated;
    const h=(e)=>{ if(unrated){e.preventDefault();e.returnValue="";} };
    window.addEventListener("beforeunload",h);
    return ()=>window.removeEventListener("beforeunload",h);
  },[narasi,narasiRating]);

  const recoverJob=async(jId)=>{
    if(!jId)return;
    setGenerating(true);
    try{
      const sr=await api.narasiStitch(jId,{topic,style,language});
      if(sr.error)throw new Error(sr.error);
      setNarasi(sr.markdown||"");setStage("result");loadChapterRatings(jId);
      localStorage.removeItem("rc_nar_job_id");setSavedJobId(null);
      const filename=`narasi-${topic.slice(0,40).replace(/\s+/g,"-").replace(/[^a-zA-Z0-9-]/g,"")}.md`;
      setDoneInfo({words:sr.total_words,errors:0,filename,markdown:sr.markdown||""});
      showToast(`✅ Recovered — ±${sr.total_words} kata`,"ok");
    }catch(e){ showToast("Recover failed: "+e.message,"err"); }
    setGenerating(false);
  };

  const approveAndGenerate=async()=>{
    if(!outline||!outline.length)return;
    abortRef.current=false;
    setGenerating(true);setNarasi("");setStage("result");

    // Step 1: narrative brief
    let brief="";
    try{
      const br=await callAI({action:"brief",model:chatModel,topic,style,language,outline:outlineText});
      if(!br.error)brief=br.brief||"";
    }catch{}

    // Step 2: auto-split heavy chapters
    const chapters=splitHeavyChapters(outline,chatModel);
    const prog={};chapters.forEach(c=>{prog[c.id]="pending";});setChapProgress({...prog});

    // Step 3: send all chapters to backend for SEQUENTIAL processing + temp file saving
    const extra=apiMode==="google"&&googleKey.trim()?{google_api_key:googleKey.trim()}:{};
    const preJobId=Math.random().toString(36).slice(2,10);
    jobIdRef.current=preJobId;
    localStorage.setItem("rc_nar_job_id",preJobId);setSavedJobId(preJobId);
    let jobId=null;
    let genErrors=[];
    try{
      setChapProgress(p=>{const n={...p};Object.keys(n).forEach(k=>n[k]="pending");return n;});
      const r=apiMode==="google"
        ?await api.narasiGenerateGoogle({...extra,model:chatModel,topic,style,language,chapters,brief,outline:outlineText,pre_job_id:preJobId,video_mode:videoMode,use_rag:useRag})
        :await api.narasiGenerateLz({model:chatModel,topic,style,language,chapters,brief,outline:outlineText,pre_job_id:preJobId,video_mode:videoMode,use_rag:useRag});
      if(r.error)throw new Error(r.error);
      jobId=r.job_id||preJobId;
      jobIdRef.current=jobId;
      savedJobId&&localStorage.setItem("rc_nar_job_id",jobId);

      const chapIds=chapters.map(c=>String(c.id));

      if(apiMode==="google"){
        // Google path (server.js) is BLOCKING: it only returns {ok:true,...}
        // AFTER every chapter is written. So there is nothing to poll — the
        // job is already complete. Mark all chapters done and proceed to stitch.
        // (Polling /narasi/status here would hang ~15 min because Google jobs
        //  are not tracked in the Python status store.)
        genErrors=r.errors||[];
        setChapProgress(p=>{
          const n={...p};
          chapIds.forEach(id=>{ n[id]="done"; });
          return n;
        });
      } else {
        // ── LaoZhang path: backend returns immediately, generation runs in
        //    background → poll status and light up per-chapter checkboxes. ──
        await new Promise((resolve)=>{
          let polls=0;
          const iv=setInterval(async()=>{
            polls++;
            if(abortRef.current){ clearInterval(iv); resolve(); return; }
            if(polls>450){ clearInterval(iv); resolve(); return; } // ~15 min safety
            let sd;
            try{ sd=await api.narasiStatus(jobId); }catch{ return; }
            // current = chapters completed so far → check those boxes
            const done=Math.max(0, Math.min(chapIds.length, sd.current||0));
            setChapProgress(p=>{
              const n={...p};
              chapIds.forEach((id,idx)=>{ if(idx<done) n[id]="done"; });
              return n;
            });
            if(sd.status==="done"||sd.status==="cancelled"||sd.status==="error"){
              clearInterval(iv);
              genErrors=(sd.result&&sd.result.errors)||[];
              if(sd.status==="cancelled") showToast("Narasi dibatalkan","ok");
              if(sd.status==="error") showToast("Narasi gagal: "+(sd.error||""),"err");
              resolve();
            }
          },2000);
        });
      }
      if(abortRef.current){ setGenerating(false); return; }
    }catch(e){
      setGenerating(false);setStage("outline");
      const isTimeout=e.message?.includes("504")||e.message?.includes("Gateway")||
        e.message?.includes("timeout")||e.message?.includes("Failed to fetch")||
        e.message?.includes("Load failed")||e.message?.includes("NetworkError");
      if(isTimeout){
        showToast(
          "⏳ Koneksi terputus — tapi generate MUNGKIN masih berjalan di background. "+
          "Tunggu beberapa menit, lalu klik Stitch & Recover.",
          "ok"
        );
      } else {
        showToast(e.message||"Generate failed","err");
      }
      return;
    }

    // Step 4: stitch temp files into final .md
    try{
      const sr=await api.narasiStitch(jobId,{topic,style,language});
      if(sr.error)throw new Error(sr.error);
      setNarasi(sr.markdown||"");
      loadChapterRatings(jobId);
      setGenerating(false);
      jobIdRef.current=null;
      localStorage.removeItem("rc_nar_job_id");setSavedJobId(null);
      const filename=`narasi-${topic.slice(0,40).replace(/\s+/g,"-").replace(/[^a-zA-Z0-9-]/g,"")}.md`;
      setDoneInfo({words:sr.total_words,errors:genErrors.length,filename,markdown:sr.markdown||""});
      const errMsg=genErrors.length?` (${genErrors.length} bab error)`:"";
      showToast(`✅ Selesai — ±${sr.total_words} kata${errMsg} — ${filename}`,"ok");
    }catch(e){
      setGenerating(false);
      showToast("Stitch failed: "+e.message,"err");
    }
  };

  const retryErrors=async()=>{
    const errorIds=Object.entries(chapProgress).filter(([,v])=>v==="error").map(([k])=>k);
    if(!errorIds.length)return;
    if(!outline||!outline.length)return showToast("Outline tidak ada — generate ulang","err");
    setGenerating(true);
    let brief="";
    try{const br=await callAI({action:"brief",model:chatModel,topic,style,language,outline:outlineText});if(!br.error)brief=br.brief||"";}catch{}
    const allChaps=splitHeavyChapters(outline,chatModel);
    const failedChaps=allChaps.filter(c=>errorIds.includes(String(c.id)));
    failedChaps.forEach(c=>setChapProgress(p=>({...p,[c.id]:"pending"})));
    const retried=await Promise.all(failedChaps.map(async(c)=>{
      try{
        const r=await callGenerate({action:"chapter",model:chatModel,topic,style,language,
          chapter:c,brief,outline:outlineText,word_target:c.words,
          word_min:Math.floor(c.words*0.9),word_max:Math.ceil(c.words*1.1)});
        if(r.error)throw new Error(r.error);
        setChapProgress(p=>({...p,[c.id]:"done"}));
        return{id:c.id,title:c.title,text:r.text||""};
      }catch(e){
        setChapProgress(p=>({...p,[c.id]:"error"}));
        return{id:c.id,title:c.title,text:`<!-- ERROR bab ${c.id}: ${e.message} -->`};
      }
    }));
    setNarasi(prev=>{
      let md=prev;
      retried.forEach(r=>{
        const re=new RegExp(`## Bab ${r.id}:[^\n]*\n\n[\s\S]*?(?=\n## Bab|$)`);
        const newSection=`## Bab ${r.id}: ${r.title}\n\n${r.text}\n`;
        md=md.replace(re,newSection);
      });
      return md;
    });
    setGenerating(false);
    const stillErr=Object.values(chapProgress).filter(v=>v==="error").length;
    showToast(stillErr?"Retry selesai — masih ada error":"Semua bab berhasil ✓",stillErr?"err":"ok");
  };

  const downloadMd=(content,name)=>{const b=new Blob([content],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);};
  // ── Export narasi: TXT (utf-8) · PDF (print→save) · polished editorial HTML ──
  const _esc=(s)=>String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
  const narasiName=()=>("narasi-"+((topic||"narasi").slice(0,40).trim().replace(/\s+/g,"-").replace(/[^a-zA-Z0-9-]/g,"")||"narasi"));
  const _dlBlob=(blob,name)=>{const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);};
  const downloadTxt=(md,suffix)=>{
    const txt=(md||"").replace(/^>\s?/gm,"").replace(/^#{1,6}\s+/gm,"")
      .replace(/\*\*(.+?)\*\*/g,"$1").replace(/\*(.+?)\*/g,"$1").replace(/`([^`]+)`/g,"$1")
      .replace(/\[(.+?)\]\((.*?)\)/g,"$1").replace(/^\s*---+\s*$/gm,"").replace(/\n{3,}/g,"\n\n").trim()+"\n";
    _dlBlob(new Blob([txt],{type:"text/plain;charset=utf-8"}),narasiName()+(suffix||"")+".txt");
  };
  const buildNarasiHtml=(md,titleArg)=>{
    const lines=(md||"").split("\n");
    let meta=""; const mi=lines.findIndex(l=>l.trim().startsWith(">"));
    if(mi!==-1){meta=lines[mi].replace(/^>\s?/,"").replace(/\*\*/g,"");lines.splice(mi,1);}
    const bodyMd=lines.join("\n").replace(/^\s*---+\s*$/m,"").trim();
    const inner=DOMPurify.sanitize(marked.parse(bodyMd));
    const title=(titleArg||topic||"Narasi").trim();
    const today=new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
    return '<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+_esc(title)+'</title>'
      +'<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>'
      +'<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">'
      +'<style>'
      +':root{--ink:#0b0a10;--paper:#f5f1e8;--accent:#c8341f;--mute:#6a6475;--line:rgba(11,10,16,.13)}'
      +'*{margin:0;padding:0;box-sizing:border-box}'
      +'body{background:var(--paper);color:var(--ink);font-family:Inter,sans-serif;line-height:1.75;-webkit-font-smoothing:antialiased}'
      +'.wrap{max-width:760px;margin:0 auto;padding:0 28px}'
      +'header{padding:64px 0 0;border-bottom:2.5px solid var(--ink)}'
      +'.eyebrow{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--mute)}'
      +'h1{font-family:Fraunces,serif;font-weight:900;font-size:clamp(32px,6vw,58px);line-height:1.02;letter-spacing:-.02em;margin:18px 0 14px}'
      +'.meta{font-family:"Spline Sans Mono",monospace;font-size:12px;color:var(--accent);padding-bottom:24px}'
      +'main{padding:36px 0 10px}'
      +'main h2{font-family:Fraunces,serif;font-weight:600;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.01em;margin:40px 0 14px;line-height:1.15}'
      +'main h3{font-family:Fraunces,serif;font-weight:600;font-size:20px;margin:26px 0 10px}'
      +'main p{font-size:16.5px;margin:0 0 16px;color:#26242c}'
      +'main blockquote{border-left:3px solid var(--accent);background:rgba(200,52,31,.05);padding:12px 18px;margin:18px 0;font-style:italic;color:#3a3320}'
      +'main strong{font-weight:600}main em{font-style:italic}'
      +'main code{font-family:"Spline Sans Mono",monospace;font-size:.85em;background:rgba(22,35,63,.07);padding:1.5px 6px;border-radius:3px}'
      +'main hr{border:0;border-top:1px solid var(--line);margin:30px 0}'
      +'main ul,main ol{margin:0 0 16px 22px}main li{margin-bottom:6px}'
      +'footer{border-top:1px solid var(--line);margin-top:48px;padding:26px 0 60px;text-align:center}'
      +'footer .fm{font-family:Fraunces,serif;font-style:italic;font-size:16px}'
      +'footer .fn{font-family:"Spline Sans Mono",monospace;font-size:11px;color:var(--mute);letter-spacing:.08em;margin-top:8px}'
      +'@media print{body{background:#fff}}'
      +'</style></head><body><div class="wrap">'
      +'<header><div class="eyebrow">Rino Creative Studio · Narasi</div><h1>'+_esc(title)+'</h1>'+(meta?'<div class="meta">'+_esc(meta)+'</div>':'')+'</header>'
      +'<main>'+inner+'</main>'
      +'<footer><div class="fm">Rino Creative Studio</div><div class="fn">Dibuat '+_esc(today)+'</div></footer>'
      +'</div></body></html>';
  };
  const downloadHtml=(md,suffix,titleArg)=>{_dlBlob(new Blob([buildNarasiHtml(md,titleArg)],{type:"text/html;charset=utf-8"}),narasiName()+(suffix||"")+".html");};
  const downloadPdf=(md,titleArg)=>{const w=window.open("","_blank");if(!w){showToast("Popup diblokir — izinkan popup untuk simpan PDF","err");return;}w.document.write(buildNarasiHtml(md,titleArg));w.document.close();setTimeout(()=>{try{w.focus();w.print();}catch(e){}},700);};
  const reset=()=>{setStage("input");setOutline(null);setOutlineText("");setNarasi("");setChapProgress({});setChapRatings([]);setRatingJobId(null);localStorage.removeItem("rc_nar_outline");localStorage.removeItem("rc_nar_outline_text");localStorage.removeItem("rc_nar_result");};

  const lzStyleModels=NARASI_STYLE_MODELS[style]||NARASI_STYLE_MODELS["storytelling"];
  // freeModel ON → expose the FULL model catalog (all providers/tiers), grouped.
  // freeModel OFF → keep the curated, style-aware top-10 (LaoZhang) / Gemini set.
  const freeModelGroups=CHAT_MODEL_TIERS;   // [{tier, models:[{value,label}]}]
  const models=apiMode==="google"?[
    {value:"gemini-2.5-flash",       label:"Gemini 2.5 Flash"},
    {value:"gemini-2.5-pro",         label:"Gemini 2.5 Pro"},
    {value:"gemini-3-flash-preview", label:"Gemini 3 Flash $0.5/$3"},
    {value:"gemini-3.1-flash-lite",  label:"Gemini 3.1 Flash Lite $0.25/$1.5"},
    {value:"gemini-3.5-flash",       label:"Gemini 3.5 Flash $1.5/$9"},
    {value:"gemini-3.1-pro-preview", label:"Gemini 3.1 Pro $2/$12 - $4/$18"},
  ]:lzStyleModels;

  const chapDoneCount=Object.values(chapProgress).filter(v=>v==="done").length;
  const chapTotal=Object.keys(chapProgress).length;
  const googleKeySlot=<input className="inp mono" type="password" placeholder="Gemini key (blank = server .env)" value={googleKey} onChange={e=>setGoogleKey(e.target.value)} style={{width:180,padding:"5px 9px",fontSize:11.5}}/>;

  return <div>
    <ApiToggle value={apiMode} onChange={setApiMode} keySlot={googleKeySlot}/>

    {pastJobs.length>0&&(
      <div className="card" style={{marginBottom:14,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontSize:13,fontWeight:700}}>📂 Buka job lama</span>
        <select className="inp" style={{flex:1,minWidth:200,maxWidth:520}} value="" onChange={e=>{const v=e.target.value;if(v)recoverJob(v);}}>
          <option value="">— pilih job tersimpan ({pastJobs.length}) —</option>
          {pastJobs.map(j=><option key={j.external_job_id} value={j.external_job_id}>{(j.topic||"(tanpa judul)").slice(0,60)} · {j.chapters||0} bab · {new Date(j.created_at).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"})}</option>)}
        </select>
        <button className="btn sec" style={{padding:"5px 10px",fontSize:12}} onClick={loadPastJobs} title="Refresh daftar">🔄</button>
      </div>
    )}

    {/* Config */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><div className="lbl">{ic.chat} AI Model</div>
          <select className="inp" value={chatModel} onChange={e=>setChatModel(e.target.value)}>
            {freeModel
              ? freeModelGroups.map(t=><optgroup key={t.tier} label={t.tier}>{t.models.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}</optgroup>)
              : models.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
          <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,fontSize:11.5,cursor:"pointer",color:"var(--td)"}}>
            <input type="checkbox" checked={freeModel} onChange={e=>setFreeModel(e.target.checked)} style={{cursor:"pointer"}}/>
            🔓 Pilih model bebas (semua model, tanpa auto-switch per gaya)
          </label>
          {!freeModel&&apiMode==="laozhang"&&<p className="hint" style={{marginTop:4}}>✦ Top 10 model untuk gaya <strong>{NARASI_STYLES.find(s=>s.value===style)?.label||style}</strong> — sorted best first</p>}
          {freeModel&&<p className="hint" style={{marginTop:4}}>🔓 Semua model tersedia. Pilihanmu tidak akan diganti otomatis saat ganti gaya.</p>}
        </div>
        <div><div className="lbl">🌐 Bahasa output</div>
          <select className="inp" value={langMode}
            onChange={e=>{const v=e.target.value;setLangMode(v);
              if(v==="other"){setLanguage((langCustom||"").trim()||"id");}
              else{setLanguage(v);}}}>
            {NARASI_LANGS.map(l=><option key={l.value} value={l.value}>{l.label}</option>)}
            <option value="other">✏️ Lainnya (ketik bahasa…)</option>
          </select>
          {langMode==="other"&&
            <input className="inp" style={{marginTop:6}} value={langCustom}
              placeholder="cth: Basa Jawa Krama, Bahasa Bugis, Português…"
              onChange={e=>{setLangCustom(e.target.value);setLanguage(e.target.value.trim()||"id");}}/>}
          <p className="hint" style={{marginTop:4}}>Output: <strong>{language||"id"}</strong></p>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:12}}>
        <div><div className="lbl">📖 Gaya narasi</div>
          <select className="inp" value={style} onChange={e=>setStyle(e.target.value)}>
            {NARASI_STYLES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}
          </select>
        </div>
        <div><div className="lbl">🎬 Format output</div>
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <button className={"btn"+(videoMode?"":" sec")} style={{flex:1,padding:"7px 0",fontSize:12,opacity:videoMode?1:0.7}} title="Harari style + VO delivery rules — tulis untuk telinga, gunakan [ANCHOR] & [BEAT]" onClick={()=>setVideoMode(true)}>🎬 Video Script</button>
            <button className={"btn"+(videoMode?" sec":"")} style={{flex:1,padding:"7px 0",fontSize:12,opacity:videoMode?0.7:1}} title="Harari style saja — prosa tertulis, tanpa VO markers" onClick={()=>setVideoMode(false)}>📖 Teks / Buku</button>
          </div>
          <div style={{marginTop:6,fontSize:10.5,lineHeight:1.4,padding:"5px 8px",borderRadius:7,
            background:videoMode?"var(--as2)":"var(--be2)",
            border:"1px solid "+(videoMode?"color-mix(in srgb,var(--ac2) 25%,transparent)":"var(--brs)"),
            color:videoMode?"var(--ac2)":"var(--tf)"}}>
            {videoMode
              ? <><strong>Harari + VO</strong> — tulis untuk telinga. Output: [ANCHOR] & [BEAT] markers, kalimat ≤25 kata, gloss istilah teknis.</>
              : <><strong>Harari only</strong> — prosa tertulis. Output: narasi standar tanpa VO markers.</>}
          </div>
        </div>
          <div><div className="lbl">🔍 Gutenberg RAG</div>
          <div style={{display:"flex",gap:6,marginTop:4}}>
            <button className={"btn"+(useRag?"":" sec")} style={{flex:1,padding:"7px 0",fontSize:12,opacity:useRag?1:0.7}} onClick={()=>setUseRag(true)}>📚 RAG On</button>
            <button className={"btn"+(useRag?" sec":"")} style={{flex:1,padding:"7px 0",fontSize:12,opacity:useRag?0.7:1}} onClick={()=>setUseRag(false)}>✏️ RAG Off</button>
          </div>
          <div style={{marginTop:6,fontSize:10.5,lineHeight:1.4,padding:"5px 8px",borderRadius:7,
            background:useRag?"var(--as2)":"var(--be2)",
            border:"1px solid "+(useRag?"color-mix(in srgb,var(--ac2) 25%,transparent)":"var(--brs)"),
            color:useRag?"var(--ac2)":"var(--tf)"}}>
            {useRag
              ? <><strong>RAG aktif</strong> — narasi diperkaya referensi 500k teks Gutenberg.</>
              : <><strong>RAG nonaktif</strong> — generate standar tanpa referensi.</>}
          </div>
        </div>
        <div><div className="lbl">📝 Min kata</div><input type="number" className="inp" min={500} max={50000} step={100} value={wordMin} onChange={e=>setWordMin(Number(e.target.value))}/></div>
        <div><div className="lbl">📝 Max kata</div><input type="number" className="inp" min={500} max={50000} step={100} value={wordMax} onChange={e=>setWordMax(Number(e.target.value))}/></div>
        <div><div className="lbl">📑 Jumlah bab</div><input type="number" className="inp" min={1} max={30} value={chapCount} onChange={e=>setChapCount(Math.min(30,Math.max(1,Number(e.target.value)||1)))}/></div>
      </div>
      <div className="lbl">{ic.flow} Judul / Tema narasi</div>
      <textarea className="inp ta" rows={3} value={topic} placeholder={"Contoh: Sejarah Amerika pra-revolusi\nAtau: Perjalanan manusia dari Afrika ke seluruh dunia"} onChange={e=>setTopic(e.target.value)}/>
      <button className="btn pri w lg" style={{marginTop:12}} disabled={outlineBusy||!topic.trim()} onClick={()=>generateOutline(false)}>
        {outlineBusy&&stage==="input"?<><span className="spin"/> Membuat outline…</>:<>📋 Generate Outline</>}
      </button>
    </div>

    {/* Outline stage */}
    {outline&&stage==="outline"&&<div>
      {tokenCalc&&<div style={{background:tokenCalc.safe?"var(--sus)":"var(--was)",border:"1px solid "+(tokenCalc.safe?"color-mix(in srgb,var(--su) 30%,transparent)":"color-mix(in srgb,var(--wa) 30%,transparent)"),borderRadius:9,padding:"10px 14px",marginBottom:12,fontSize:12,display:"flex",gap:16,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{color:tokenCalc.safe?"var(--su)":"var(--wa)",fontWeight:700}}>{tokenCalc.safe?"✓ Token aman":"⚠ Perlu split"}</span>
        <span style={{color:"var(--td)"}}>Bab terberat: <strong style={{color:"var(--t)"}}>{tokenCalc.heaviest} kata</strong></span>
        <span style={{color:"var(--td)"}}>~{tokenCalc.tokensNeeded} token</span>
        <span style={{color:"var(--td)"}}>Limit {chatModel}: {(MODEL_OUTPUT_LIMITS[chatModel]||4000).toLocaleString()} token</span>
        {!tokenCalc.safe&&<span style={{color:"var(--wa)"}}>Bab berat otomatis dipecah (3a, 3b…) saat generate</span>}
      </div>}
      {savedJobId&&!generating&&(
        <div className="card" style={{marginBottom:10,padding:"10px 14px",border:"1px solid var(--ok)",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:13}}>🔄 Job tersisa: <code style={{fontSize:11}}>{savedJobId}</code></span>
          <button className="btn sec" style={{padding:"4px 10px",fontSize:12,color:"var(--ok)",borderColor:"var(--ok)"}} onClick={()=>recoverJob(savedJobId)}>Stitch &amp; Recover</button>
          <button className="btn sec" style={{padding:"4px 10px",fontSize:12}} onClick={()=>{localStorage.removeItem("rc_nar_job_id");setSavedJobId(null);}}>Abaikan</button>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
        <span style={{fontSize:13,fontWeight:700}}>{outline.length} bab</span>
        <span style={{fontSize:12,color:"var(--td)"}}>Estimasi total: {outline.reduce((s,c)=>s+(c.words||0),0)} kata</span>
        <div style={{flex:1}}/>
        <span style={{fontSize:11.5,color:"var(--td)",marginRight:1}}>{ic.dload} Outline:</span>
        <button className="btn sec" style={{padding:"5px 11px",fontSize:11.5}} onClick={()=>downloadTxt(outlineText,"-outline")} title="Teks polos UTF-8">TXT</button>
        <button className="btn sec" style={{padding:"5px 11px",fontSize:11.5}} onClick={()=>downloadPdf(outlineText,(topic||"Narasi")+" — Outline")} title="PDF — dialog cetak → Simpan sebagai PDF">PDF</button>
        <button className="btn sec" style={{padding:"5px 11px",fontSize:11.5}} onClick={()=>downloadHtml(outlineText,"-outline",(topic||"Narasi")+" — Outline")} title="HTML berstyle editorial">HTML</button>
        <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={reset}>{ic.trash} Reset</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
        {outline.map((c,i)=>(
          <div key={c.id||i} style={{background:"var(--be2)",border:"1px solid var(--br)",borderRadius:9,padding:"10px 14px",display:"flex",gap:12,alignItems:"flex-start"}}>
            <span style={{fontFamily:"var(--fm)",fontSize:11,fontWeight:700,background:"var(--as)",color:"var(--ac)",borderRadius:5,padding:"2px 8px",whiteSpace:"nowrap",marginTop:2}}>Bab {c.id}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--t)"}}>{c.title}</div>
              {c.description&&<div style={{fontSize:11.5,color:"var(--td)",marginTop:3,lineHeight:1.5}}>{c.description}</div>}
            </div>
            <div style={{textAlign:"right",whiteSpace:"nowrap",flexShrink:0}}>
              <div style={{fontSize:13,fontWeight:700,color:"var(--ac)"}}>{c.words} kata</div>
              <div style={{fontSize:10,color:"var(--td)"}}>~{Math.ceil((c.words||0)*WORDS_TO_TOKENS)} tok</div>
            </div>
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:12}}>
        <div className="lbl">📝 Edit outline langsung</div>
        <textarea className="inp ta mono" rows={10} value={outlineText} onChange={e=>setOutlineText(e.target.value)} style={{fontSize:12,lineHeight:1.6}}/>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div className="lbl">🔄 Instruksi revisi ke AI</div>
        <textarea className="inp ta" rows={3} value={reviseInput} onChange={e=>setReviseInput(e.target.value)} placeholder={"Contoh:\n- Tambahkan bab tentang dampak ekonomi\n- Gabungkan bab 3 dan 4, jadikan lebih dramatis\n- Kurangi bab intro, fokus ke bagian inti"}/>
        <button className="btn sec" style={{marginTop:8,padding:"7px 14px",fontSize:12}} disabled={outlineBusy||!reviseInput.trim()} onClick={()=>generateOutline(true)}>
          {outlineBusy?<><span className="spin"/> Merevisi…</>:"🔄 Revise Outline"}
        </button>
      </div>
      <button className="btn pri w lg" disabled={generating} onClick={approveAndGenerate}>✅ Approve &amp; Generate Narasi</button>
    </div>}

    {/* Result stage */}
    {stage==="result"&&<div>
      {generating&&<div className="card" style={{marginBottom:14}}>
        <div className="lbl">⚡ Generating narasi — sequential per bab</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginTop:8}}>
          <span className="spin" style={{width:18,height:18,flexShrink:0}}/>
          <span style={{fontSize:12.5,color:"var(--td)",flex:1}}>
            AI sedang menulis bab satu per satu dan menyimpan ke temp files…<br/>
            <span style={{fontSize:11,color:"var(--tf)"}}>Proses ini bisa memakan waktu beberapa menit tergantung jumlah bab dan model.</span>
          </span>
          <button className="btn sec" style={{padding:"6px 12px",fontSize:12,whiteSpace:"nowrap",flexShrink:0}} disabled={cancelling} onClick={cancelGenerate}>{cancelling?"⏳ Membatalkan…":"⏹ Cancel"}</button>
        </div>
        {outline&&outline.length>0&&
          <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:6}}>
            {outline.map((c,i)=>{
              const st=chapProgress[c.id];
              const done=st==="done", err=st==="error";
              return (
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,fontSize:12.5,
                     padding:"6px 10px",borderRadius:8,
                     background:done?"rgba(34,197,94,0.08)":err?"rgba(239,68,68,0.08)":"var(--bg2)"}}>
                  <span style={{width:18,height:18,flexShrink:0,display:"inline-flex",alignItems:"center",justifyContent:"center",
                       borderRadius:4,border:"1.5px solid "+(done?"var(--ok)":err?"var(--da)":"var(--bd)"),
                       background:done?"var(--ok)":"transparent",color:"#fff",fontSize:12,fontWeight:700}}>
                    {done?"✓":err?"!":""}
                  </span>
                  <span style={{fontWeight:600,color:"var(--tf)",flexShrink:0}}>Bab {c.id}</span>
                  <span style={{color:"var(--td)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.title}</span>
                  {!done&&!err&&<span className="spin" style={{width:13,height:13,marginLeft:"auto",flexShrink:0,opacity:0.5}}/>}
                </div>
              );
            })}
          </div>
        }
      </div>}
      {narasi&&<>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <span style={{fontSize:13,fontWeight:700}}>±{narasi.split(/\s+/).filter(Boolean).length} kata</span>
          <div style={{flex:1}}/>
          <span style={{fontSize:11.5,color:"var(--td)",marginRight:1}}>{ic.dload} Unduh:</span>
          <button className="btn sec" style={{padding:"5px 11px",fontSize:11.5}} onClick={()=>{if(requireRating())downloadTxt(narasi);}} title="Teks polos UTF-8">TXT</button>
          <button className="btn sec" style={{padding:"5px 11px",fontSize:11.5}} onClick={()=>{if(requireRating())downloadPdf(narasi);}} title="PDF — buka dialog cetak, pilih Simpan sebagai PDF">PDF</button>
          <button className="btn sec" style={{padding:"5px 11px",fontSize:11.5}} onClick={()=>{if(requireRating())downloadHtml(narasi);}} title="HTML berstyle editorial">HTML</button>
          <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={()=>setStage("outline")}>← Outline</button>
          {Object.values(chapProgress).some(v=>v==="error")&&<button className="btn sec" style={{padding:"5px 12px",fontSize:11.5,borderColor:"var(--da)",color:"var(--da)"}} disabled={generating} onClick={retryErrors}>🔄 Retry errors</button>}
          <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={reset}>{ic.trash} Reset</button>
        </div>
        <div className="card">
          <div className="lbl">📄 Narasi final — edit langsung</div>
          <textarea className="inp ta mono" rows={32} value={narasi} onChange={e=>setNarasi(e.target.value)} style={{fontSize:12.5,lineHeight:1.8}}/>
        </div>
        {chapRatings.length>0&&(
          <div id="narasi-rating-card" className="card" style={{marginTop:14,border:"1px solid "+(narasiRating?"var(--brs)":"var(--wa)")}}>
            <div className="lbl">⭐ Beri rating narasi <span style={{fontWeight:400,color:"var(--tf)"}}>— wajib sebelum unduh · berlaku untuk semua {chapRatings.length} bab (≥4★ = approved)</span></div>
            <div style={{display:"flex",alignItems:"center",gap:14,padding:"4px 0"}}>
              <div style={{display:"flex",gap:4}}>
                {[1,2,3,4,5].map(n=>(
                  <span key={n} onClick={()=>rateNarasi(n)} title={n+" bintang"} style={{cursor:"pointer",fontSize:30,lineHeight:1,color:narasiRating>=n?"#f5b301":"var(--br)"}}>★</span>
                ))}
              </div>
              {narasiRating?(<span style={{fontSize:13,color:narasiRating>=4?"var(--su)":"var(--td)"}}>{narasiRating}★{narasiRating>=4?" · approved ✓":""}</span>):(<span style={{fontSize:12.5,color:"var(--wa)",fontWeight:600}}>belum dinilai — klik bintang</span>)}
            </div>
          </div>
        )}
      </>}
    </div>}
  </div>;
}
const PAGE_TITLES={chat:"Chat",image:"Image Generation",veo:"Veo · AI Video",sora:"Sora · AI Video",whisk:"Whisk · Image Remixing",flow:"Flow Storyboard",batch:"Batch Images",tts:"Text to Speech",imagen:"Imagen",mcp:"MCP File Search",scripttts:"Script → TTS",narasi:"Narasi AI",narasireview:"Narasi Review"};
const PAGE_ICONS={chat:ic.chat,image:ic.image,veo:ic.video,sora:ic.sora,whisk:ic.whisk,flow:ic.flow,batch:ic.batch,tts:ic.mic,imagen:ic.img2,mcp:ic.folder,scripttts:ic.mic,narasi:ic.lay};


/* ── ClerkUserButton — header user pill with dropdown ────────────────── */
function ClerkUserButton(){
  const[user,setUser]=React.useState(null);
  const[menuOpen,setMenuOpen]=React.useState(false);
  const menuRef=React.useRef(null);

  React.useEffect(()=>{
    // Poll for auth state from auth.js
    const sync=()=>{
      const u=window.__clerkAuth?.currentUser;
      setUser(u||null);
    };
    sync();
    window.addEventListener("clerk:userchange",sync);
    const iv=setInterval(sync,2000);
    return()=>{window.removeEventListener("clerk:userchange",sync);clearInterval(iv);};
  },[]);

  React.useEffect(()=>{
    if(!menuOpen)return;
    const handler=(e)=>{if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[menuOpen]);

  if(!user)return(
    <button className="btn sec" style={{padding:"6px 14px",fontSize:12,gap:6}}
      onClick={()=>window.__clerkAuth?.openSignIn()}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Sign in
    </button>
  );

  const initials=(user.firstName?.[0]||user.emailAddresses?.[0]?.emailAddress?.[0]||"?").toUpperCase();
  const email=user.emailAddresses?.[0]?.emailAddress||"";
  const name=user.firstName?[user.firstName,user.lastName].filter(Boolean).join(" "):email;

  return(
    <div ref={menuRef} style={{position:"relative"}}>
      <button className="clerk-user-btn" onClick={()=>setMenuOpen(o=>!o)}>
        {user.imageUrl
          ?<img src={user.imageUrl} alt="avatar"/>
          :<div className="avatar-fallback">{initials}</div>}
        <span style={{maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div className={"clerk-user-menu"+(menuOpen?" open":"")}>
        <div className="clerk-user-menu-info">
          <div className="name">{name}</div>
          <div className="email">{email}</div>
        </div>
        <button onClick={()=>{setMenuOpen(false);(function(){try{var keep={rc_theme:1};var del=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf("rc_")===0&&!keep[k])del.push(k);}del.forEach(function(k){localStorage.removeItem(k);});}catch(e){}})();window.__clerkAuth?.signOut();}
          } className="signout">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </div>
  );
}

  const[hasKey,setHasKey]=useState(true);

  const[deepseekRoute,setDeepseekRoute]=useState(()=>localStorage.getItem("rc_ds_route")||"deepseek")
  const[imageKey,setImageKey]=useState(()=>localStorage.getItem("rc_imgkey")||"");
  const[veoKey,setVeoKey]=useState(()=>localStorage.getItem("rc_veokey")||"");
  const[soraKey,setSoraKey]=useState(()=>localStorage.getItem("rc_sorakey")||"");

  useEffect(()=>{localStorage.setItem("rc_theme",theme);},[theme]);
  useEffect(()=>{localStorage.setItem("rc_settings",JSON.stringify(settings));},[settings]);
  useEffect(()=>{localStorage.setItem("rc_lzkey",laozhangKey);},[laozhangKey])
  useEffect(()=>{localStorage.setItem("rc_ds_route",deepseekRoute);},[deepseekRoute])
  useEffect(()=>{localStorage.setItem("rc_imgkey",imageKey);},[imageKey]);
  useEffect(()=>{localStorage.setItem("rc_veokey",veoKey);},[veoKey]);
  useEffect(()=>{localStorage.setItem("rc_sorakey",soraKey);},[soraKey]);
  useEffect(()=>{api.health().then(h=>setHasKey(!!h.gemini)).catch(()=>{});},[]);

  const showToast=(msg,k="ok")=>{setToast({msg,k});setTimeout(()=>setToast(null),2800);};

  const sectionSettings={...settings,batchModelId:settings.batchModelId||"gemini-3-pro-image-preview",batchAspect:settings.batchAspect||"16:9",batchSize:settings.batchSize||"1K",laozhangKey,setLaozhangKey,imageKey,setImageKey,veoKey,setVeoKey,soraKey,setSoraKey,setPage,deepseekRoute,setDeepseekRoute};

  const navGroups=[...new Set(NAV.map(n=>n.group))];

  const renderPage=()=>(
    <>
      <div style={{display:page==="chat"   ?"flex":"none",flexDirection:"column",flex:1,overflow:"hidden",minHeight:0}}><ChatSection   settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="image"  ?""    :"none"}}><ImageSection  settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="veo"    ?""    :"none"}}><VeoSection    settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="sora"   ?""    :"none"}}><SoraSection   settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="whisk"  ?""    :"none"}}><WhiskSection  settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="flow"   ?""    :"none"}}><FlowSection   settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="batch"  ?""    :"none"}}><BatchSection  settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="tts"    ?""    :"none"}}><TtsSection    settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="imagen" ?""    :"none"}}><ImagenSection settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="mcp"    ?""    :"none"}}><McpSection    showToast={showToast}/></div>
      <div style={{display:page==="scripttts"?""  :"none"}}><ScriptTtsSection settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="narasi"  ?""  :"none"}}><NarasiSection    settings={sectionSettings} showToast={showToast}/></div>
      <div style={{display:page==="narasireview"?"":"none"}}><NarasiReviewSection settings={sectionSettings} showToast={showToast}/></div>
    </>
  );

  const isFullHeight=page==="chat";

  return <div className={"app "+theme}>
    {/* SIDEBAR */}
    <div className={"sb "+(collapsed?"collapsed":"")}>
      <div className="sb-brand">
        <div className="sb-logo">RC</div>
        {!collapsed&&<div className="sb-title">Rino Creative<span>Studio</span></div>}
      </div>
      <div className="sb-nav">
        {navGroups.map(group=><div className="nav-group" key={group}>
          {!collapsed&&<div className="nav-label">{group}</div>}
          {NAV.filter(n=>n.group===group).map(n=><button key={n.id} className={"navbtn "+(page===n.id?"on":"")} onClick={()=>guardNav(n.id)} title={n.label}>
            {n.icon}<span>{n.label}</span>
          </button>)}
        </div>)}
      </div>
      <div className="sb-bottom">
        <button className="sb-toggle" onClick={()=>setCollapsed(!collapsed)} title={collapsed?"Expand sidebar":"Collapse sidebar"}>{collapsed?ic.plus:ic.close}</button>
        <button className="sb-toggle" onClick={()=>setShowSettings(true)} title="Settings">{ic.gear}</button>
        <button className="sb-toggle" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} title="Toggle theme">{theme==="dark"?ic.sun:ic.moon}</button>
      </div>
    </div>

    {/* MAIN */}
    <div className="main">
      <div className="main-hdr">
        <div className="page-title">{PAGE_ICONS[page]}{PAGE_TITLES[page]}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {!hasKey&&<span className="badge fail">No GEMINI_API_KEY</span>}
          <button className="btn sec" style={{padding:"6px 10px",fontSize:12}} title="Refresh page" onClick={()=>{if(page==="narasi"){localStorage.removeItem("rc_nar_outline");localStorage.removeItem("rc_nar_outline_text");localStorage.removeItem("rc_nar_result");}window.location.reload();}}>{ic.refresh}</button>
          <button className="btn sec" style={{padding:"6px 10px",fontSize:12}} onClick={()=>setShowSettings(true)}>{ic.gear}</button>
          <ClerkUserButton/>
        </div>
      </div>
      <div className="main-body" style={{padding:isFullHeight?0:"22px",overflow:isFullHeight?"hidden":"auto",flex:1,display:"flex",flexDirection:"column"}}>
        {renderPage()}
      </div>
    </div>

    {showSettings&&<SettingsPanel settings={sectionSettings} setSettings={setSettings} onClose={()=>setShowSettings(false)}/>}
    {toast&&<div className={"toast "+toast.k}>{toast.k==="ok"?ic.check:toast.k==="err"?ic.alert:ic.spark}<span>{toast.msg}</span></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
/* Signal that the React app has rendered, so auth.js can reveal #root
   only after content exists (prevents blank screen on first load). */
window.__appReady = true;
window.dispatchEvent(new Event("app:ready"));
</script>
<script src="auth.js"></script>
</body>
</html>
