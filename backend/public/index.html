  const[aspect,setAspect]=useState("1:1");
  const[result,setResult]=useState(null);
  const[busy,setBusy]=useState(false);
  const[slots,setSlots]=useState({subject:{b64:"",mime:"",desc:""},scene:{b64:"",mime:"",desc:""},style:{b64:"",mime:"",desc:""}});
  const[apiMode,setApiMode]=useState("laozhang");
  const key=settings.laozhangKey||settings.imageKey||"";
  const SLOT_INFO={subject:{icon:"🧑",title:"Subject",sub:"who / what"},scene:{icon:"🌄",title:"Scene",sub:"setting / bg"},style:{icon:"🎨",title:"Style",sub:"visual mood"}};

  const setSlotImg=(slot,file)=>{
    const r=new FileReader();r.onload=e=>{setSlots(p=>({...p,[slot]:{...p[slot],b64:e.target.result.split(",")[1],mime:file.type||"image/jpeg"}}));};r.readAsDataURL(file);
  };
  const clearSlot=slot=>setSlots(p=>({...p,[slot]:{...p[slot],b64:"",mime:""}}));

  const remix=async()=>{
    const has=k=>slots[k].b64||slots[k].desc.trim();
    if(!has("subject")&&!has("scene")&&!has("style"))return showToast("Fill at least one slot","err");
    setBusy(true);setResult(null);
    try{
      let r;
      if(apiMode==="google"){
        r=await fetch("/api/whisk/google",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({aspect_ratio:aspect,
            subject_image_b64:slots.subject.b64,subject_image_mime:slots.subject.mime||"image/jpeg",subject_description:slots.subject.desc,
            scene_image_b64:slots.scene.b64,scene_image_mime:slots.scene.mime||"image/jpeg",scene_description:slots.scene.desc,
            style_image_b64:slots.style.b64,style_image_mime:slots.style.mime||"image/jpeg",style_description:slots.style.desc})
        }).then(x=>x.json());
      }else{
        r=await api.whisk({model,aspect_ratio:aspect,
          subject_image_b64:slots.subject.b64,subject_image_mime:slots.subject.mime,subject_description:slots.subject.desc,
          scene_image_b64:slots.scene.b64,scene_image_mime:slots.scene.mime,scene_description:slots.scene.desc,
          style_image_b64:slots.style.b64,style_image_mime:slots.style.mime,style_description:slots.style.desc},key);
      }
      if(r.error)throw new Error(r.error);
      setResult(r.image_b64||r.url||null);
    }catch(e){showToast(e.message||"Failed","err");}
    setBusy(false);
  };

  return <div>
    <ApiToggle value={apiMode} onChange={setApiMode}/>
    <div className="sbar">
      <div className="stat">{ic.whisk}<div><div className="sl">Model</div><div className="sv sm">{model}</div></div></div>
      <div className="stat">{ic.ratio}<div><div className="sl">Aspect</div><div className="sv">{aspect}</div></div></div>
      <div className="sf"/>
      <select className="inp" style={{width:"auto",padding:"6px 28px 6px 10px",fontSize:12}} value={model} onChange={e=>setModel(e.target.value)}>{WHISK_MODELS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}</select>
      <select className="inp" style={{width:"auto",padding:"6px 28px 6px 10px",fontSize:12}} value={aspect} onChange={e=>setAspect(e.target.value)}>{ASPECTS.map(a=><option key={a}>{a}</option>)}</select>
    </div>
    <div className="whisk-slots">
      {["subject","scene","style"].map(slot=>{
        const inf=SLOT_INFO[slot];
        return <div className="whisk-slot" key={slot}>
          <div className="whisk-slot-hdr"><span className="whisk-slot-icon">{inf.icon}</span><span className="whisk-slot-title">{inf.title}</span><span className="whisk-slot-sub">{inf.sub}</span></div>
          <div className="whisk-slot-body">
            {slots[slot].b64
              ?<div style={{position:"relative",marginBottom:8}}><img src={`data:${slots[slot].mime};base64,${slots[slot].b64}`} style={{width:"100%",borderRadius:8,maxHeight:120,objectFit:"cover"}} alt={slot}/>
                <button style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",color:"#fff",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:12}} onClick={()=>clearSlot(slot)}>×</button></div>
              :<label className="ref-drop" style={{marginBottom:8}}>
                <div style={{fontSize:11.5,color:"var(--tf)"}}>Drop image or click</div>
                <input type="file" accept="image/*" onChange={e=>{if(e.target.files[0])setSlotImg(slot,e.target.files[0]);e.target.value="";}}/>
              </label>}
            <textarea className="inp ta" style={{minHeight:60,fontSize:12}} value={slots[slot].desc} placeholder={`Or describe the ${slot}…`} onChange={e=>setSlots(p=>({...p,[slot]:{...p[slot],desc:e.target.value}}))}/>
          </div>
        </div>;
      })}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"}}>
      <button className="btn pri w lg" disabled={busy} onClick={remix}>{busy?<><span className="spin"/> Remixing…</>:<>{ic.whisk} Remix</>}</button>
      <div className="whisk-result">
        {!result&&!busy&&<div style={{color:"var(--tf)",textAlign:"center",padding:40}}>{ic.whisk}<div style={{marginTop:8,fontSize:12}}>Remixed image appears here</div></div>}
        {busy&&<span className="spin" style={{width:32,height:32,borderWidth:3}}/>}
        {result&&(result.startsWith("http")?<img src={result} alt="whisk result" style={{maxWidth:"100%",maxHeight:500}}/>:<img src={`data:image/jpeg;base64,${result}`} alt="whisk result" style={{maxWidth:"100%",maxHeight:500}}/>)}
      </div>
    </div>
  </div>;
}

/* ─── FLOW SECTION ─── */
function FlowSection({settings,showToast}){
  // ── Persistent state (IndexedDB via idb-keyval) ──────────────────
  const FLOW_KEY="rc_flow_state";
  const idbRef=useRef(null);
  const[hydrated,setHydrated]=useState(false);

  const[script,setScript]=useState("");
  const[style,setStyle]=useState("cinematic");
  const[sceneCount,setSceneCount]=useState(4);
  const[imgStyle,setImgStyle]=useState("cinematic");
  const[genImages,setGenImages]=useState(false);
  const[scenes,setScenes]=useState([]);
  const[busy,setBusy]=useState(false);
  const[apiMode,setApiMode]=useState("laozhang");
  const[sceneVeo,setSceneVeo]=useState({});
  const[sceneImgSel,setSceneImgSel]=useState({});  // {idx: true} for per-scene image regen selection
  const[autoSceneCount,setAutoSceneCount]=useState(false);  // AI decides scene count
  const[autoPickVideo,setAutoPickVideo]=useState(false);     // AI picks 20% scenes for video
  const[videoPicked,setVideoPicked]=useState({});            // {idx:true} scenes AI picked for video
  const[genAllImgBusy,setGenAllImgBusy]=useState(false);
  const[genAllVeoBusy,setGenAllVeoBusy]=useState(false);
  const busyRef=useRef(false);
  const apiModeRef=useRef(apiMode);
  useEffect(()=>{apiModeRef.current=apiMode;},[apiMode]);
  // NEW: model pickers
  const[chatModel,setChatModel]=useState("gemini-2.5-flash");
  const[imageModel,setImageModel]=useState("nano-banana-hd");
  const[gImageModel,setGImageModel]=useState("imagen-4.0-fast-generate-001");
  const[veoModel,setVeoModel]=useState("veo-3.1-fast-generate-preview");
  const[flowGoogleKey,setFlowGoogleKey]=useState(()=>localStorage.getItem("rc_flow_gkey")||"");
  useEffect(()=>{localStorage.setItem("rc_flow_gkey",flowGoogleKey);},[flowGoogleKey]);

  // Load idb-keyval and hydrate state once on mount
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const mod=await import("https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/index.js");
        idbRef.current={get:mod.get,set:mod.set,del:mod.del};
        const saved=await mod.get(FLOW_KEY);
        if(cancelled||!saved){if(!cancelled)setHydrated(true);return;}
        if(saved.script!=null)setScript(saved.script);
        if(saved.style)setStyle(saved.style);
        if(saved.sceneCount)setSceneCount(saved.sceneCount);
        if(saved.imgStyle)setImgStyle(saved.imgStyle);
        if(saved.genImages!=null)setGenImages(saved.genImages);
        if(saved.scenes)setScenes(saved.scenes.map(s=>s.image_b64==="__loading__"?{...s,image_b64:""}:s));
        if(saved.apiMode)setApiMode(saved.apiMode);
        if(saved.sceneVeo)setSceneVeo(saved.sceneVeo);
        if(saved.sceneImgSel)setSceneImgSel(saved.sceneImgSel);
        if(saved.autoSceneCount!=null)setAutoSceneCount(saved.autoSceneCount);
        if(saved.autoPickVideo!=null)setAutoPickVideo(saved.autoPickVideo);
        if(saved.videoPicked)setVideoPicked(saved.videoPicked);
        if(saved.chatModel)setChatModel(saved.chatModel);
        if(saved.imageModel)setImageModel(saved.imageModel);
        if(saved.gImageModel)setGImageModel(saved.gImageModel);
        if(saved.veoModel)setVeoModel(saved.veoModel);
      }catch(e){console.warn("[flow] IDB load failed:",e);}
      finally{if(!cancelled)setHydrated(true);}
    })();
    return()=>{cancelled=true;};
  },[]);

  // Reset chatModel only on apiMode change AFTER hydration (so we don't clobber a restored value)
  useEffect(()=>{
    if(!hydrated)return;
    if(apiMode==="google") setChatModel("gemini-2.5-flash");
    else setChatModel("gpt-5-nano");
  },[apiMode,hydrated]);

  // Debounced auto-save (waits for hydration so we never overwrite IDB with defaults)
  useEffect(()=>{
    if(!hydrated||!idbRef.current)return;
    const t=setTimeout(()=>{
      idbRef.current.set(FLOW_KEY,{
        script,style,sceneCount,imgStyle,genImages,scenes,apiMode,
        sceneVeo,sceneImgSel,autoSceneCount,autoPickVideo,videoPicked,
        chatModel,imageModel,gImageModel,veoModel
      }).catch(e=>console.warn("[flow] IDB save failed:",e));
    },600);
    return()=>clearTimeout(t);
  },[hydrated,script,style,sceneCount,imgStyle,genImages,scenes,apiMode,sceneVeo,
     sceneImgSel,autoSceneCount,autoPickVideo,videoPicked,chatModel,imageModel,
     gImageModel,veoModel]);
  const key=settings.laozhangKey||settings.imageKey||"";
  const imgKey=settings.laozhangKey||settings.imageKey||"";  // laozhang key for flow images
  const veoKey=settings.laozhangKey||settings.veoKey||"";

  // ── save/copy helpers ──────────────────────────────────────────────
  const[copied,setCopied]=useState("");   // "<idx>:<kind>" of last-copied item
  const flash=k=>{setCopied(k);setTimeout(()=>setCopied(c=>c===k?"":c),1500);};
  const copyTxt=(t,k)=>{navigator.clipboard.writeText(t||"").then(()=>flash(k));};
  const dlBlob=(content,type,name)=>{const b=new Blob([content],{type});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);};
  const dlImage=(b64,name)=>{const a=document.createElement("a");a.href="data:image/jpeg;base64,"+b64;a.download=name;a.click();};
  const sceneNo=(s,i)=>(s.index??i)+1;
  const sceneToText=(s,i)=>
    `SCENE ${sceneNo(s,i)}: ${s.title||""}\n`+
    `Duration: ${s.duration||8}s\n\n`+
    (s.start_kalimat?`SCRIPT REFERENCE:\n${s.start_kalimat}\n\n`:"")+
    `VISUAL PROMPT:\n${s.description||""}\n\n`+
    `CAMERA:\n${typeof s.camera==="object"?Object.values(s.camera).filter(Boolean).join("; "):s.camera||""}\n\n`+
    `SFX / AUDIO:\n${typeof s.audio==="object"?Object.values(s.audio).filter(Boolean).join("; "):s.audio||""}\n`;
  const exportPromptsJson=()=>dlBlob(
    JSON.stringify(scenes.map((s,i)=>({scene:sceneNo(s,i),title:s.title,duration:s.duration||8,start_kalimat:s.start_kalimat||"",description:s.description,camera:s.camera,sfx:s.audio})),null,2),
    "application/json","storyboard-prompts.json");
  const exportPromptsTxt=()=>dlBlob(
    scenes.map((s,i)=>sceneToText(s,i)).join("\n"+"─".repeat(40)+"\n\n"),
    "text/plain","storyboard-prompts.txt");
  const buildImagePrompt=(s,style)=>[s.description,s.camera&&`Camera: ${typeof s.camera==="object"?Object.values(s.camera).filter(Boolean).join("; "):s.camera}`,style&&`${style} visual style`,"cinematic still frame"].filter(Boolean).join(". ");
  const sendToBatch=()=>{
    if(!scenes.length)return;
    const batchJobs=scenes.map((s,i)=>({output:`scene-${String(sceneNo(s,i)).padStart(2,"0")}`,prompt:buildImagePrompt(s,imgStyle)}));
    if(_importJobsFn)_importJobsFn(batchJobs);
    else _pendingBatchImport=batchJobs;
    settings.setPage("batch");
  };
  const downloadAllImages=async()=>{
    const imgs=scenes.filter(s=>s.image_b64);
    if(!imgs.length)return showToast("No images to download","err");
    try{
      const JSZip=(await import("https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js")).default||window.JSZip;
      const zip=new JSZip();
      imgs.forEach((s,i)=>{
        const n=`scene-${String(sceneNo(s,scenes.indexOf(s))).padStart(2,"0")}.jpg`;
        const bin=atob(s.image_b64);
        const arr=new Uint8Array(bin.length);
        for(let j=0;j<bin.length;j++)arr[j]=bin.charCodeAt(j);
        zip.file(n,arr);
      });
      const blob=await zip.generateAsync({type:"blob"});
      dlBlob(blob,"application/zip","storyboard-images.zip");
      showToast(`Downloaded ${imgs.length} images`,"ok");
    }catch(e){showToast("Download failed: "+e.message,"err");}
  };
  const downloadAllVideos=async()=>{
    const done=Object.entries(sceneVeo).filter(([,v])=>v?.taskId&&(v.status==="succeeded"||v.status==="completed"));
    if(!done.length)return showToast("No completed videos to download","err");
    try{
      const JSZip=(await import("https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js")).default||window.JSZip;
      const zip=new JSZip();
      showToast(`Fetching ${done.length} videos…`,"ok");
      await Promise.all(done.map(async([idx,v])=>{
        const r=await fetch(`/api/veo/download/${v.taskId}`);
        const buf=await r.arrayBuffer();
        zip.file(`scene-${String(Number(idx)+1).padStart(2,"0")}.mp4`,buf);
      }));
      const blob=await zip.generateAsync({type:"blob"});
      dlBlob(blob,"application/zip","storyboard-videos.zip");
      showToast(`Downloaded ${done.length} videos`,"ok");
    }catch(e){showToast("Download failed: "+e.message,"err");}
  };
  // Even-split into batches of <=8 (mirrors backend _split_scene_batches), used for Google mode
  const splitBatches=(total,maxPer=8)=>{
    if(total<=0)return[];
    const n=Math.ceil(total/maxPer),base=Math.floor(total/n),rem=total%n;
    const out=[];let off=0;
    for(let i=0;i<n;i++){const c=i<rem?base+1:base;out.push({count:c,offset:off});off+=c;}
    return out;
  };

  const submitSceneVeo=async(scene,idx,attempt=0)=>{
    const hasImg=scene.image_b64&&scene.image_b64!=="__loading__";
    const b64=hasImg?scene.image_b64.replace(/^data:image\/[a-z]+;base64,/i,""):"";
    const mime=hasImg?((scene.image_b64.match(/^data:(image\/[a-z]+);base64,/i)?.[1])||"image/png"):"image/png";
    setSceneVeo(p=>({...p,[idx]:{status:attempt?"retrying":"queued",taskId:null,model:veoModel,mode:hasImg?"i2v":"t2v",attempt}}));
    try{
      const resp=await fetch("/api/veo/submit",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          prompt:scene.description+(scene.camera?" Camera: "+scene.camera:"")+(scene.audio?" Audio: "+scene.audio:""),
          model:veoModel,
          ref_image_b64:b64,
          ref_image_mime:mime
        })});
      if(resp.status===429&&attempt<3){
        const wait=Math.min(30000,2000*Math.pow(2,attempt)); // 2s, 4s, 8s
        showToast(`Scene ${idx+1}: rate-limited, retrying in ${wait/1000}s…`,"info");
        await new Promise(r=>setTimeout(r,wait));
        return submitSceneVeo(scene,idx,attempt+1);
      }
      let r={};
      try{r=await resp.json();}catch{r={};}
      if(!resp.ok||r.error){
        const raw=r.error||r.detail||r.message||`HTTP ${resp.status}`;
        const msg=typeof raw==="string"?raw:JSON.stringify(raw);
        throw new Error(msg.slice(0,400));
      }
      setSceneVeo(p=>({...p,[idx]:{...p[idx],status:r.status||"queued",taskId:r.task_id}}));
      if(!hasImg)showToast("Scene "+(idx+1)+": no image, using text-to-video","info");
    }catch(e){
      setSceneVeo(p=>({...p,[idx]:{status:"error",taskId:null,err:e.message}}));
      showToast(`Scene ${idx+1} submit failed: ${e.message}`,"err");
    }
  };
  const pollSceneVeo=async(idx,taskId)=>{
    try{
      const r=await fetch("/api/veo/status/"+taskId).then(x=>x.json());
      setSceneVeo(p=>({...p,[idx]:{...p[idx],status:r.status||r.state||"unknown"}}));
    }catch{}
  };

  // ── Generate image for a single scene ──────────────────────────────
  const regenSceneImage=async(scene,idx)=>{
    const currentImageModel=apiMode==="google"?gImageModel:imageModel;
    const prompt=buildImagePrompt(scene,imgStyle);
    setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:"__loading__"}:s));
    try{
      let b64="";
      if(apiMode==="google"&&!FLOW_LZ_IMG_MODELS.has(currentImageModel)){
        const r=await fetch("/api/flow/storyboard/google",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({scenes:[{...scene,index:0}],model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        b64=(r.images||[])[0]?.image_b64||"";
      }else if(apiMode==="laozhang"){
        // Force LaoZhang — bypass the Google-first router
        const r=await fetch("/api/flow/images/lz",{method:"POST",
          headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
          body:JSON.stringify({scenes:[{...scene,index:0}],model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle})
        }).then(x=>x.json());
        b64=(r.images||[])[0]?.image_b64||"";
      }else{
        const r=await fetch("/api/flow/images/native",{method:"POST",
          headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
          body:JSON.stringify({scenes:[{...scene,index:0}],model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        b64=(r.images||[])[0]?.image_b64||"";
      }
      setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:b64||""}:s));
      if(!b64)showToast("Image generated but no preview returned","info");
      else showToast("Scene "+(idx+1)+" image regenerated","ok");
    }catch(e){
      setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:""}:s));
      showToast("Regen failed: "+e.message,"err");
    }
  };

  // ── Generate images for ALL scenes (or selected) ─────────────────
  const generateAllImages=async()=>{
    if(genAllImgBusy)return;
    const targets=scenes.map((s,i)=>({s,i})).filter(({i})=>sceneImgSel[i]!==false); // all by default
    if(!targets.length)return showToast("No scenes selected","err");
    setGenAllImgBusy(true);
    showToast("Generating "+targets.length+" images…","ok");
    const currentImageModel=apiMode==="google"?gImageModel:imageModel;
    try{
      const scenesPayload=targets.map(({s,i})=>({...s,index:i}));
      let imgMap={};
      if(apiMode==="google"&&!FLOW_LZ_IMG_MODELS.has(currentImageModel)){
        const r=await fetch("/api/flow/storyboard/google",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({scenes:scenesPayload,model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        imgMap=Object.fromEntries((r.images||[]).map(im=>[im.index,im.image_b64]));
      }else if(apiMode==="laozhang"){
        // Force LaoZhang — bypass the Google-first router
        const r=await fetch("/api/flow/images/lz",{method:"POST",
          headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
          body:JSON.stringify({scenes:scenesPayload,model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle})
        }).then(x=>x.json());
        imgMap=Object.fromEntries((r.images||[]).map(im=>[im.index,im.image_b64]));
      }else{
        const r=await fetch("/api/flow/images/native",{method:"POST",
          headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
          body:JSON.stringify({scenes:scenesPayload,model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        imgMap=Object.fromEntries((r.images||[]).map(im=>[im.index,im.image_b64]));
      }
      setScenes(prev=>prev.map((s,i)=>{
        const b64=imgMap[i];
        return b64!==undefined?{...s,image_b64:b64}:s;
      }));
      showToast("Done: "+targets.length+" images generated","ok");
    }catch(e){showToast("Generate all images failed: "+e.message,"err");}
    setGenAllImgBusy(false);
  };

  // ── Submit ALL videos ────────────────────────────────────────────
  const submitAllVeo=async()=>{
    if(genAllVeoBusy)return;
    const hasPicked=Object.keys(videoPicked).length>0;
    const targets=scenes.map((s,i)=>({s,i})).filter(({i})=>{
      if(hasPicked&&!videoPicked[i])return false; // respect AI picks if set
      return !sceneVeo[i]||sceneVeo[i].status==="error";
    });
    if(!targets.length)return showToast(hasPicked?"All picked scenes already submitted":"All scenes already submitted","info");
    setGenAllVeoBusy(true);
    showToast("Submitting "+targets.length+" videos…","ok");
    for(const {s,i} of targets){
      await submitSceneVeo(s,i);
      await new Promise(r=>setTimeout(r,2500)); // pace to stay under upstream rate limits
    }
    setGenAllVeoBusy(false);
    showToast("All videos submitted","ok");
  };

  // ── Poll ALL pending videos ──────────────────────────────────────
  const pollAllVeo=async()=>{
    const pending=Object.entries(sceneVeo).filter(([,v])=>v?.taskId&&v.status!=="succeeded"&&v.status!=="completed"&&v.status!=="error");
    if(!pending.length)return showToast("No pending videos to poll","info");
    await Promise.all(pending.map(([idx,v])=>pollSceneVeo(Number(idx),v.taskId)));
    showToast("Polled "+pending.length+" videos","ok");
  };

  const generate=async()=>{
    if(!script.trim())return showToast("Enter a script","err");
    if(busyRef.current)return; // prevent concurrent calls
    busyRef.current=true;
    // Snapshot current values immediately to avoid stale closures
    const currentMode=apiModeRef.current;
    const currentChatModel=chatModel;
    const currentImageModel=apiModeRef.current==="google"?gImageModel:imageModel;
    const currentImgStyle=imgStyle;
    setBusy(true);setScenes([]);setSceneVeo({});
    console.log("[Flow] generate called, apiMode=",currentMode,"genImages=",genImages,"chatModel=",currentChatModel);
    try{
      let r;
      if(currentMode==="google"){
        // Google-native text endpoint: split into <=8-scene parallel calls (fresh budget each)
        const plan=splitBatches(sceneCount,8);
        const parts=await Promise.all(plan.map(p=>
          fetch("/api/flow/storyboard/google/text",{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({script,style,scene_count:p.count,chat_model:currentChatModel,scene_offset:p.offset,total_scenes:autoSceneCount?0:sceneCount,image_style:currentImgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
          }).then(x=>x.json())));
        for(const pr of parts){if(pr&&pr.error)throw new Error(pr.error);}
        let allScenes=parts.flatMap(pr=>(pr&&pr.scenes)||[]).map((s,i)=>({...s,index:i}));
        if(genImages){
          const body2=JSON.stringify({scenes:allScenes,aspect_ratio:"16:9",model:currentImageModel,image_style:currentImgStyle});
          let imgRes;
          if(FLOW_LZ_IMG_MODELS.has(currentImageModel)){
            // nano-banana Google mode: Google native first, fallback LaoZhang on quota
            imgRes=await fetch("/api/flow/images/native",{method:"POST",
              headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
              body:JSON.stringify({scenes:allScenes,model:currentImageModel,aspect_ratio:"16:9",
                image_style:currentImgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
            }).then(x=>x.json());
          }else{
            const flowImgBody=JSON.parse(body2);
            if(flowGoogleKey.trim())flowImgBody.google_api_key=flowGoogleKey.trim();
            imgRes=await fetch("/api/flow/storyboard/google",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(flowImgBody)}).then(x=>x.json());
          }
          const imgMap=Object.fromEntries((imgRes.images||[]).map(im=>[im.index,im.image_b64]));
          allScenes=allScenes.map((s,i)=>({...s,image_b64:imgMap[i]||""}));
        }
        r={scenes:allScenes,style};
      }else{
        r=await api.flowStoryboard({script,style,scene_count:autoSceneCount?0:sceneCount,auto_scene_count:autoSceneCount,generate_images:genImages,aspect_ratio:"16:9",chat_model:currentChatModel,image_style:currentImgStyle,...(genImages&&{model:currentImageModel})},genImages?imgKey:key);
      }
      console.log("[Flow] API response:", r);
      if(!r||r.error)throw new Error((r&&r.error)||"No response from server");
      const newScenes=Array.isArray(r.scenes)?r.scenes:[];
      console.log("[Flow] scenes count:", newScenes.length);
      setScenes(newScenes);
      // ── Feature 2: AI picks 20% of scenes for video ──
      console.log("[AutoPick] autoPickVideo=",autoPickVideo,"newScenes.length=",newScenes.length,"laozhangKey=",settings.laozhangKey?"SET":"EMPTY","currentChatModel=",currentChatModel);
      if(autoPickVideo&&newScenes.length>0){
        const pickCount=Math.max(1,Math.round(newScenes.length*0.2));
        showToast("AI analyzing scenes for video picks…","ok");
        const sceneList=newScenes.map((s,i)=>
          `Scene ${i+1}: "${s.title}" | Camera: ${typeof s.camera==="object"?Object.values(s.camera).filter(Boolean).join("; "):s.camera||""} | ${s.description?.slice(0,100)}`
        ).join("\n");
        const aiMsg=`Analyze these ${newScenes.length} storyboard scenes and select exactly ${pickCount} (~20%) that will be MOST impactful as video clips. Prioritize: dynamic camera movement (dolly/crane/handheld), dramatic action, visual spectacle, key narrative turning points. Avoid purely static wide establishing shots.\n\nReturn ONLY a JSON array of 1-based scene numbers e.g. [2,5,11]. No other text.\n\n${sceneList}`;
        const aiSystem="You are a film director. Select the most cinematically powerful scenes. Respond with ONLY a JSON array of integers.";
        const parsePick=(raw)=>{
          // Strip markdown fences e.g. ```json ... ```
          const clean=raw.replace(/```[a-z]*\n?/gi,"").replace(/```/g,"").trim();
          const m=clean.match(/\[[\s\S]*?\]/);
          if(!m)return null;
          try{
            const arr=JSON.parse(m[0]).filter(n=>typeof n==="number"&&n>=1&&n<=newScenes.length);
            return arr.length>0?arr:null;
          }catch{return null;}
        };
        const applyPick=(arr)=>{
          const pickedMap={};
          arr.map(n=>n-1).forEach(idx=>pickedMap[idx]=true);
          setVideoPicked(pickedMap);
          showToast(`AI picked ${Object.keys(pickedMap).length} of ${newScenes.length} scenes for video`,"ok");
        };
        try{
          // Use key already available in FlowSection scope
          const lzk=key||settings.laozhangKey||localStorage.getItem("rc_lzkey")||"";
          console.log("[AutoPick] using key:",lzk?"SET (len="+lzk.length+")":"EMPTY");
          // Route based on apiMode — Google mode uses Google API, LaoZhang uses LaoZhang
          const isGoogle=currentMode==="google";
          const endpoint=isGoogle?"/api/chat/google/once":"/api/chat/once";
          const body=isGoogle
            ?{model:currentChatModel,max_tokens:12000,system:aiSystem,message:aiMsg,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})}
            :{model:currentChatModel,max_tokens:12000,system:aiSystem,message:aiMsg};
          const headers={"Content-Type":"application/json",...(!isGoogle&&lzk&&{"X-LaoZhang-API-Key":lzk})};
          console.log("[AutoPick] endpoint:",endpoint,"model:",currentChatModel,"isGoogle:",isGoogle);
          const r=await fetch(endpoint,{
            method:"POST",
            headers,
            body:JSON.stringify(body)
          }).then(x=>x.json());
          console.log("[AutoPick] response:",r);
          const raw=r?.text||"";
          console.log("[AutoPick] raw text:",raw);
          const arr=parsePick(raw);
          if(arr){
            applyPick(arr);
          }else{
            console.error("[AutoPick] parsePick failed on:",raw);
            showToast("Auto-pick: AI returned unexpected format","err");
            setVideoPicked({});
          }
        }catch(e){
          console.error("[AutoPick] failed:",e.message);
          showToast("Auto-pick failed: "+e.message,"err");
          setVideoPicked({});
        }
      }else{
        setVideoPicked({});
      }
      showToast(newScenes.length+" scenes generated","ok");
      // ── Auto-download prompts after generation ──
      try{
        const promptTxt=newScenes.map((s,i)=>sceneToText(s,i)).join("\n"+"─".repeat(40)+"\n\n");
        dlBlob(promptTxt,"text/plain","storyboard-prompts.txt");
      }catch(e2){console.warn("[Flow] Auto-download prompts failed:",e2);}
    }catch(e){
      console.error("[Flow] Error:", e);
      showToast(e.message||"Failed","err");
    }
    setBusy(false);busyRef.current=false;
  };

  const imgModels=apiMode==="google"?FLOW_IMAGE_MODELS_GOOGLE:FLOW_IMAGE_MODELS_LZ;
  const curImgModel=apiMode==="google"?gImageModel:imageModel;
  const setImgModel=apiMode==="google"?setGImageModel:setImageModel;
  const flowKeySlot=<input className="inp mono" type="password"
    placeholder="Gemini key (blank = server .env)"
    value={flowGoogleKey} onChange={e=>setFlowGoogleKey(e.target.value)}
    style={{width:180,padding:"5px 9px",fontSize:11.5}}/>;

  return <div>
    <ApiToggle value={apiMode} onChange={v=>{setApiMode(v);}} keySlot={flowKeySlot}/>

    {/* ── Model config bar ── */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <div>
          <div className="lbl">{ic.chat} AI Model <span style={{fontSize:9.5,background:"var(--as)",color:"var(--ac)",padding:"1px 6px",borderRadius:4,marginLeft:4}}>storyboard</span></div>
          <select className="inp" value={chatModel} onChange={e=>setChatModel(e.target.value)}>
            {apiMode==="laozhang"
              ?FLOW_CHAT_MODELS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)
              :[{value:"gemini-3.5-flash",      label:"Gemini 3.5 Flash $1.5/$9"},
                {value:"gemini-3.1-pro-preview",label:"Gemini 3.1 Pro $2/$12 - $4/$18"},
                {value:"gemini-3-flash-preview", label:"Gemini 3 Flash $0.5/$3"},
                {value:"gemini-3.1-flash-lite",  label:"Gemini 3.1 Flash Lite $0.25/$1.5"},
                {value:"gemini-2.5-flash",       label:"Gemini 2.5 Flash"},
                {value:"gemini-2.5-pro",         label:"Gemini 2.5 Pro"}].map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
        </div>
        <div>
          <div className="lbl">{ic.image} Image Model <span style={{fontSize:9.5,background:"var(--was)",color:"var(--wa)",padding:"1px 6px",borderRadius:4,marginLeft:4}}>{genImages?"auto":"manual"}</span></div>
          <select className="inp" value={curImgModel} onChange={e=>setImgModel(e.target.value)}>
            {imgModels.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
        </div>
        <div>
          <div className="lbl">{ic.video} Video Model <span style={{fontSize:9.5,background:"var(--sus)",color:"var(--su)",padding:"1px 6px",borderRadius:4,marginLeft:4}}>per scene</span></div>
          <select className="inp" value={veoModel} onChange={e=>setVeoModel(e.target.value)}>
            {VEO_FLOW_MODELS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
        </div>
      </div>
    </div>

    {/* ── Generate config ── */}
    <div className="card">
      <div className="row3" style={{marginBottom:12}}>
        <div><div className="lbl">Narrative style</div><select className="inp" value={style} onChange={e=>setStyle(e.target.value)}>{FLOW_STYLES.map(s=><option key={s}>{s}</option>)}</select></div>
        <div><div className="lbl">Image render style</div><select className="inp" value={imgStyle} onChange={e=>setImgStyle(e.target.value)}>{FLOW_IMAGE_STYLES.map(s=><option key={s.value} value={s.value}>{s.label}</option>)}</select></div>
        <div>
          <div className="lbl">Scenes <span style={{fontSize:9.5,color:"var(--tf)"}}>(1–50)</span></div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <input type="number" className="inp" min={1} max={50} value={sceneCount}
              disabled={autoSceneCount}
              style={{opacity:autoSceneCount?0.4:1,flex:1}}
              onChange={e=>setSceneCount(Math.min(50,Math.max(1,Number(e.target.value)||1)))}/>
            <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:11.5,whiteSpace:"nowrap",padding:"0 4px"}}>
              <input type="checkbox" checked={autoSceneCount} onChange={e=>setAutoSceneCount(e.target.checked)}/> Auto
            </label>
          </div>
        </div>
      </div>
      <div style={{marginBottom:8}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}>
          <input type="checkbox" checked={genImages} onChange={e=>setGenImages(e.target.checked)}/> Generate storyboard images
        </label>
      </div>
      <div style={{marginBottom:12}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}>
          <input type="checkbox" checked={autoPickVideo} onChange={e=>setAutoPickVideo(e.target.checked)}/>
          AI picks 20% scenes for video
          <span style={{fontSize:10.5,color:"var(--tf)",marginLeft:2}}>cost-efficient</span>
        </label>
      </div>
      <div className="lbl">{ic.flow} Script</div>
      <textarea className="inp ta" rows={6} value={script} placeholder="Paste your script, story, or scene description…" onChange={e=>setScript(e.target.value)}/>
      <button className="btn pri w lg" style={{marginTop:12}} disabled={busy||!script.trim()} onClick={generate}>
        {busy?<><span className="spin"/> Generating storyboard…</>:<>{ic.flow} Generate Storyboard</>}
      </button>
    </div>

    {/* ── Scene cards ── */}
    {scenes.length>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:18,marginBottom:2,flexWrap:"wrap"}}>
      <span style={{fontSize:13,fontWeight:700,color:"var(--t)"}}>{scenes.length} scenes</span>
      <div style={{flex:1}}/>
      <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={exportPromptsTxt}>{ic.dload} Prompts .txt</button>
      <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={exportPromptsJson}>{ic.dload} Prompts .json</button>
      {/* Image controls */}
      {scenes.some(s=>s.image_b64)&&<button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={downloadAllImages}>{ic.dload} All Images .zip</button>}
      <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5,display:"flex",alignItems:"center",gap:5}}
        onClick={generateAllImages} disabled={genAllImgBusy}>
        {genAllImgBusy?<><span className="spin" style={{width:11,height:11}}/> Generating…</>:<>🖼 Generate All Images</>}
      </button>
      {/* Video controls */}
      {Object.values(sceneVeo).some(v=>v?.taskId&&(v.status==="succeeded"||v.status==="completed"))&&
        <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={downloadAllVideos}>{ic.dload} All Videos .zip</button>}
      <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={submitAllVeo} disabled={genAllVeoBusy}>
        {genAllVeoBusy?<><span className="spin" style={{width:11,height:11}}/> Submitting…</>:<>{ic.video} Generate All Videos</>}
      </button>
      {Object.values(sceneVeo).some(v=>v?.taskId&&v.status!=="succeeded"&&v.status!=="completed"&&v.status!=="error")&&
        <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={pollAllVeo}>🔄 Poll All</button>}
      {/* Batch & clear */}
      <button className="btn pri" style={{padding:"5px 12px",fontSize:11.5}} onClick={sendToBatch}>{ic.batch} Send to Batch</button>
      <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={()=>{setScenes([]);setSceneVeo({});setSceneImgSel({});setVideoPicked({});idbRef.current?.del("rc_flow_state").catch(()=>{});}}>{ic.trash} Clear</button>
    </div>}
    {scenes.length>0&&<div className="flow-scenes">
      {scenes.map((s,i)=>{
        const vt=sceneVeo[i];
        const isDone=vt?.status==="succeeded"||vt?.status==="completed";
        const isRunning=vt&&!isDone&&vt.status!=="error";
        return<div className="scene-card" key={i} style={videoPicked[i]?{border:"2px solid #7c3aed",boxShadow:"0 0 0 3px rgba(124,58,237,0.2)"}:{}}>
          {videoPicked[i]&&<div style={{background:"#7c3aed",color:"#fff",fontSize:11,fontWeight:700,textAlign:"center",padding:"4px 0",letterSpacing:1}}>🎬 SELECTED FOR VIDEO</div>}
          {s.image_b64==="__loading__"
            ?<div className="scene-img" style={{display:"flex",alignItems:"center",justifyContent:"center",color:"var(--tf)",flexDirection:"column",gap:6}}>
               <span className="spin" style={{width:20,height:20}}/><span style={{fontSize:11}}>Generating…</span>
             </div>
            :s.image_b64
            ?<div style={{position:"relative"}}>
               <img className="scene-img" src={"data:image/jpeg;base64,"+s.image_b64} alt={s.title}/>
               <button className="btn sec" title="Download image" style={{position:"absolute",top:8,right:8,padding:"4px 8px",fontSize:11}} onClick={()=>dlImage(s.image_b64,"scene-"+sceneNo(s,i)+".jpg")}>{ic.dl}</button>
               <button className="btn sec" title="Regenerate image" style={{position:"absolute",top:8,left:8,padding:"4px 8px",fontSize:11}} onClick={()=>regenSceneImage(s,i)}>🔄</button>
             </div>
            :<div className="scene-img" style={{display:"flex",alignItems:"center",justifyContent:"center",color:"var(--tf)",fontSize:24,flexDirection:"column",gap:6}}>
               🎬
               <button className="btn sec" style={{padding:"4px 10px",fontSize:11}} onClick={()=>regenSceneImage(s,i)}>🖼 Generate Image</button>
             </div>}
          <div className="scene-body">
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span className="scene-idx">SCENE {sceneNo(s,i)}</span>
              <span style={{fontSize:11,color:"var(--td)"}}>{s.duration||8}s</span>
              {videoPicked[i]&&<span style={{fontSize:9,background:"#7c3aed",color:"#fff",padding:"1px 6px",borderRadius:4,fontWeight:700}}>🎬 VIDEO</span>}
              {vt&&<span className={"badge "+(isDone?"ok":vt.status==="error"?"fail":"run")} style={{fontSize:9.5}}>{vt.status}</span>}
            </div>
            <div className="scene-title">{s.title}</div>
            {s.start_kalimat&&<div style={{fontSize:11,color:"var(--td)",fontStyle:"italic",marginBottom:4,borderLeft:"2px solid var(--ac)",paddingLeft:8}}>"{s.start_kalimat}"</div>}
            <div className="scene-desc">{s.description}</div>
            <div className="scene-meta">
              {s.camera&&<span className="scene-tag">📷 {typeof s.camera==="object"?Object.values(s.camera).filter(Boolean).join("; "):s.camera}</span>}
              {s.audio&&<span className="scene-tag">🎵 {typeof s.audio==="object"?Object.values(s.audio).filter(Boolean).join("; "):s.audio}</span>}
            </div>
            {/* Prompt copy / download row */}
            <div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>
              <button className="btn sec" style={{padding:"4px 9px",fontSize:11}} onClick={()=>copyTxt(sceneToText(s,i),i+":prompt")}>{copied===i+":prompt"?ic.check:ic.copy}{copied===i+":prompt"?"Copied":"Prompt"}</button>
              {s.audio&&<button className="btn sec" style={{padding:"4px 9px",fontSize:11}} onClick={()=>copyTxt(typeof s.audio==="object"?Object.values(s.audio).filter(Boolean).join("; "):s.audio,i+":sfx")}>{copied===i+":sfx"?ic.check:ic.copy}{copied===i+":sfx"?"Copied":"SFX"}</button>}
              <button className="btn sec" style={{padding:"4px 9px",fontSize:11}} onClick={()=>dlBlob(sceneToText(s,i),"text/plain","scene-"+sceneNo(s,i)+".txt")}>{ic.dload}.txt</button>
            </div>
            {/* Video generation row */}
            <div style={{marginTop:10,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",borderTop:"1px solid var(--br)",paddingTop:8}}>
              <span style={{fontSize:10,color:"var(--tf)",fontFamily:"var(--fm)"}}>{veoModel}</span>
              <div style={{flex:1}}/>
              {!vt&&<button className="btn pri" style={{padding:"5px 12px",fontSize:11.5}} onClick={()=>submitSceneVeo(s,i)}>
                {ic.video} Generate Video
              </button>}
              {isRunning&&<>
                <span className="spin" style={{width:12,height:12}}/>
                {vt.taskId&&<button className="btn sec" style={{padding:"4px 9px",fontSize:11}} onClick={()=>pollSceneVeo(i,vt.taskId)}>{ic.refresh} Poll</button>}
              </>}
              {vt?.status==="error"&&<>
                <span style={{fontSize:11,color:"var(--da)"}} title={vt.err||""}>⚠ {vt.err?vt.err.slice(0,80):"Error"}</span>
                <button className="btn sec" style={{padding:"4px 9px",fontSize:11}} onClick={()=>submitSceneVeo(s,i)}>Retry</button>
              </>}
              {isDone&&vt.taskId&&<>
                <a className="btn pri" style={{padding:"5px 12px",fontSize:11.5,textDecoration:"none"}} href={"/api/veo/download/"+vt.taskId} download={"scene-"+(i+1)+".mp4"}>
                  {ic.dload} Download MP4
                </a>
                <a className="btn sec" style={{padding:"5px 12px",fontSize:11.5,textDecoration:"none"}} href={"/api/veo/stream/"+vt.taskId} target="_blank">
                  {ic.video} Watch
                </a>
              </>}
            </div>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

/* ─── BATCH SECTION (existing) ─── */
function BatchSection({settings,showToast}){
  const[jobs,setJobs]=useState([{output:"Bagian 01_1",prompt:"A cinematic wide shot of a half-buried Egyptian temple in a vast shifting desert. Golden sand dunes, heat haze, 8k."}]);
  const[history,setHistory]=useState([]);
  const[selected,setSelected]=useState(null);
  const[bImages,setBImages]=useState([]);
  const[busy,setBusy]=useState("");
  const bModel=BATCH_MODELS.find(m=>m.id===settings.batchModelId)||BATCH_MODELS[0];

  useEffect(()=>{
    api.batchJobs().then(d=>setHistory(Array.isArray(d)?d:[])).catch(()=>setHistory([]));
    _importJobsFn=(jobs)=>setJobs(jobs);
    if(_pendingBatchImport){setJobs(_pendingBatchImport);_pendingBatchImport=null;}
    return()=>{_importJobsFn=null;};
  },[]);

  const setJob=(i,p)=>setJobs(prev=>prev.map((j,k)=>k===i?{...j,...p}:j));
  const addJob=()=>setJobs(p=>[...p,{output:"Bagian "+(p.length+1),prompt:""}]);
  const delJob=i=>setJobs(p=>p.filter((_,k)=>k!==i));
  const dupJob=i=>setJobs(p=>[...p.slice(0,i+1),{...p[i],output:p[i].output+" copy"},...p.slice(i+1)]);
  const move=(i,d)=>setJobs(p=>{const j=i+d;if(j<0||j>=p.length)return p;const a=[...p];[a[i],a[j]]=[a[j],a[i]];return a;});

  const doSubmit=async()=>{
    if(!jobs.length)return showToast("Add jobs first","err");
    setBusy("submit");
    try{const r=await api.batchSubmit({settings:{modelId:settings.batchModelId,aspectRatio:settings.batchAspect,imageSize:settings.batchSize,displayName:"rino-batch"},jobs});
      if(r.error)throw new Error(r.error);showToast("Batch submitted","ok");setHistory((d=>Array.isArray(d)?d:[])(await api.batchJobs()));setSelected(r.jobName);}
    catch(e){showToast(e.message,"err");}setBusy("");
  };
  const doStatus=async n=>{setBusy("st"+n);try{const r=await api.batchStatus(n);setHistory(h=>h.map(j=>j.jobName===n?{...j,state:r.state}:j));showToast(r.state.replace("JOB_STATE_",""));}catch(e){showToast(e.message,"err");}setBusy("");};
  const doRetrieve=async n=>{setBusy("ret"+n);try{const r=await api.batchRetrieve(n);if(!r.ok){showToast("Not ready: "+r.state,"err");setBusy("");return;}showToast("Saved "+r.saved+" images","ok");setHistory(h=>h.map(j=>j.jobName===n?{...j,state:r.state,retrieved:r.saved}:j));setBImages(r.files.map(f=>({file:f.file,url:"/images/"+encodeURIComponent(f.file)})));}catch(e){showToast(e.message,"err");}setBusy("");};

  const selRec=(Array.isArray(history)?history:[]).find(h=>h.jobName===selected);
  const mapping=selRec?selRec.mapping:jobs.map((j,i)=>({key:"image-"+(i+1),output:(j.output||("image-"+(i+1))).trim()}));

  return <div>
    <div className="sbar">
      <div className="stat">{ic.hash}<div><div className="sl">Images</div><div className="sv">{jobs.length}</div></div></div>
      <div className="stat">{bModel.icon}<div><div className="sl">Model</div><div className="sv sm">{bModel.label}</div></div></div>

          <textarea className="inp" rows={2} value={j.prompt} placeholder="Image prompt…" onChange={e=>setJob(i,{prompt:e.target.value})} style={{resize:"vertical",fontSize:12,color:"var(--td)"}}/>
        </div>
      </div>)}

    <button className="add-btn" style={{marginTop:10}} onClick={addJob}>{ic.plus} Add image job</button>
    <button className="btn pri w lg" style={{marginTop:10}} disabled={busy==="submit"} onClick={doSubmit}>{busy==="submit"?<><span className="spin"/> Submitting…</>:<>{ic.batch} Submit Batch · {jobs.length} images</>}</button>

    <div style={{marginTop:22,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>

    <div className="hist-list">

        <div style={{flex:1,minWidth:0}}><div className="hist-name">{h.jobName}</div><div className="hist-meta">{h.model} · {h.count} imgs · {new Date(h.createdAt).toLocaleString()}{h.retrieved?" · "+h.retrieved+" saved":""}</div></div>

        <button className="btn pri" style={{flex:1}} disabled={busy.startsWith("ret")} onClick={()=>doRetrieve(selected)}>{busy==="ret"+selected?<><span className="spin"/> Saving…</>:<>{ic.dl} Retrieve &amp; save</>}</button>
      </div>
      <div style={{marginTop:16,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>{ic.lay}<span style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:14}}>KEY_TO_OUTPUT</span><span style={{fontSize:10,background:"var(--sus)",color:"var(--su)",padding:"2px 7px",borderRadius:999,fontWeight:700,textTransform:"uppercase"}}>auto</span></div>
      <div className="maptable"><div className="mhd"><span>Key</span><span/><span>File</span></div><div className="mbody">{mapping.map((m,i)=><div className="mrow" key={i}><code className="mk">{m.key}</code><span style={{color:"var(--tf)"}}>→</span><code className="mf">{m.output}.png</code></div>)}</div></div>
      {bImages.length>0&&<div className="gallery" style={{marginTop:12}}>{bImages.map((im,i)=><a className="gc" key={i} href={im.url} target="_blank" rel="noreferrer"><img src={im.url} alt={im.file} loading="lazy"/><div className="cap">{im.file}</div></a>)}</div>}
