  </div>;
}

/* ─── TTS SECTION (existing) ─── */
function TtsSection({settings,showToast}){
  const[apiMode,setApiMode]=useState(()=>localStorage.getItem("rc_tts_apimode")||"google");
  const[ttsModel,setTtsModel]=useState("gemini-3.1-flash-tts-preview");
  const[ttsModelLz,setTtsModelLz]=useState(()=>localStorage.getItem("rc_tts_model_lz")||"tts-1");
  const[voice,setVoice]=useState("Enceladus");
  const[voiceLz,setVoiceLz]=useState(()=>localStorage.getItem("rc_tts_voice_lz")||"alloy");
  const[speed,setSpeed]=useState(()=>Number(localStorage.getItem("rc_tts_speed"))||1.0);
  const[language,setLanguage]=useState(()=>localStorage.getItem("rc_tts_lang")||"auto");
  const[audiobookMode,setAudiobookMode]=useState(()=>localStorage.getItem("rc_tts_audiobook")==="1");
  const[silence,setSilence]=useState(0.5);
  const[prefix,setPrefix]=useState("tts");
  const[apiKeys,setApiKeys]=useState(()=>localStorage.getItem("rc_tts_keys")||"");
  const[lzKey,setLzKey]=useState(()=>localStorage.getItem("rc_tts_lz_key")||"");
  const[audioProfile,setAudioProfile]=useState(`A literary, contemplative documentary voice — clear, precise, forward-moving.\n\nContinue reading seamlessly. Do not add intro or outro.`);
  const[profiles,setProfiles]=useState([]);
  const[profileName,setProfileName]=useState("");
  const[transcript,setTranscript]=useState(`[curiosity] First paragraph here...\n\n[warmth] Second paragraph here...`);
  const[jobId,setJobId]=useState(null);
  const[job,setJob]=useState(null);
  const[ttsFiles,setTtsFiles]=useState([]);
  const[busy,setBusy]=useState(false);
  // Mirror server-side chunkTextForAudiobook so UI counter matches actual file count.
  const lines=useMemo(()=>{
    const t=transcript.trim();
    if(!t)return[];
    if(apiMode!=="laozhang"||!audiobookMode){
      return t.split(/\n\n+/).filter(l=>l.trim());
    }
    // audiobook chunker — same logic as server
    const maxChars=4000,chunks=[];let buf="";
    const flush=()=>{ if(buf.trim()){chunks.push(buf.trim());} buf=""; };
    const paragraphs=t.split(/\n\n+/);
    for(const p of paragraphs){
      if((buf.length+p.length+2)<=maxChars){ buf+=(buf?"\n\n":"")+p; }
      else{
        flush();
        if(p.length<=maxChars){ buf=p; continue; }
        const sentences=p.match(/[^.!?…\n]+[.!?…]+\s*|\S[^.!?…\n]*$/g)||[p];
        for(const s of sentences){
          if((buf.length+s.length)<=maxChars){ buf+=s; }
          else{
            flush();
            if(s.length<=maxChars){ buf=s; }
            else{ for(let i=0;i<s.length;i+=maxChars) chunks.push(s.slice(i,i+maxChars)); }
          }
        }
      }
    }
    flush();
    return chunks;
  },[transcript,apiMode,audiobookMode]);
  const poll=useCallback(async id=>{try{const j=await api.ttsJob(id);setJob(j);if(j.status==="done"||j.status==="error"){setTtsFiles(await api.ttsFiles());}}catch{}},[]);
  useEffect(()=>{ if(!jobId)return;const iv=setInterval(()=>poll(jobId),3000);return()=>clearInterval(iv); },[jobId,poll]);
  useEffect(()=>{ api.ttsFiles().then(setTtsFiles).catch(()=>{}); },[]);
  useEffect(()=>{
    _importTtsFn=(txt)=>{ setTranscript(txt); };
    if(_pendingTtsImport){ setTranscript(_pendingTtsImport); _pendingTtsImport=null; }
    return()=>{ _importTtsFn=null; };
  },[]);
  useEffect(()=>{ localStorage.setItem("rc_tts_keys",apiKeys); },[apiKeys]);
  useEffect(()=>{ localStorage.setItem("rc_tts_lz_key",lzKey); },[lzKey]);
  useEffect(()=>{ localStorage.setItem("rc_tts_apimode",apiMode); },[apiMode]);
  useEffect(()=>{ localStorage.setItem("rc_tts_model_lz",ttsModelLz); },[ttsModelLz]);
  useEffect(()=>{ localStorage.setItem("rc_tts_voice_lz",voiceLz); },[voiceLz]);
  useEffect(()=>{ localStorage.setItem("rc_tts_speed",String(speed)); },[speed]);
  useEffect(()=>{ localStorage.setItem("rc_tts_lang",language); },[language]);
  useEffect(()=>{ localStorage.setItem("rc_tts_audiobook",audiobookMode?"1":"0"); },[audiobookMode]);
  // Load profiles from server on mount
  useEffect(()=>{ api.ttsProfiles().then(setProfiles).catch(()=>{}); },[]);
  // Auto-fill LaoZhang key from global settings (set in the Settings panel)
  useEffect(()=>{ if(!lzKey&&settings?.laozhangKey)setLzKey(settings.laozhangKey); },[settings?.laozhangKey]);
  const saveProfile=()=>{
    if(!profileName.trim())return;
    const p={id:mkId(),name:profileName.trim(),content:audioProfile,ts:Date.now()};
    const updated=[...profiles.filter(x=>x.name!==p.name),p];
    setProfiles(updated);
    api.ttsProfilesSave(updated).catch(()=>{});
    setProfileName("");
  };
  const delProfile=id=>{
    const updated=profiles.filter(x=>x.id!==id);
    setProfiles(updated);
    api.ttsProfilesSave(updated).catch(()=>{});
  };

  const start=async()=>{
    if(!transcript.trim())return showToast("Transcript empty","err");
    let keys=[];
    if(apiMode==="laozhang"){
      const k=lzKey.trim();
      if(!k)return showToast("LaoZhang API key empty","err");
      keys=[k];
    }else{
      keys=apiKeys.split("\n").map(k=>k.trim()).filter(Boolean);
    }
    setBusy(true);
    try{
      const payload=apiMode==="laozhang"
        ?{apiMode,apiKeys:keys,model:ttsModelLz,voice:voiceLz,speed:Number(speed)||1.0,language,audiobookMode,silenceSeconds:Number(silence),audioProfile,transcriptBody:transcript,outputPrefix:prefix}
        :{apiMode,apiKeys:keys,model:ttsModel,voice,silenceSeconds:Number(silence),audioProfile,transcriptBody:transcript,outputPrefix:prefix};
      const r=await api.ttsStart(payload);
      if(r.error)throw new Error(r.error);setJobId(r.jobId);setJob({status:"queued",progress:0,total:r.total,logs:[],files:[]});showToast("TTS started · "+r.total+" files","ok");
    }catch(e){showToast(e.message,"err");}setBusy(false);
  };
  const cancel=async()=>{
    if(!jobId)return;
    try{
      const r=await api.ttsCancel(jobId);
      if(r.ok){setJob(j=>({...j,status:"cancelling"}));showToast("Cancelling…","ok");}
      else showToast("Cannot cancel: "+r.reason,"err");
    }catch(e){showToast(e.message,"err");}
  };

  return <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:16,alignItems:"start"}}>
    <div>
      <div className="card">
        <div className="lbl" style={{justifyContent:"space-between"}}>
          <span>{ic.key} API Keys (rotation)</span>
        </div>
        <div className="api-toggle" style={{marginBottom:8}}>
          <button className={"lz "+(apiMode==="google"?"on":"")} onClick={()=>setApiMode("google")}>🔵 Google</button>
          <button className={"lz "+(apiMode==="laozhang"?"on":"")} onClick={()=>setApiMode("laozhang")}>🟣 LaoZhang API</button>
        </div>
        {apiMode==="google"
          ?<><textarea className="inp ta mono" rows={4} value={apiKeys} placeholder={"One key per line\n(blank = use server .env key)"} onChange={e=>setApiKeys(e.target.value)} style={{minHeight:90}}/>
             <p className="hint">Switches to next key on quota error (429).</p></>
          :<><input className="inp mono" type="password" placeholder="sk-... LaoZhang API key" value={lzKey} onChange={e=>setLzKey(e.target.value)}/>
             <p className="hint">OpenAI-compatible <code>/v1/audio/speech</code> · <code>tts-1</code> / <code>tts-1-hd</code>. <strong>Audio profile is ignored</strong> — only the Transcript text is spoken (no style/persona param).</p></>}
      </div>
      <div className="card">
        <div className="lbl">{ic.mic} Model</div>
        {apiMode==="google"
          ?<select className="inp" value={ttsModel} onChange={e=>setTtsModel(e.target.value)}>{TTS_MODELS.map(m=><option key={m}>{m}</option>)}</select>
          :<select className="inp" value={ttsModelLz} onChange={e=>setTtsModelLz(e.target.value)}>{TTS_MODELS_LZ.map(m=><option key={m} value={m}>{m==="tts-1"?"tts-1 — standard, fast":"tts-1-hd — HD, higher quality"}</option>)}</select>}
      </div>
      <div className="card">
        <div className="lbl">{ic.wave} Voice</div>
        {apiMode==="google"
          ?<select className="inp" value={voice} onChange={e=>setVoice(e.target.value)}>{TTS_VOICES.map(v=><option key={v}>{v}</option>)}</select>
          :<select className="inp" value={voiceLz} onChange={e=>setVoiceLz(e.target.value)}>{TTS_VOICES_LZ.map(v=><option key={v.v} value={v.v}>{v.label}</option>)}</select>}
      </div>
      <div className="card">
        <div className="row2">
          <div><div className="lbl">Silence (sec)</div><input className="inp mono" type="number" min="0" max="5" step="0.1" value={silence} onChange={e=>setSilence(e.target.value)}/></div>
          <div><div className="lbl">Output prefix</div><input className="inp mono" value={prefix} onChange={e=>setPrefix(e.target.value)}/></div>
        </div>
        {apiMode==="laozhang"&&<>
          <div style={{marginTop:8}}>
            <div className="lbl">Speed <span style={{fontSize:10,color:"var(--td)",fontWeight:400}}>0.25 – 4.0</span></div>
            <input className="inp mono" type="number" min="0.25" max="4" step="0.05" value={speed} onChange={e=>setSpeed(e.target.value)}/>
          </div>
          <div style={{marginTop:8}}>
            <div className="lbl">🌐 Language <span style={{fontSize:10,color:"var(--td)",fontWeight:400}}>filename tag only · TTS auto-detects from text</span></div>
            <select className="inp" value={language} onChange={e=>setLanguage(e.target.value)}>{TTS_LANGUAGES_LZ.map(l=><option key={l.v} value={l.v}>{l.label}</option>)}</select>
          </div>
          <label style={{display:"flex",alignItems:"center",gap:8,marginTop:10,cursor:"pointer",fontSize:12.5}}>
            <input type="checkbox" checked={audiobookMode} onChange={e=>setAudiobookMode(e.target.checked)} style={{cursor:"pointer"}}/>
            <span>📖 <strong>Audiobook mode</strong> <span style={{color:"var(--td)",fontWeight:400}}>· auto-chunk every ~4000 chars</span></span>
          </label>
        </>}
        <p className="hint" style={{marginTop:8}}>
          Files: <code>{prefix}{apiMode==="laozhang"&&language!=="auto"?`_${language}`:""}_01.wav</code>, <code>_02.wav</code>…
          {apiMode==="laozhang"&&audiobookMode&&<><br/><span style={{color:"var(--ac)"}}>📖 Audiobook: whole transcript treated as one prose, split on paragraph→sentence boundaries.</span></>}
        </p>
      </div>
      <div style={{background:"var(--be)",border:"1px solid var(--br)",borderRadius:13,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div><div style={{fontFamily:"var(--fm)",fontSize:11,color:"var(--td)"}}>{apiMode==="laozhang"&&audiobookMode?"Chunks":"Paragraphs"}</div><div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:18}}>{lines.length}</div></div>
        <div><div style={{fontFamily:"var(--fm)",fontSize:11,color:"var(--td)"}}>Voice</div><div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:14}}>{apiMode==="laozhang"?voiceLz:voice}</div></div>
      </div>
      <button className="btn pri w" disabled={busy||job?.status==="running"||job?.status==="cancelling"} onClick={start}>{busy||job?.status==="running"?<><span className="spin"/> Generating…</>:job?.status==="cancelling"?<><span className="spin"/> Cancelling…</>:<>{ic.mic} Generate · {lines.length} files</>}</button>
      {(job?.status==="running"||job?.status==="cancelling")&&<button className="btn dan w" style={{marginTop:6}} disabled={job?.status==="cancelling"} onClick={cancel}>{job?.status==="cancelling"?<><span className="spin"/> Cancelling…</>:<>✕ Cancel</>}</button>}
      {job&&<ProgBox job={job} onRefresh={()=>jobId&&poll(jobId)}/>}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div className="card">
        <div className="lbl" style={{justifyContent:"space-between"}}>
          <span>{ic.lay} Audio profile</span>
          {profiles.length>0&&<select className="inp" style={{width:"auto",padding:"4px 24px 4px 8px",fontSize:11.5}} value="" onChange={e=>{const p=profiles.find(x=>x.id===e.target.value);if(p)setAudioProfile(p.content);}}>
            <option value="">Load template…</option>
            {profiles.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>}
        </div>
        <textarea className="inp ta" rows={10} value={audioProfile} onChange={e=>setAudioProfile(e.target.value)}/>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input className="inp" placeholder="Template name…" value={profileName} onChange={e=>setProfileName(e.target.value)} style={{flex:1,padding:"6px 10px",fontSize:12}} onKeyDown={e=>e.key==="Enter"&&saveProfile()}/>
          <button className="btn sec" style={{padding:"6px 11px",fontSize:12}} onClick={saveProfile} disabled={!profileName.trim()}>Save</button>
        </div>
        {profiles.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7}}>
          {profiles.map(p=><span key={p.id} style={{display:"inline-flex",alignItems:"center",gap:4,background:"var(--as)",border:"1px solid color-mix(in srgb,var(--ac) 30%,transparent)",borderRadius:6,padding:"2px 7px",fontSize:11}}>
            <span style={{color:"var(--ac)",cursor:"pointer"}} onClick={()=>setAudioProfile(p.content)}>{p.name}</span>
            <button style={{background:"none",border:"none",color:"var(--da)",cursor:"pointer",fontSize:12,lineHeight:1,padding:0}} onClick={()=>delProfile(p.id)}>×</button>
          </span>)}
        </div>}
      </div>
      <div className="card">
        <div className="lbl">{ic.lay} Transcript <span style={{fontSize:10,background:"var(--sus)",color:"var(--su)",padding:"2px 7px",borderRadius:999,marginLeft:6,fontWeight:700}}>¶ = 1 file</span></div>
        <textarea className="inp ta" rows={12} value={transcript} onChange={e=>setTranscript(e.target.value)} placeholder="[tag] First paragraph...\n\n[tag] Second paragraph..."/>
        <p className="hint">Blank line between paragraphs. Each paragraph → one WAV file.</p>
      </div>
      {ttsFiles.length>0&&<div>
        <div style={{fontFamily:"var(--fd)",fontWeight:700,fontSize:14,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>{ic.wave} Generated audio <span style={{fontSize:12,color:"var(--td)",fontWeight:400}}>{ttsFiles.length} files</span></div>
        <div className="audio-list">{ttsFiles.map((f,i)=><div className="acard" key={i}><span className="acap">{f.file}</span><audio controls preload="none" src={f.url} style={{flex:1,height:34}}/><a className="adl" href={f.url} download={f.file}>{ic.dl}</a></div>)}</div>
      </div>}
    </div>
  </div>;
}

/* ─── IMAGEN SECTION (existing) ─── */
function ImagenSection({settings,showToast}){
  const[igModel,setIgModel]=useState("imagen-4.0-generate-001");
  const[aspect,setAspect]=useState("16:9");
  const[resolution,setResolution]=useState("1920x1080");
  const[prefix,setPrefix]=useState("imagen");
  const[apiKey,setApiKey]=useState("");
  const[prompts,setPrompts]=useState([{prompt:"A masterful cinematic match-cut. Left: an ancient Egyptian tomb painting of a woman grinding grain. Right: a modern elderly Egyptian woman performing the same motion. Their hands meet in the center. 8k."}]);
  const[jobId,setJobId]=useState(null);
  const[job,setJob]=useState(null);
  const[igImages,setIgImages]=useState([]);
  const[busy,setBusy]=useState(false);

  const setP=(i,v)=>setPrompts(p=>p.map((x,k)=>k===i?{...x,prompt:v}:x));
  const addP=()=>setPrompts(p=>[...p,{prompt:""}]);
  const delP=i=>setPrompts(p=>p.filter((_,k)=>k!==i));
  const dupP=i=>setPrompts(p=>[...p.slice(0,i+1),{...p[i]},...p.slice(i+1)]);
  const moveP=(i,d)=>setPrompts(p=>{const j=i+d;if(j<0||j>=p.length)return p;const a=[...p];[a[i],a[j]]=[a[j],a[i]];return a;});

  const poll=useCallback(async id=>{try{const j=await api.imagenJob(id);setJob(j);if(j.files?.length)setIgImages(j.files);}catch{}},[]);
  useEffect(()=>{ if(!jobId)return;const iv=setInterval(()=>poll(jobId),3000);return()=>clearInterval(iv); },[jobId,poll]);

  const start=async()=>{
    if(!prompts.length)return showToast("Add prompts","err");
    setBusy(true);
    try{const r=await api.imagenStart({apiKey,model:igModel,prompts:prompts.map(p=>p.prompt).filter(Boolean),outputPrefix:prefix,aspectRatio:aspect,resolution});
      if(r.error)throw new Error(r.error);setJobId(r.jobId);setJob({status:"queued",progress:0,total:r.total,logs:[],files:[]});setIgImages([]);showToast("Imagen started · "+r.total+" prompts","ok");}
    catch(e){showToast(e.message,"err");}setBusy(false);
  };

  return <div>
    <div className="card" style={{marginBottom:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
        <div><div className="lbl">{ic.img2} Model</div><select className="inp" value={igModel} onChange={e=>setIgModel(e.target.value)}>{IMAGEN_MODELS.map(m=><option key={m}>{m}</option>)}</select></div>
        <div><div className="lbl">{ic.ratio} Aspect</div><select className="inp" value={aspect} onChange={e=>setAspect(e.target.value)}>{ASPECTS.map(a=><option key={a}>{a}</option>)}</select></div>
        <div><div className="lbl">{ic.size} Resolution</div><select className="inp" value={resolution} onChange={e=>setResolution(e.target.value)}>{RESOLUTIONS.map(r=><option key={r}>{r}</option>)}</select></div>
        <div><div className="lbl">Prefix</div><input className="inp mono" value={prefix} onChange={e=>setPrefix(e.target.value)}/></div>
        <div style={{gridColumn:"1/-1"}}><div className="lbl">{ic.key} API Key (optional)</div><input className="inp mono" type="password" placeholder="Override .env key" value={apiKey} onChange={e=>setApiKey(e.target.value)}/></div>
      </div>
    </div>
    <div className="sbar">
      <div className="stat">{ic.hash}<div><div className="sl">Prompts</div><div className="sv">{prompts.length}</div></div></div>
      <div className="stat">{ic.img2}<div><div className="sl">Model</div><div className="sv sm">{igModel}</div></div></div>
      <div className="sf"/>
      <button className="btn pri" disabled={busy||job?.status==="running"} onClick={start}>{busy||job?.status==="running"?<><span className="spin"/> Generating…</>:<>{ic.img2} Generate · {prompts.length} images</>}</button>
    </div>
    {job&&<ProgBox job={job} onRefresh={()=>jobId&&poll(jobId)}/>}
    <div className="jobs-list" style={{marginTop:14}}>
      {prompts.map((p,i)=><div className="job-row" key={i}>
        <div className="job-rail"><span className="jkey">{String(i+1).padStart(3,"0")}</span><div style={{display:"flex",flexDirection:"column",gap:3}}><button className="tiny" disabled={i===0} onClick={()=>moveP(i,-1)}>{ic.up}</button><button className="tiny" disabled={i===prompts.length-1} onClick={()=>moveP(i,1)}>{ic.dn}</button></div></div>
        <div className="job-main">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontFamily:"var(--fm)",fontSize:11,color:"var(--td)"}}>{prefix}_{String(i+1).padStart(3,"0")}.jpeg</span>
            <div style={{display:"flex",gap:5}}><button className="tiny" onClick={()=>dupP(i)}>{ic.dup}</button><button className="tiny del" onClick={()=>delP(i)}>{ic.trash}</button></div>
          </div>
          <textarea className="inp" rows={3} value={p.prompt} placeholder="Image prompt…" onChange={e=>setP(i,e.target.value)} style={{resize:"vertical",fontSize:12,color:"var(--td)"}}/>
        </div>
      </div>)}
    </div>
    <button className="add-btn" style={{marginTop:10}} onClick={addP}>{ic.plus} Add prompt</button>
    {igImages.length>0&&<><div style={{marginTop:16,marginBottom:8,fontFamily:"var(--fd)",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:8}}>{ic.img2} Generated images <span style={{fontSize:12,color:"var(--td)",fontWeight:400}}>{igImages.length} files</span></div>
      <div className="gallery">{igImages.map((im,i)=><a className="gc" key={i} href={im.url} target="_blank" rel="noreferrer"><img src={im.url} alt={im.file} loading="lazy"/><div className="cap">{im.file}</div></a>)}</div></>}
  </div>;
}

/* ─── MCP SECTION ─── */
function McpSection({showToast}){
  const[mcpStatus,setMcpStatus]=useState(null);
  const[files,setFiles]=useState([]);
  const[mode,setModeInfo]=useState(null);
  const[toolModels,setToolModels]=useState([]);
  const[query,setQuery]=useState("");
  const[searchType,setSearchType]=useState("keyword");
  const[results,setResults]=useState([]);
  const[busy,setBusy]=useState("");

  // Folder changer
  const[folderInput,setFolderInput]=useState("");
  const[folderBusy,setFolderBusy]=useState(false);

  // SRT Polish
  const[srtFile,setSrtFile]=useState("");
  const[scriptFile,setScriptFile]=useState("");
  const[srtModel,setSrtModel]=useState("gpt-4o-mini");
  const[srtApiKey,setSrtApiKey]=useState(()=>localStorage.getItem("rc_lzkey")||"");
  const[srtApiMode,setSrtApiMode]=useState("laozhang");
  const[srtGoogleKeys,setSrtGoogleKeys]=useState(()=>localStorage.getItem("rc_srt_gkeys")||"");
  useEffect(()=>{localStorage.setItem("rc_srt_gkeys",srtGoogleKeys);},[srtGoogleKeys]);
  const[numBatches,setNumBatches]=useState(3);
  const[parallelMode,setParallelMode]=useState(true);
  const[srtBusy,setSrtBusy]=useState(false);
  const[srtResult,setSrtResult]=useState(null); // {changes, blocks, batches, batch_errors, srt}
  const srtAbortRef=useRef(null);

  useEffect(()=>{ refresh(); },[]);

  const refresh=async()=>{
    try{
      const s=await api.mcpStatus();
      setMcpStatus(s);
      if(s.available){
        const fRes=await api.mcpFiles();
        setFiles(fRes.files||[]);
        try{const m=await fetch("/api/mcp/mode").then(r=>r.json());setModeInfo(m);}catch{}
      }
      try{const tm=await fetch("/api/mcp/tool-models").then(r=>r.json());setToolModels(tm.tool_capable||[]);}catch{}
    }catch{setMcpStatus({available:false});}
  };

  const setFolder=async()=>{
    if(!folderInput.trim())return;
    setFolderBusy(true);
    try{
      const r=await api.mcpSetFolder({folder:folderInput.trim()});
      if(r.error)throw new Error(r.error);
      showToast("Folder updated — reindexing in background","ok");
      setFolderInput("");
      // Refresh status after a short delay to let index start
      setTimeout(()=>refresh(),1500);
    }catch(e){showToast(e.message,"err");}
    setFolderBusy(false);
  };

  const search=async()=>{
    if(!query.trim())return;
    setBusy("search");
    try{
      let r;
      if(searchType==="semantic"){
        r=await fetch("/api/mcp/search_semantic?q="+encodeURIComponent(query)+"&top_k=10").then(x=>x.json());
        setResults((r.results||[]).map(x=>({path:x.path,text:x.text,score:x.score})));
      }else{
        r=await api.mcpSearch(query);
        const flat=(r.results||[]).flatMap(f=>(f.hits||[]).map(h=>({path:f.file,text:h.text,line:h.line})));
        setResults(flat);
      }
    }catch(e){showToast(e.message,"err");}
    setBusy("");
  };

  const reindex=async()=>{
    setBusy("ri");
    try{await api.mcpReindex();showToast("Reindex started","ok");}
    catch(e){showToast(e.message,"err");}
    setBusy("");
  };

  const polishSrt=async()=>{
    if(!srtFile.trim()||!scriptFile.trim())return showToast("Select SRT and script files","err");
    const ctrl=new AbortController();srtAbortRef.current=ctrl;
    setSrtBusy(true);setSrtResult(null);
    try{
      const r=await fetch("/api/mcp/srt/polish",{method:"POST",headers:{"Content-Type":"application/json"},
        signal:ctrl.signal,
        body:JSON.stringify({
        srt_path:srtFile.trim(),
        script_path:scriptFile.trim(),
        model:srtModel,
        api_key:srtApiKey,
        api_provider:srtApiMode,
        google_api_key:srtApiMode==="google"?(srtGoogleKeys.split("\n").map(k=>k.trim()).filter(Boolean)[0]||""):"",
        num_batches:numBatches,
        parallel:parallelMode,
        })}).then(res=>res.json());
      if(r.error)throw new Error(r.error);
      setSrtResult(r);
      showToast(`Done — ${r.changes} corrections in ${r.blocks} blocks`,"ok");
    }catch(e){
      if(e.name==="AbortError")showToast("Cancelled","ok");
      else showToast(e.message,"err");
    }
    srtAbortRef.current=null;
    setSrtBusy(false);
  };
  const cancelSrt=()=>{srtAbortRef.current?.abort();};

  const downloadSrt=()=>{
    if(!srtResult?.srt)return;
    const name=(srtFile.replace(/\.srt$/i,"")||"subtitle")+"_polished.srt";
    const b=new Blob([srtResult.srt],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);
  };

  // Derived file lists for SRT picker
  const srtFiles=files.filter(f=>(f.path||f.name||f).endsWith(".srt"));
  const scriptFiles=files.filter(f=>{const p=f.path||f.name||f;return p.endsWith(".txt")||p.endsWith(".md");});

  const codeStyle={fontFamily:"var(--fm)",fontSize:11.5,background:"var(--be2)",padding:"2px 6px",borderRadius:4};

  return <div>
    {/* Status bar */}
    <div className="mcp-status">
      <div className={"mcp-dot "+(mcpStatus?.available?"on":"off")}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,fontSize:13}}>{mcpStatus?.available?"MCP Server Connected":"MCP Server Offline"}</div>
        <div style={{fontSize:11,color:"var(--td)",display:"flex",gap:10,flexWrap:"wrap",marginTop:2}}>
          {mcpStatus?.available&&<><span>📁 {mcpStatus.folder||"folder"}</span><span>📄 {mcpStatus.files||files.length} files</span></>}
          {mode&&<span>🔍 {mode.current_mode||mode.current||mode.mode||"bm25"}</span>}
          {!mcpStatus?.available&&<span>Start: <code style={codeStyle}>docker compose --profile mcp up</code></span>}
        </div>
      </div>
      <button className="btn sec" style={{padding:"6px 10px",fontSize:12}} onClick={refresh}>{ic.refresh}</button>
    </div>

    {/* ── Change Folder ── */}
    <div className="card" style={{marginBottom:12}}>
      <div className="lbl">{ic.folder} Change Folder</div>
      <p style={{fontSize:12,color:"var(--td)",marginBottom:8,lineHeight:1.5}}>
        Enter a folder path (absolute, or relative inside <code style={codeStyle}>/mcp-folder</code>).
        The server will switch folders and reindex automatically in the background.
      </p>
      <div style={{display:"flex",gap:8}}>
        <input className="inp" placeholder="e.g.  subtitles  or  /mcp-folder/season2"
          value={folderInput} onChange={e=>setFolderInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&setFolder()}/>
        <button className="btn pri" style={{whiteSpace:"nowrap"}} disabled={folderBusy||!folderInput.trim()} onClick={setFolder}>
          {folderBusy?<><span className="spin"/> Switching…</>:<>{ic.refresh} Submit</>}
        </button>
      </div>
    </div>

    {mcpStatus?.available&&<>
      {/* Mode info */}
      {mode&&<div className="card" style={{marginBottom:12}}>
        <div className="lbl">🔍 Search mode</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {(Object.keys(mode.available_modes||{})||["bm25","local","api","hybrid"]).map(m=>(
            <span key={m} style={{padding:"4px 10px",borderRadius:7,fontSize:12,fontFamily:"var(--fm)",
              background:m===(mode.current_mode||mode.current||mode.mode)?"var(--as)":"var(--be2)",
              color:m===(mode.current_mode||mode.current||mode.mode)?"var(--ac)":"var(--td)",
              border:"1px solid "+(m===(mode.current_mode||mode.current||mode.mode)?"var(--ac)":"var(--br)")}}>
              {m}
            </span>
          ))}
        </div>
        <p className="hint" style={{marginTop:6}}>Change mode: restart MCP with <code style={codeStyle}>--search hybrid</code></p>
      </div>}

      {/* File list */}
      <div className="card" style={{marginBottom:12}}>
        <div className="lbl">{ic.folder} Indexed files ({files.length})</div>
        <div className="file-list">{files.slice(0,60).map((f,i)=><div className="file-item" key={i}>{f.path||f.name||f}</div>)}</div>
        {files.length>60&&<p className="hint">…and {files.length-60} more</p>}
        <button className="btn sec" style={{marginTop:10,padding:"7px 14px",fontSize:12}} disabled={busy==="ri"} onClick={reindex}>
          {busy==="ri"?<><span className="spin"/> Indexing…</>:<>{ic.refresh} Re-index</>}
        </button>
      </div>

      {/* ── SRT Polish ── */}
      <div className="card" style={{marginBottom:12}}>
        <div className="lbl">🎬 SRT Polish</div>
        <p style={{fontSize:12,color:"var(--td)",marginBottom:12,lineHeight:1.5}}>
          Fix spelling, capitalization, and proper nouns in a subtitle file by cross-referencing a script.
          Timestamps and block structure are never touched.
        </p>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
          <div className="api-toggle">
            <button className={"google "+(srtApiMode==="google"?"on":"")} onClick={()=>{setSrtApiMode("google");const gm=["gemini-2.5-flash-lite","gemini-2.5-flash","gemini-3-flash-preview","gemini-2.5-pro","gemini-3.1-pro-preview"];if(!gm.includes(srtModel))setSrtModel("gemini-2.5-flash");}}>🔵 Google API</button>
            <button className={"lz "+(srtApiMode==="laozhang"?"on":"")} onClick={()=>setSrtApiMode("laozhang")}>🟣 LaoZhang API</button>
          </div>
          {srtApiMode==="google"&&<span style={{fontSize:10.5,color:"var(--su)"}}>uses server Gemini key</span>}
          {srtApiMode==="laozhang"&&<span style={{fontSize:10.5,color:"var(--ac)"}}>uses LaoZhang key</span>}
        </div>
        <div className="row2" style={{marginBottom:10}}>
          <div>
            <div className="lbl">SRT file</div>
            {srtFiles.length>0
              ?<select className="inp" value={srtFile} onChange={e=>setSrtFile(e.target.value)}>
                  <option value="">— select .srt —</option>
                  {srtFiles.map((f,i)=>{const p=f.path||f.name||f;return<option key={i} value={p}>{p}</option>;})}
                </select>
              :<input className="inp" placeholder="episode1.srt" value={srtFile} onChange={e=>setSrtFile(e.target.value)}/>}
          </div>
          <div>
            <div className="lbl">Script file (.txt / .md)</div>
            {scriptFiles.length>0
              ?<select className="inp" value={scriptFile} onChange={e=>setScriptFile(e.target.value)}>
                  <option value="">— select script —</option>
                  {scriptFiles.map((f,i)=>{const p=f.path||f.name||f;return<option key={i} value={p}>{p}</option>;})}
                </select>
              :<input className="inp" placeholder="episode1.txt" value={scriptFile} onChange={e=>setScriptFile(e.target.value)}/>}
          </div>
        </div>
        <div className="row2" style={{marginBottom:10}}>
          <div>
            <div className="lbl">AI model</div>
            <select className="inp" value={srtModel} onChange={e=>setSrtModel(e.target.value)}>
              <optgroup label="⚡ Lite">
                {srtApiMode==="laozhang"&&<option value="gpt-4o-mini">GPT-4o Mini</option>}
                {srtApiMode==="laozhang"&&<option value="gpt-5-nano">GPT-5 Nano</option>}
                <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                {srtApiMode==="laozhang"&&<option value="deepseek-v3-250324">DeepSeek V3</option>}
                {srtApiMode==="laozhang"&&<option value="glm-4.5-flash">GLM 4.5 Flash</option>}
              </optgroup>
              <optgroup label="⚡⚡ Medium">
                {srtApiMode==="laozhang"&&<option value="gpt-4o">GPT-4o</option>}
                {srtApiMode==="laozhang"&&<option value="gpt-5">GPT-5</option>}
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
                {srtApiMode==="laozhang"&&<option value="claude-sonnet-4-6-thinking">Claude Sonnet 4.6 Thinking</option>}
                {srtApiMode==="laozhang"&&<option value="grok-4-latest">Grok 4</option>}
                {srtApiMode==="laozhang"&&<option value="qwen-max">Qwen Max</option>}
              </optgroup>
              <optgroup label="⚡⚡⚡ Power">
                {srtApiMode==="laozhang"&&<option value="claude-sonnet-4-6-thinking">Claude Sonnet 4.6 Thinking</option>}
                {srtApiMode==="laozhang"&&<option value="claude-opus-4-6">Claude Opus 4.6</option>}
                {srtApiMode==="laozhang"&&<option value="claude-opus-4-7">Claude Opus 4.7</option>}
                <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
              </optgroup>
            </select>
          </div>
          <div>
            {srtApiMode==="laozhang"
              ?<><div className="lbl">LaoZhang API key</div>
                <input className="inp mono" type="password" placeholder="sk-…" value={srtApiKey}
                  onChange={e=>{setSrtApiKey(e.target.value);localStorage.setItem("rc_lzkey",e.target.value);}}/></>
              :<><div className="lbl">{ic.key} Google API keys <span style={{fontSize:10,background:"var(--as)",color:"var(--ac)",padding:"2px 7px",borderRadius:999,marginLeft:4}}>rotation</span></div>
                <textarea className="inp ta mono" rows={3} value={srtGoogleKeys}
                  placeholder={"One key per line\n(blank = use server GEMINI_API_KEY)"}
                  onChange={e=>setSrtGoogleKeys(e.target.value)}
                  style={{minHeight:72,fontSize:11.5}}/></>
            }
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div className="lbl">Batches <span style={{fontSize:10,color:"var(--tf)",fontWeight:400}}>— 1000 blocks ÷ 3 batches = ~333 blocks per AI call</span></div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            {[2,3,5,10].map(n=><button key={n} className={"btn "+(numBatches===n?"pri":"sec")} style={{padding:"5px 14px",fontSize:12}} onClick={()=>setNumBatches(n)}>{n} batches</button>)}
            <div style={{width:1,height:20,background:"var(--br)",margin:"0 4px"}}/>
            <button className={"btn "+(parallelMode?"pri":"sec")} style={{padding:"5px 14px",fontSize:12}} onClick={()=>setParallelMode(p=>!p)}>
              {parallelMode?"⚡ Parallel":"🔁 Sequential"}
            </button>
            <span style={{fontSize:11,color:"var(--td)"}}>
              {parallelMode?`~${numBatches} calls at once — faster`:`~${numBatches} calls one by one — safer`}
            </span>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <button className="btn pri" disabled={srtBusy||!srtFile||!scriptFile} onClick={polishSrt}>
            {srtBusy?<><span className="spin"/> Polishing…</>:"✨ Polish SRT"}
          </button>
          {srtBusy&&<button className="btn sec" style={{padding:"6px 12px",fontSize:12,color:"var(--er)"}} onClick={cancelSrt}>✕ Cancel</button>}
          {srtBusy&&<span style={{fontSize:12,color:"var(--td)"}}>Processing {numBatches} batches, this may take a few minutes…</span>}
          {srtResult&&<>
            <span style={{fontSize:12,color:"var(--su)",fontWeight:600}}>
              ✓ {srtResult.changes} fixes across {srtResult.blocks} blocks
            </span>
            <button className="btn sec" style={{padding:"6px 12px",fontSize:12}} onClick={downloadSrt}>
              {ic.dload} Download .srt
            </button>
          </>}
        </div>
        {srtResult?.batch_errors?.length>0&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:8,background:"var(--was)",border:"1px solid color-mix(in srgb,var(--wa) 30%,transparent)"}}>
          <div style={{fontSize:11.5,color:"var(--wa)",fontWeight:600,marginBottom:4}}>⚠ Some batches fell back to original text:</div>
          {srtResult.batch_errors.map((e,i)=><div key={i} style={{fontSize:11,color:"var(--wa)",fontFamily:"var(--fm)"}}>{e}</div>)}
        </div>}
      </div>

      {/* Search */}
      <div className="card" style={{marginBottom:12}}>
        <div className="lbl">{ic.hash} Search files</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div className="api-toggle">
            <button className={"lz "+(searchType==="keyword"?"on":"")} onClick={()=>setSearchType("keyword")}>BM25</button>
            <button className={"google "+(searchType==="semantic"?"on":"")} onClick={()=>setSearchType("semantic")}>Semantic</button>
          </div>
          <span style={{fontSize:10.5,color:"var(--td)",alignSelf:"center"}}>{searchType==="semantic"?"chunk-based semantic search":"keyword matching"}</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input className="inp" placeholder="Search your documents…" value={query}
            onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()}/>
          <button className="btn pri" disabled={busy==="search"} onClick={search}>
            {busy==="search"?<span className="spin"/>:ic.send}
          </button>
        </div>
        {busy==="search"&&<div style={{padding:"10px 0",fontSize:12,color:"var(--td)",display:"flex",alignItems:"center",gap:8}}><span className="spin"/> Searching…</div>}
        {results.length===0&&busy===""&&query.trim()&&<div style={{padding:"10px 0",fontSize:12,color:"var(--td)"}}>No results found for "<strong>{query}</strong>" — try different keywords or switch to Semantic</div>}
        {results.map((r,i)=><div key={i} style={{background:"var(--be2)",border:"1px solid var(--br)",borderRadius:9,padding:"10px 12px",marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontFamily:"var(--fm)",fontSize:11,color:"var(--ac)"}}>{r.path||r.file}</span>
            {r.line!=null&&<span style={{fontFamily:"var(--fm)",fontSize:10,color:"var(--td)"}}>line {r.line}</span>}
            {r.score!=null&&<span style={{fontFamily:"var(--fm)",fontSize:10,color:"var(--td)"}}>score: {(r.score*100).toFixed(1)}%</span>}
          </div>
          <div style={{fontSize:12,color:"var(--td)",lineHeight:1.5,fontFamily:"var(--fm)",whiteSpace:"pre-wrap"}}>{r.text||r.content||r.excerpt}</div>
        </div>)}
      </div>
    </>}

    {/* Tool-capable models */}
    {toolModels.length>0&&<div className="card" style={{marginBottom:12}}>
      <div className="lbl">⚡ Tool-capable models ({toolModels.length})</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {toolModels.map(m=><span key={m} style={{fontFamily:"var(--fm)",fontSize:11,background:"var(--as)",color:"var(--ac)",padding:"3px 8px",borderRadius:5}}>{m}</span>)}
      </div>
      <p className="hint" style={{marginTop:6}}>These models support agentic tool calling. Enable MCP toggle in Chat.</p>
    </div>}

    {/* Setup guide */}
    <div className="card">
      <div className="lbl">{ic.key} Setup</div>
      <div style={{fontSize:12.5,color:"var(--td)",lineHeight:2}}>
        <div><strong>Start MCP sidecar:</strong> <code style={codeStyle}>docker compose --profile mcp up</code></div>
        <div><strong>Set folder:</strong> use the "Change Folder" card above, or set <code style={codeStyle}>MCP_FOLDER=./your-folder</code> in <code style={codeStyle}>.env</code></div>
        <div><strong>Search mode:</strong> <code style={codeStyle}>MCP_SEARCH_MODE=hybrid</code> (bm25 | local | api | hybrid)</div>
        <div><strong>SRT Polish:</strong> put <code style={codeStyle}>.srt</code> + <code style={codeStyle}>.txt/.md</code> in the same MCP folder, then use the Polish card above</div>
      </div>
    </div>
  </div>;
}

/* ─── SETTINGS PANEL ─── */
function SettingsPanel({settings,setSettings,onClose}){
  return <div className="overlay" onClick={onClose}>
    <aside className="panel" onClick={e=>e.stopPropagation()}>
      <div className="panel-hdr"><h2>{ic.gear} Settings</h2><button className="btn sec" style={{padding:"6px 9px"}} onClick={onClose}>{ic.close}</button></div>
      <div className="panel-body">
        <div>
          <div className="lbl">{ic.batch} Batch image model</div>
          <div className="mc-grid">{BATCH_MODELS.map(m=>{const on=m.id===settings.batchModelId;return<button key={m.id} className={"mc "+(on?"on":"")} onClick={()=>setSettings(s=>({...s,batchModelId:m.id}))}>
            <div className="mc-top">{m.icon}<span className="mc-tag">{m.tag}</span>{on&&<span className="mc-chk">{ic.check}</span>}</div>
            <div className="mc-name">{m.label}</div><div className="mc-blurb">{m.blurb}</div><code className="mc-id">{m.id}</code>
          </button>;})}</div>
        </div>

/* ─── SCRIPT → TTS SECTION ─── */
function ScriptTtsSection({settings,showToast}){
  const[apiMode,setApiMode]=useState(()=>localStorage.getItem("rc_stts_mode")||"laozhang");
  const[chatModel,setChatModel]=useState(()=>localStorage.getItem("rc_stts_model")||"gemini-2.5-flash");
  const[googleKey,setGoogleKey]=useState(()=>localStorage.getItem("rc_stts_gkey")||"");
  const[script,setScript]=useState(()=>localStorage.getItem("rc_stts_script")||"");
  const[transcript,setTranscript]=useState(()=>localStorage.getItem("rc_stts_transcript")||"");
  const[busy,setBusy]=useState(false);

  useEffect(()=>{localStorage.setItem("rc_stts_mode",apiMode);},[apiMode]);
  useEffect(()=>{localStorage.setItem("rc_stts_model",chatModel);},[chatModel]);
  useEffect(()=>{localStorage.setItem("rc_stts_gkey",googleKey);},[googleKey]);
  useEffect(()=>{localStorage.setItem("rc_stts_script",script);},[script]);
  useEffect(()=>{localStorage.setItem("rc_stts_transcript",transcript);},[transcript]);
  useEffect(()=>{
    if(apiMode==="google")setChatModel(m=>m.startsWith("gemini")?"gemini-2.5-flash":m);
    else setChatModel(m=>m.startsWith("gemini")?"gemini-2.5-flash":m);
  },[apiMode]);

  const paragraphs=useMemo(()=>transcript.trim().split(/\n\n+/).filter(p=>p.trim()),[transcript]);

  // ── Generate image for a single scene ──────────────────────────────
  const regenSceneImage=async(scene,idx)=>{
    const currentImageModel=apiMode==="google"?gImageModel:imageModel;
    const prompt=buildImagePrompt(scene,imgStyle);
    setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:"__loading__"}:s));
    try{
      let b64="";
      if(apiMode==="google"&&!FLOW_LZ_IMG_MODELS.has(currentImageModel)){
        const r=await fetch("/api/flow/storyboard/google",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({scenes:[{...scene,index:0}],model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        b64=(r.images||[])[0]?.image_b64||"";
      }else{
        const r=await fetch("/api/flow/images/native",{method:"POST",
          headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
          body:JSON.stringify({scenes:[{...scene,index:0}],model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        b64=(r.images||[])[0]?.image_b64||"";
      }
      setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:b64||""}:s));
      if(!b64)showToast("Image generated but no preview returned","info");
      else showToast("Scene "+(idx+1)+" image regenerated","ok");
    }catch(e){
      setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:""}:s));
      showToast("Regen failed: "+e.message,"err");
    }
  };

  // ── Generate images for ALL scenes (or selected) ─────────────────
  const generateAllImages=async()=>{
    if(genAllImgBusy)return;
    const targets=scenes.map((s,i)=>({s,i})).filter(({i})=>sceneImgSel[i]!==false); // all by default
    if(!targets.length)return showToast("No scenes selected","err");
    setGenAllImgBusy(true);
    showToast("Generating "+targets.length+" images…","ok");
    const currentImageModel=apiMode==="google"?gImageModel:imageModel;
    try{
      const scenesPayload=targets.map(({s,i})=>({...s,index:i}));
      let imgMap={};
      if(apiMode==="google"&&!FLOW_LZ_IMG_MODELS.has(currentImageModel)){
        const r=await fetch("/api/flow/storyboard/google",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({scenes:scenesPayload,model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        imgMap=Object.fromEntries((r.images||[]).map(im=>[im.index,im.image_b64]));
      }else{
        const r=await fetch("/api/flow/images/native",{method:"POST",
          headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
          body:JSON.stringify({scenes:scenesPayload,model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        imgMap=Object.fromEntries((r.images||[]).map(im=>[im.index,im.image_b64]));
      }
      setScenes(prev=>prev.map((s,i)=>{
        const b64=imgMap[i];
        return b64!==undefined?{...s,image_b64:b64}:s;
      }));
      showToast("Done: "+targets.length+" images generated","ok");
    }catch(e){showToast("Generate all images failed: "+e.message,"err");}
    setGenAllImgBusy(false);
  };

  // ── Submit ALL videos ────────────────────────────────────────────
  const submitAllVeo=async()=>{
    if(genAllVeoBusy)return;
    const hasPicked=Object.keys(videoPicked).length>0;
    const targets=scenes.map((s,i)=>({s,i})).filter(({i})=>{
      if(hasPicked&&!videoPicked[i])return false; // respect AI picks if set
      return !sceneVeo[i]||sceneVeo[i].status==="error";
    });
    if(!targets.length)return showToast(hasPicked?"All picked scenes already submitted":"All scenes already submitted","info");
    setGenAllVeoBusy(true);
    showToast("Submitting "+targets.length+" videos…","ok");
    for(const {s,i} of targets){
      await submitSceneVeo(s,i);
      await new Promise(r=>setTimeout(r,2500)); // pace to stay under upstream rate limits
    }
    setGenAllVeoBusy(false);
    showToast("All videos submitted","ok");
  };

  // ── Poll ALL pending videos ──────────────────────────────────────
  const pollAllVeo=async()=>{
    const pending=Object.entries(sceneVeo).filter(([,v])=>v?.taskId&&v.status!=="succeeded"&&v.status!=="completed"&&v.status!=="error");
    if(!pending.length)return showToast("No pending videos to poll","info");
    await Promise.all(pending.map(([idx,v])=>pollSceneVeo(Number(idx),v.taskId)));
    showToast("Polled "+pending.length+" videos","ok");
  };

  const generate=async()=>{
    if(!script.trim())return showToast("Enter a script","err");
    setBusy(true);
    try{
      let r;
      if(apiMode==="google"){
        r=await api.scriptTtsGoogle({script,model:chatModel,...(googleKey.trim()&&{google_api_key:googleKey.trim()})});
      }else{
        r=await fetch("/api/script/tts",{method:"POST",
          headers:{"Content-Type":"application/json","X-DeepSeek-Route":settings?.deepseekRoute||"deepseek"},
          body:JSON.stringify({script,model:chatModel})}).then(r=>r.json());
      }
      if(r.error)throw new Error(r.error);
      setTranscript(r.transcript||"");
      showToast(`${r.count} paragraphs generated`,"ok");
    }catch(e){showToast(e.message||"Failed","err");}
    setBusy(false);
  };

  const downloadTxt=()=>{
    if(!transcript.trim())return;
    const b=new Blob([transcript],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="tts-transcript.txt";a.click();URL.revokeObjectURL(a.href);
  };

  const sendToTts=()=>{
    if(!transcript.trim())return showToast("No transcript to send","err");
    if(_importTtsFn)_importTtsFn(transcript);
    else _pendingTtsImport=transcript;
    settings.setPage("tts");
  };

  const lzModels=[
    {value:"gpt-5-nano",label:"GPT-5 Nano — $0.05/$0.40"},
    {value:"gpt-5.4-nano",label:"GPT-5.4 Nano — $0.20/$1.25"},
    {value:"gpt-5-mini",label:"GPT-5 Mini — $0.25/$2.00"},
    {value:"gpt-5.4-mini",label:"GPT-5.4 Mini — $0.75/$4.50"},
    {value:"gpt-4o-mini",label:"GPT-4o Mini — $0.15/$0.60"},
    {value:"gemini-2.5-flash",label:"Gemini 2.5 Flash"},
    {value:"gpt-5.1",label:"GPT-5.1 — $1.25/$10.00"},
    {value:"gpt-5",label:"GPT-5 — $1.25/$10.00"},
    {value:"gpt-5.2",label:"GPT-5.2 — $1.75/$14.00"},
    {value:"gpt-4o",label:"GPT-4o — $2.50/$10.00"},
    {value:"gemini-2.5-pro",label:"Gemini 2.5 Pro"},
    {value:"gpt-5.4",label:"GPT-5.4 — $2.50/$15.00"},
    {value:"claude-sonnet-4-6",label:"Claude Sonnet 4.6"},
    {value:"claude-sonnet-4-6-thinking",label:"Claude Sonnet 4.6 Thinking"},
    {value:"claude-opus-4-6",label:"Claude Opus 4.6"},
    {value:"claude-opus-4-7",label:"Claude Opus 4.7"},
    {value:"gpt-5.5",label:"GPT-5.5 — $5.00/$30.00"},
    {value:"deepseek-v3-250324",label:"DeepSeek V3"},
    {value:"deepseek-v4-pro",label:"DeepSeek V4 Pro"},
    {value:"deepseek-r1",label:"DeepSeek R1 — reasoning"},
    {value:"gpt-5-pro",label:"GPT-5 Pro — $15/$120"},
  ];
  const gModels=[
    {value:"gemini-2.5-flash",        label:"Gemini 2.5 Flash"},
    {value:"gemini-2.5-pro",          label:"Gemini 2.5 Pro"},
    {value:"gemini-3-flash-preview",  label:"Gemini 3 Flash $0.5/$3"},
    {value:"gemini-3.1-flash-lite",   label:"Gemini 3.1 Flash Lite $0.25/$1.5"},
    {value:"gemini-3.5-flash",        label:"Gemini 3.5 Flash $1.5/$9"},
    {value:"gemini-3.1-pro-preview",  label:"Gemini 3.1 Pro $2/$12 - $4/$18"},
  ];
  const models=apiMode==="google"?gModels:lzModels;

  const googleKeySlot=<input className="inp mono" type="password"
    placeholder="Gemini key (blank = server .env)"
    value={googleKey} onChange={e=>setGoogleKey(e.target.value)}
    style={{width:180,padding:"5px 9px",fontSize:11.5}}/>;

  return <div>
    <ApiToggle value={apiMode} onChange={setApiMode} keySlot={googleKeySlot}/>

    {/* Model + Generate */}
    <div className="card" style={{marginBottom:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div>
          <div className="lbl">{ic.chat} AI Model</div>
          <select className="inp" value={chatModel} onChange={e=>setChatModel(e.target.value)}>
            {models.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
        </div>
        <div style={{display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"var(--be)",border:"1px solid var(--br)",borderRadius:10,padding:"8px 14px",fontSize:12,color:"var(--td)",lineHeight:1.6,flex:1}}>
            <strong style={{color:"var(--t)"}}>Tags available:</strong> [curiosity] [wonder] [weight] [gravity] [revelation] [deadpan] [melancholy] [intimacy] [urgency] [wry] [reflection] [sadness] [joy] [humor] [suspense] + context-driven
          </div>
        </div>
      </div>
      <div className="lbl">{ic.flow} Script</div>
      <textarea className="inp ta" rows={8} value={script}
        placeholder={"Paste your narration script here...\n\nExample:\nDi sinilah pertanyaan paling memikat muncul: apakah kenangan tentang serangkaian banjir ribuan tahun ini tertanam dalam tradisi lisan yang kemudian menjadi cerita-cerita banjir besar dalam mitologi dunia?"}
        onChange={e=>setScript(e.target.value)}/>
      <button className="btn pri w lg" style={{marginTop:12}} disabled={busy||!script.trim()} onClick={generate}>
        {busy?<><span className="spin"/> Transforming script…</>:<>{ic.mic} Transform → TTS Script</>}
      </button>
    </div>

    {/* Output */}
    {transcript&&<div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
        <span style={{fontSize:13,fontWeight:700,color:"var(--t)"}}>{paragraphs.length} paragraphs</span>
        <div style={{flex:1}}/>
        <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={downloadTxt}>{ic.dload} Download .txt</button>
        <button className="btn pri" style={{padding:"5px 12px",fontSize:11.5}} onClick={sendToTts}>{ic.mic} Send to TTS</button>
        <button className="btn sec" style={{padding:"5px 12px",fontSize:11.5}} onClick={()=>{setTranscript("");localStorage.removeItem("rc_stts_transcript");}}>{ic.trash} Clear</button>
      </div>

      {/* Paragraph preview */}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
        {paragraphs.map((p,i)=>{
          const tagMatch=p.match(/^\[([^\]]+)\]/);
          const tag=tagMatch?tagMatch[1]:"";
          const text=p.replace(/^\[[^\]]+\]\s*/,"");
          const tagColors={curiosity:"var(--ac)",wonder:"#8b5cf6",weight:"#64748b",gravity:"#374151",revelation:"#f59e0b",deadpan:"#6b7280",melancholy:"#6366f1",intimacy:"#ec4899",urgency:"#ef4444",wry:"#10b981",reflection:"#0ea5e9",sadness:"#6366f1",joy:"#f59e0b",humor:"#10b981",suspense:"#8b5cf6",information:"var(--ac)"};
          const col=tagColors[tag]||"var(--td)";
          return <div key={i} style={{background:"var(--be2)",border:"1px solid var(--br)",borderRadius:9,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
            <span style={{fontFamily:"var(--fm)",fontSize:11,fontWeight:700,color:col,background:"color-mix(in srgb,"+col+" 12%,transparent)",border:"1px solid color-mix(in srgb,"+col+" 25%,transparent)",borderRadius:5,padding:"2px 7px",whiteSpace:"nowrap",marginTop:1}}>{tag||"…"}</span>
            <span style={{fontSize:13,color:"var(--t)",lineHeight:1.6,flex:1}}>{text}</span>
          </div>;
        })}
      </div>

      {/* Editable raw transcript */}
      <div className="card">
        <div className="lbl">{ic.lay} Edit transcript</div>
        <textarea className="inp ta mono" rows={14} value={transcript} onChange={e=>setTranscript(e.target.value)} style={{fontSize:12.5,lineHeight:1.7}}/>
        <p className="hint">Blank line = paragraph break = one TTS file. Edit tags or text directly here.</p>
      </div>
    </div>}
  </div>;
}

// ── REVIEW MARKDOWN RENDERER ─────────────────────────────────────────────────
function parseReviewMarkdown(text){
  const lines=text.split("\n");
  const sections=[];
  let cur=null;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    const h2=l.match(/^##\s+(.+)/);
    if(h2){
      if(cur)sections.push(cur);
      cur={type:"section",title:h2[1],lines:[]};
    } else if(cur){
      cur.lines.push(l);
    } else {
      if(!sections.length||sections[sections.length-1].type!=="intro"){
        sections.push({type:"intro",lines:[]});
      }
      sections[sections.length-1].lines.push(l);
    }
  }
  if(cur)sections.push(cur);
  return sections;
}

function parseInline(text){
  // bold, italic, code
  const parts=[];
  const re=/(\*\*(.+?)\*\*|\*(.+?)\*|`(.+?)`)/g;
  let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last)parts.push(text.slice(last,m.index));
    if(m[2])parts.push(<strong key={m.index}>{m[2]}</strong>);
    else if(m[3])parts.push(<em key={m.index}>{m[3]}</em>);
    else if(m[4])parts.push(<code key={m.index} style={{background:"var(--be2)",padding:"1px 5px",borderRadius:4,fontSize:"0.9em",fontFamily:"var(--fm)"}}>{m[4]}</code>);
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(text.slice(last));
  return parts.length===1&&typeof parts[0]==="string"?text:parts;
}

function parseTable(lines){
  const rows=lines.filter(l=>l.trim().startsWith("|")&&!l.match(/^\|[-| ]+\|$/));
  if(!rows.length)return null;
  return rows.map(r=>r.split("|").slice(1,-1).map(c=>c.trim()));
}

function renderSectionLines(lines){
  const blocks=[];
  let i=0;
  while(i<lines.length){
    const l=lines[i];
    // table
    if(l.trim().startsWith("|")){
      const tbl=[];
      while(i<lines.length&&lines[i].trim().startsWith("|")){tbl.push(lines[i]);i++;}
      const rows=parseTable(tbl);
      if(rows){
        blocks.push(
          <div key={i} style={{overflowX:"auto",margin:"12px 0"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr>{rows[0].map((c,j)=>(
                  <th key={j} style={{padding:"8px 12px",textAlign:j===0?"left":"center",background:"var(--be2)",borderBottom:"2px solid var(--ac2)",color:"var(--t)",fontWeight:600,fontSize:12,textTransform:"uppercase",letterSpacing:"0.04em",whiteSpace:"nowrap"}}>
                    {c}
                  </th>
                ))}</tr>
              </thead>
              <tbody>
                {rows.slice(1).map((row,ri)=>(
                  <tr key={ri} style={{borderBottom:"1px solid var(--br)"}}>
                    {row.map((c,ci)=>{
                      const score=c.match(/^(\d+(?:\.\d+)?)\/10$/);
                      const val=score?parseFloat(score[1]):null;
                      const scoreColor=val===null?null:val>=9?"#4ade80":val>=7?"#facc15":val>=5?"#fb923c":"#f87171";
                      return(
                        <td key={ci} style={{padding:"8px 12px",textAlign:ci===0?"left":"center",color:scoreColor||"var(--t)",fontWeight:score?"700":"400"}}>
                          {score?<span style={{background:scoreColor+"22",color:scoreColor,padding:"2px 8px",borderRadius:999,fontSize:12,fontWeight:700}}>{c}</span>:parseInline(c)}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }
      continue;
    }
    // overall score line  **Skor Keseluruhan: X.X/10**
    const overallScore=l.match(/\*\*Skor Keseluruhan[:\s]+(\d+(?:\.\d+)?)\/10\*\*/);
    if(overallScore){
      const v=parseFloat(overallScore[1]);
      const col=v>=9?"#4ade80":v>=7?"#facc15":v>=5?"#fb923c":"#f87171";
      blocks.push(
        <div key={i} style={{display:"flex",alignItems:"center",gap:12,margin:"14px 0",padding:"12px 16px",background:col+"15",border:`1px solid ${col}44`,borderRadius:10}}>
          <span style={{fontSize:28,fontWeight:700,color:col,fontVariantNumeric:"tabular-nums"}}>{overallScore[1]}</span>
          <span style={{fontSize:13,color:"var(--td)",fontWeight:500}}>/10 — Skor Keseluruhan</span>
        </div>
      );
      i++;continue;
    }
    // numbered list
    const numList=l.match(/^(\d+)\.\s+(.+)/);
    if(numList){
      const items=[];
      while(i<lines.length&&lines[i].match(/^\d+\.\s+/)){
        const m2=lines[i].match(/^(\d+)\.\s+(.+)/);
        items.push({n:m2[1],text:m2[2]});
        i++;
      }
      blocks.push(
        <div key={i} style={{display:"flex",flexDirection:"column",gap:8,margin:"10px 0"}}>
          {items.map((item,idx)=>(
            <div key={idx} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{minWidth:24,height:24,background:"var(--ac2)",color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,marginTop:1}}>{item.n}</span>
              <div style={{fontSize:13,lineHeight:1.7,color:"var(--t)",paddingTop:2}}>{parseInline(item.text)}</div>
            </div>
          ))}
        </div>
      );
      continue;
    }
    // bullet list
    if(l.match(/^[-*]\s+/)){
      const items=[];
      while(i<lines.length&&lines[i].match(/^[-*]\s+/)){
        items.push(lines[i].replace(/^[-*]\s+/,""));
        i++;
      }
      blocks.push(
        <ul key={i} style={{margin:"8px 0",paddingLeft:20,display:"flex",flexDirection:"column",gap:4}}>
          {items.map((it,idx)=><li key={idx} style={{fontSize:13,lineHeight:1.7,color:"var(--fg)"}}>{parseInline(it)}</li>)}
        </ul>
      );
      continue;
    }
    // quote
    if(l.match(/^>\s/)){
      const ql=l.replace(/^>\s/,"");
      blocks.push(
        <blockquote key={i} style={{margin:"8px 0",paddingLeft:12,borderLeft:"3px solid var(--ac2)",color:"var(--td)",fontStyle:"italic",fontSize:13,lineHeight:1.7}}>{parseInline(ql)}</blockquote>
      );
      i++;continue;
    }
    // empty line
    if(!l.trim()){i++;continue;}
    // paragraph
    const paraLines=[];
    while(i<lines.length&&lines[i].trim()&&!lines[i].match(/^[#>|\-*\d]/)&&!lines[i].match(/^\*\*Skor Keseluruhan/)){
      paraLines.push(lines[i]);i++;
    }
    if(paraLines.length){
      blocks.push(<p key={i} style={{fontSize:13,lineHeight:1.8,margin:"6px 0",color:"var(--fg)"}}>{parseInline(paraLines.join(" "))}</p>);
    } else {i++;}
  }
  return blocks;
}

const SECTION_STYLES={
  "Skor":{accent:"#7c6fda",icon:"📊"},
  "Checklist Harari Style":{accent:"#34d399",icon:"✓"},
  "Yang Sangat Kuat":{accent:"#4ade80",icon:"✦"},
  "Kelemahan Utama":{accent:"#fb923c",icon:"⚠"},
  "Rekomendasi":{accent:"#60a5fa",icon:"→"},
  "Verdict Akhir":{accent:"#f472b6",icon:"★"},
};
function getSectionStyle(title){
  if(/^Bab\s+\d+/i.test(title.trim()))return{accent:"#a78bfa",icon:"◆"};
  for(const[k,v] of Object.entries(SECTION_STYLES)){
    if(title.toLowerCase().includes(k.toLowerCase()))return v;
  }
  return{accent:"var(--ac2)",icon:"◆"};
}

function ReviewRenderer({text,mode}){
  mode=mode||"report";
  if(!text)return null;
  const sections=parseReviewMarkdown(text);
  const hasSections=sections.some(s=>s.type==="section");
  if(!hasSections&&typeof marked!=="undefined"){
    const html=DOMPurify.sanitize(marked.parse(text,{breaks:true,gfm:true}));
    return <div className="msg-bubble markdown" style={{padding:"4px 16px"}} dangerouslySetInnerHTML={{__html:html}}/>;
  }
  const isBab=t=>/^Bab\s+\d+/i.test((t||"").trim())||/PART\s*2/i.test(t||"")||/PER BAB/i.test(t||"");
  const filtered=sections.filter(sec=>{
    if(sec.type==="intro")return mode==="report";
    return mode==="edit"?isBab(sec.title):!isBab(sec.title);
  });
  return(
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      {filtered.map((sec,si)=>{
        if(sec.type==="intro"){
          const content=renderSectionLines(sec.lines);
          if(!content||!content.length)return null;
          return <div key={si} style={{padding:"4px 0 8px"}}>{content}</div>;
        }
        const st=getSectionStyle(sec.title);
        return(
          <div key={si} style={{marginBottom:2}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"14px 16px 10px",borderLeft:`3px solid ${st.accent}`}}>
              <span style={{fontSize:13,fontWeight:700,color:st.accent,letterSpacing:"0.01em"}}>{st.icon} {sec.title}</span>

=== CORE PHILOSOPHY: THE SENTENCE FUNCTION TEST ===

This is not a stylistic preference. It is the structural law of the form.

=== I. MACRO-ARCHITECTURE: THE FORWARD ENGINE ===

RULE 1 — ZERO DUPLICATION
Once a mechanism, character background, geopolitical context, or technological concept is established,
it must NEVER be repeated in subsequent chapters. Repetition destroys momentum. Momentum is narrative oxygen.
BANNED: "As explained earlier..." / "Seperti yang telah dijelaskan..."
REQUIRED: Exposition must compound rather than reset. The narrative must behave as though memory exists.

RULE 2 — SCENE/SUMMARY OSCILLATION
Alternate between SCENE (immersive present-tense physical reality) and SUMMARY (macro-historical compression).
Open chapters IN SCENE. Establish sensory grounding FIRST. Then expand outward. Then collapse back to human scale.
BANNED: Opening a chapter with abstract summary before any scene.

RULE 3 — NARRATIVE VELOCITY
Every paragraph must end with one of: unresolved implication / material consequence / escalating scale /
contradiction / unanswered uncertainty / irreversible movement.
Paragraph endings are propulsion systems, not landing pads.
BANNED: Static informational endings. "Perdagangan menjadi penting di kawasan ini."
REQUIRED: "The route survived because every kingdom along it had become too dependent to close it."

=== II. THE THREE-ZONE ARCHITECTURE ===

ZONE 1 — CINEMATIC HOOK
Drop into specific moment: date, place, person, action — in the FIRST sentence.
End the hook with the central question — one line, no embellishment.

ZONE 2 — JOURNALISTIC INVESTIGATION
Fact-check each claim. State evidence AND its limits. Present competing interpretations as named positions.
Include at least one full citation (author, year, journal). Acknowledge what evidence CANNOT tell us.
FORBIDDEN: Speculation stated as fact.

ZONE 3 — PHILOSOPHICAL CLOSE
Do NOT answer the central mystery fully. Leave productive ambiguity.
Return to SAME person, object, or moment from Zone 1. Closing image must be PHYSICAL and SPECIFIC.

=== III. CHRONOLOGICAL ANCHORING & INTEGRITY ===

RULE 1 — STRICT TEMPORAL BOUNDARIES
Distinct eras must remain distinct. Never merge centuries into a symbolic "old world."
Anchor with: exact years, reigns, dynasties, monsoon cycles, generational spacing.
BANNED: Different-era polities framed as simultaneous cultural actors.

RULE 2 — CAUSE BEFORE CONSEQUENCE
Never reveal outcomes before the audience experiences uncertainty alongside historical actors.
Historical participants did not know the ending. The audience must not feel omniscient.
BANNED: Hindsight prophecy. "Tanpa mereka sadari, dua puluh tahun kemudian..."

RULE 3 — NO EPOCH COMPRESSION
Do not collapse gradual transformation into sudden revolution without evidence.
Large transitions must show: overlap, coexistence, friction, partial adoption, regional inconsistency.
History changes unevenly. Always preserve the mess.

=== IV. THE EPISTEMIC BOUNDARY (THE OMNISCIENT TRAP) ===

RULE 1 — ABSOLUTE BAN ON FABRICATED INTERIORITY
Never invent thoughts, fears, hopes, motives, or emotional states unless directly documented
in a primary source (diary, letter, decree). Action is admissible. Mind-reading is fraud.
BANNED: "Ia merasa takut." / "Ia bertanya-tanya apakah kekaisarannya sudah berakhir."
REQUIRED action-based: "Ia berdiri di palisade selama tiga jam. Menurut kronik istana, ia tidak makan malam itu."
REQUIRED hedges: "kemungkinan besar," "mungkin," "yang tidak ia sadari," "tanpa ia ketahui"

RULE 2 — EPISTEMIC DISTANCING
Uncertainty is narrative electricity. The gap in the archive is part of the story.
Use actively: "Tidak ada sumber yang selamat yang mencatat..." / "DNA tidak merekam ketegangan — hanya hasilnya."

RULE 3 — EVIDENTIARY HIERARCHY
Distinguish source types explicitly. Do not flatten them into equivalent truth claims.
  TIER 1 — Archaeological evidence
  TIER 2 — Contemporary written record
  TIER 3 — Later chronicle
  TIER 4 — Oral tradition
  TIER 5 — Nationalist reinterpretation
  TIER 6 — Modern speculation
BANNED: Citing Tier 4-6 without explicit flagging of their lower evidentiary status.

=== V. CINEMATIC STAGING & PHYSICAL REALITY ===

RULE 1 — THE FOSSIL TECHNIQUE (Object Tracking)
Introduce an artifact, weapon, or document early. Track its transformation across chapters.
The object reappears in a TRANSFORMED STATE later, creating a literal through-line.

RULE 2 — SPECIFICITY OVER ADJECTIVES
Emotional adjectives are banned. Specificity generates emotion automatically.
BANNED: "Senjata yang kuat dan menakutkan."
REQUIRED: "Culverin perunggu yang membutuhkan dua orang untuk mengangkatnya, meninggalkan udara berbau belerang."

RULE 3 — SENSORIAL HIERARCHY
Favor neglected senses over generic visual description: SMELL, TEXTURE, HUMIDITY, WEIGHT, SOUND, EXHAUSTION.
BANNED: "Pasar itu hidup dan berwarna-warni."
REQUIRED: "Udara berbau ikan kering, tali basah, dan tuak palem yang mulai asam di bawah terik matahari."

RULE 4 — BODY LOGIC
Human bodies must obey physical reality: hunger, fatigue, infection, dehydration, weather, darkness, carrying capacity.
History happened inside biological limits. When physical reality constrains action, make it visible.

=== VI. SCHOLARLY FRICTION AS DRAMA ===

RULE 1 — THE RASHOMON STRUCTURE
When sources conflict, STAGE the contradiction. Do not synthesize into false consensus.
REQUIRED: "Arsip kolonial mencatatnya sebagai pemberontakan. Tradisi lisan lokal mengingatnya sebagai misi penyelamatan. Bukti arkeologis bertentangan dengan keduanya."

RULE 2 — THE SILENT ARCHIVE
Every archive has structural blindness. Silence is evidence.
Identify: who wrote the record, who benefited, who disappeared, who was never asked.
If relying on colonial or victors' chronicles, narrate the blind spots explicitly.

RULE 3 — AGAINST NATIONAL MYTHMAKING
Resist retrospective nationalism. Historical actors did not know they were becoming a nation-state.
BANNED: Destiny language, civilizational triumphalism, proto-national identity projection, heroic inevitability.
REQUIRED: "Kita sekarang bisa membaca ini sebagai awal sebuah identitas nasional — tetapi bagi para pelautnya, ini adalah pekerjaan."

=== X. LANGUAGE DISCIPLINE — LITERARY AUSTERITY ===

RULE 1 — SENTENCE HIERARCHY
Balance four types per paragraph: PLAIN (information) / FUNCTIONAL (causality) / ATMOSPHERIC (sensory) / IMPACT (payload).
BANNED: Consecutive impact sentences. Prose that visibly performs intelligence.

RULE 2 — CONTROLLED APHORISMS
Reserve single-sentence aphorisms for: chapter pivots, moral inversions, civilizational revelations, endings.
Max 2 aphoristic sentences per chapter. They lose all weight without surrounding silence.

RULE 3 — PARAGRAPH BREATHING
After dense analytical passage: insert 1-2 sentence physical/atmospheric paragraph before resuming.

RULE 4 — NO WRITERLY SELF-CONSCIOUSNESS
The prose must never admire itself.
BANNED: Faux-poetic abstraction. Adjective stacking. Sentences that exist to sound good rather than function.

=== XI. DOCUMENTARY VOICEOVER ENGINEERING ===

RULE 1 — PERFORMANCE RHYTHM
Write with breath spacing, silence points, tonal descent, escalation, pause architecture.
Every sentence must be speakable in one breath or with deliberate pausing.

RULE 2 — MICRO-SENTENCE IMPACT
After dense information: deploy short sentences as psychological percussion.
TECHNIQUE: [Long analytical sentence]. [Short sentence. Stops everything.]
GOOD: "Sistem irigasi itu melibatkan lebih dari empat ribu pekerja selama tiga musim tanam. Tidak ada satu pun nama mereka yang tercatat."

=== ABSOLUTE FORBIDDEN ===
- Fabricated interiority without primary source citation
- "Bayangkan seseorang..." — use REAL named characters
- Hindsight prophecy: "Little did they know..." / "Tanpa mereka sadari..." — BANNED
- "History teaches us that..." / "Kisah ini mengajarkan kita bahwa..." — BANNED. Zero tolerance.
- TED-talk philosophy: abstract lessons detached from evidence
- Fake certainty: contested claims presented as settled consensus
- Modern political projection onto historical actors
- Historical fan-fiction: any invented scene, dialogue, or detail
- Emotional manipulation unsupported by evidence
- Exposition detached from action
- Adjective stacking and faux-poetic abstraction
- Presentist superiority: framing historical actors as naive for not knowing what we now know
- National mythmaking: destiny language, civilizational triumphalism, heroic inevitability
- Answering the central mystery completely — productive ambiguity is the point
- Closing with a political prescription or contemporary policy argument
- WONDER INFLATION: max 2-3 genuine wonder moments per entire book.
  GOOD: "Bagi Merer, ini hanyalah pekerjaan." — deflating the cosmic with the mundane.
  BANNED: "Yang lebih menakjubkan lagi... Yang lebih mengherankan... Yang paling mengejutkan..."
- TESIS DRIFT: chapter that introduces a different central question. Every chapter must advance the SAME central question.
- "X bukan Y. X adalah Z." REVERSAL PATTERN — maximum 3x per entire book.

=== THE PRIME DIRECTIVE ===
Narrative nonfiction is not the simplification of history.
It is the reconstruction of lived pressure.
The audience must not merely learn what happened.
They must feel how fragile reality looked before anyone knew the outcome.

=======================================================================
END OF STYLE GUIDE
=======================================================================
