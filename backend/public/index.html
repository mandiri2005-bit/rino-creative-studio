<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rino Creative Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<style>
:root{--fd:'Bricolage Grotesque',sans-serif;--fb:'Hanken Grotesk',sans-serif;--fm:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:var(--fb);-webkit-font-smoothing:antialiased}
.dark{--bg:#09090f;--sb:#0e0e18;--be:#14141f;--be2:#1c1c2e;--bi:#0e0e18;--br:#252535;--brs:#1a1a2a;
  --t:#e8e8f0;--td:#9090a8;--tf:#606070;--ac:#6366f1;--ac2:#8b5cf6;
  --as:rgba(99,102,241,.15);--as2:rgba(139,92,246,.12);
  --da:#ef4444;--das:rgba(239,68,68,.12);--su:#22c55e;--sus:rgba(34,197,94,.12);
  --wa:#f59e0b;--was:rgba(245,158,11,.12);--sh:0 20px 60px -20px rgba(0,0,0,.8)}
.light{--bg:#f0f0ff;--sb:#e8e8f8;--be:#fff;--be2:#f5f5ff;--bi:#f8f8ff;--br:#d8d8ee;--brs:#e5e5f5;
  --t:#1a1a2e;--td:#5a5a7a;--tf:#9090aa;--ac:#4f46e5;--ac2:#7c3aed;
  --as:rgba(79,70,229,.12);--as2:rgba(124,58,237,.1);
  --da:#dc2626;--das:rgba(220,38,38,.1);--su:#16a34a;--sus:rgba(22,163,74,.1);
  --wa:#d97706;--was:rgba(217,119,6,.1);--sh:0 20px 50px -20px rgba(80,70,180,.25)}
.app{display:flex;height:100vh;color:var(--t);background:var(--bg);transition:background .3s,color .3s}

/* ── SIDEBAR ── */
.sb{width:220px;min-width:220px;background:var(--sb);border-right:1px solid var(--br);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s}
.sb.collapsed{width:64px;min-width:64px}
.sb-brand{display:flex;align-items:center;gap:11px;padding:18px 14px 14px;border-bottom:1px solid var(--br)}
.sb-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:grid;place-items:center;font-family:var(--fd);font-weight:700;font-size:14px;color:#fff;flex:none}
.sb-title{font-family:var(--fd);font-weight:700;font-size:14.5px;line-height:1.2;overflow:hidden;white-space:nowrap}
.sb-title span{display:block;font-size:10.5px;color:var(--td);font-weight:500;font-family:var(--fb)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-group{padding:6px 0}
.nav-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--tf);font-weight:700;
  padding:4px 16px 6px;overflow:hidden;white-space:nowrap}
.navbtn{display:flex;align-items:center;gap:11px;padding:9px 14px;border:none;background:none;
  color:var(--td);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;
  border-radius:8px;margin:1px 6px;transition:.15s;text-align:left;white-space:nowrap;overflow:hidden}
.navbtn:hover{background:var(--be2);color:var(--t)}
.navbtn.on{background:var(--as);color:var(--ac);font-weight:600}
.navbtn svg{flex:none;color:inherit}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--br);display:flex;flex-direction:column;gap:4px}
.sb-toggle{display:flex;align-items:center;justify-content:center;padding:8px;border-radius:8px;
  background:none;border:none;color:var(--td);cursor:pointer;transition:.15s}
.sb-toggle:hover{background:var(--be2);color:var(--t)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;
  border-bottom:1px solid var(--br);background: var(--bg);
  backdrop-filter:blur(10px);position:sticky;top:0;z-index:20}
.page-title{font-family:var(--fd);font-weight:700;font-size:18px;display:flex;align-items:center;gap:10px}
.page-title svg{color:var(--ac)}
.main-body{flex:1;overflow-y:auto;padding:22px}

/* ── SHARED COMPONENTS ── */
.card{background:var(--be);border:1px solid var(--br);border-radius:14px;padding:16px}
.card+.card{margin-top:14px}
.lbl{font-size:11.5px;font-weight:600;color:var(--td);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.lbl svg{color:var(--ac)}
.inp{width:100%;background:var(--bi);border:1px solid var(--br);border-radius:9px;padding:9px 12px;
  color:var(--t);font-family:var(--fb);font-size:13px;outline:none;transition:.15s}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--as)}
.inp::placeholder{color:var(--tf)}.inp.mono{font-family:var(--fm);font-size:12px}
.inp.ta{resize:vertical;line-height:1.55;min-height:80px}
select.inp{cursor:pointer;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--td) 50%),linear-gradient(135deg,var(--td) 50%,transparent 50%);background-position:calc(100% - 14px) 14px,calc(100% - 9px) 14px;background-size:4px 4px;background-repeat:no-repeat}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.hint{font-size:10.5px;color:var(--tf);margin-top:5px;line-height:1.4}
.hint code{font-family:var(--fm);font-size:10px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border:none;border-radius:9px;
  font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:.18s}
.btn.pri{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 6px 20px -8px var(--ac)}
.btn.pri:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 25px -8px var(--ac)}
.btn.pri:disabled{opacity:.5;cursor:not-allowed}
.btn.sec{background:var(--be2);border:1px solid var(--br);color:var(--td)}
.btn.sec:hover{color:var(--t);border-color:var(--ac)}
.btn.w{width:100%;justify-content:center}
.btn.lg{padding:13px 22px;font-size:14px}
.spin{width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:sp .7s linear infinite;flex:none}
@keyframes sp{to{transform:rotate(360deg)}}
.badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:999px}
.badge.pend{background:var(--was);color:var(--wa)}.badge.run{background:var(--as);color:var(--ac)}
.badge.ok{background:var(--sus);color:var(--su)}.badge.fail{background:var(--das);color:var(--da)}
.banner{display:flex;align-items:center;gap:9px;padding:10px 14px;border-radius:11px;font-size:12.5px;margin-bottom:14px}
.banner.warn{background:var(--das);border:1px solid color-mix(in srgb,var(--da) 35%,transparent);color:var(--da)}
.banner.info{background:var(--as);border:1px solid color-mix(in srgb,var(--ac) 30%,transparent);color:var(--t)}
.banner svg{flex:none;color:var(--ac)}
.prog-wrap{background:var(--be);border:1px solid var(--br);border-radius:13px;overflow:hidden;margin-top:12px}
.prog-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px}
.prog-bar{height:4px;background:var(--br)}.prog-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .4s}
.logs{max-height:180px;overflow-y:auto;padding:10px 14px;border-top:1px solid var(--brs)}
.log-line{font-family:var(--fm);font-size:10.5px;color:var(--td);line-height:1.7}
.log-line.ok{color:var(--su)}.log-line.err{color:var(--da)}.log-line.wr{color:var(--wa)}
.sbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--be);border:1px solid var(--br);border-radius:13px;padding:12px 15px;margin-bottom:14px}
.stat{display:flex;align-items:center;gap:8px}.stat svg{color:var(--ac)}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--tf);font-weight:600}
.sv{font-family:var(--fd);font-weight:700;font-size:15px}.sv.sm{font-size:12px}
.sf{flex:1}

/* ── CHAT ── */
.chat-layout{display:grid;grid-template-columns:220px 1fr;gap:0;height:calc(100vh - 56px - 56px);overflow:hidden}
.chat-sessions{background:var(--sb);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden}
.chat-sess-hdr{padding:12px;border-bottom:1px solid var(--br);display:flex;gap:6px}
.sess-list{flex:1;overflow-y:auto;padding:6px}
.sess-item{padding:9px 11px;border-radius:9px;cursor:pointer;transition:.15s;border:1px solid transparent}
.sess-item:hover{background:var(--be2)}.sess-item.on{background:var(--as);border-color:color-mix(in srgb,var(--ac) 30%,transparent)}
.sess-name{font-size:12.5px;font-weight:600;color:var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sess-meta{font-size:10.5px;color:var(--td);margin-top:2px}
.chat-main{display:flex;flex-direction:column;overflow:hidden}
.chat-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--br);flex-wrap:wrap}
.chat-messages{flex:1;overflow-y:auto;padding-top: 20px;padding-left: 16px;padding-right: 16px;padding-bottom: 16px}
.msg{margin-bottom:16px;display:flex;gap:10px}
.msg.user{flex-direction:row-reverse}
.msg-bubble{max-width:75%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.6}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-radius:14px 14px 4px 14px}
.msg.assistant .msg-bubble{background:var(--be);border:1px solid var(--br);border-radius:14px 14px 14px 4px}

/* ── Styling Markdown untuk Chat Bubble ── */
.msg-bubble.markdown h1, .msg-bubble.markdown h2, .msg-bubble.markdown h3, 
.msg-bubble.markdown h4, .msg-bubble.markdown h5, .msg-bubble.markdown h6 {
  font-family: var(--fd);
  color: var(--ac);
  font-weight: 700;
  margin: 1.2em 0 0.6em;
  line-height: 1.25;
}
.msg-bubble.markdown h1 { font-size: 1.75em; }
.msg-bubble.markdown h2 { font-size: 1.5em; }
.msg-bubble.markdown h3 { font-size: 1.25em; }
.msg-bubble.markdown h4 { font-size: 1.15em; }
.msg-bubble.markdown p { margin: 0.4em 0; }
.msg-bubble.markdown strong, .msg-bubble.markdown b {
  font-weight: 700;
  color: var(--ac2);
}
.msg-bubble.markdown em, .msg-bubble.markdown i { font-style: italic; }
.msg-bubble.markdown ul, .msg-bubble.markdown ol {
  margin: 0.5em 0 0.5em 1.5em;
  padding: 0;
}
.msg-bubble.markdown li {
  margin-bottom: 0.4em;
  line-height: 1.6;
}
.msg-bubble.markdown li::marker {
  color: var(--ac);
  font-weight: 700;
}
.msg-bubble.markdown a { color: var(--ac); text-decoration: underline; }
.msg-bubble.markdown blockquote {
  border-left: 4px solid var(--ac);
  padding: 0.5em 0.75em;
  margin: 0.6em 0;
  color: var(--td);
  background: color-mix(in srgb, var(--be) 60%, transparent);
  border-radius: 6px;
}
.msg-bubble.markdown pre {
  background: var(--bi);
  border: 1px solid var(--br);
  border-radius: 6px;
  padding: 12px;
  overflow-x: auto;
}
.msg-bubble.markdown code {
  font-family: var(--fm);
  font-size: 12px;
  background: var(--bi);
  padding: 2px 6px;
  border-radius: 4px;
}
.msg-bubble.markdown pre code { background: none; padding: 0; }
.msg-bubble.markdown table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  margin: 0.5em 0;
}
.msg-bubble.markdown th, .msg-bubble.markdown td {
  border: 1px solid var(--br);
  padding: 6px 8px;
  text-align: left;
}
.msg-bubble.markdown th { background: var(--be2); font-weight: 600; }
.msg-bubble.markdown hr { border: 0; border-top: 1px solid var(--br); margin: 1em 0; }
.msg-bubble.markdown img { max-width: 100%; height: auto; border-radius: 6px; }



.msg-bubble p{margin:.4em 0}.msg-bubble p:first-child{margin-top:0}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble pre{background:var(--bi);border:1px solid var(--br);border-radius:7px;padding:10px;overflow-x:auto;font-size:12px;margin:.5em 0}
.msg-bubble code{font-family:var(--fm);font-size:12px;background:var(--bi);padding:1px 5px;border-radius:4px}
.msg-bubble pre code{background:none;padding:0}
.msg-bubble table{border-collapse:collapse;font-size:12px}.msg-bubble td,.msg-bubble th{border:1px solid var(--br);padding:4px 8px}
.chat-input-area{padding:12px 14px;border-top:1px solid var(--br)}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;background:var(--bi);border:1px solid var(--br);border-radius:11px;padding:10px 14px;
  color:var(--t);font-family:var(--fb);font-size:13px;outline:none;resize:none;max-height:300px;min-height:40px;line-height:1.5;overflow-y:auto}
.chat-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--as)}
.tool-badge{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:7px;
  background:var(--sus);color:var(--su);font-size:11px;font-weight:600}
.tool-evt{background:var(--was);padding:8px 12px;border-radius:8px;margin:6px 0;font-size:12px;color:var(--wa);font-style:italic}
.msg-wrap{position:relative}
.msg-actions{display:flex;gap:5px;margin-top:5px;opacity:0;transition:opacity .15s}
.msg-wrap:hover .msg-actions{opacity:1}
.msg-action-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border:1px solid var(--br);border-radius:6px;background:var(--be2);color:var(--td);font-size:11px;font-family:var(--fb);font-weight:500;cursor:pointer;transition:.15s}
.msg-action-btn:hover{border-color:var(--ac);color:var(--ac)}
.msg-action-btn.copied{border-color:var(--su);color:var(--su)}
.file-chips{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0 8px}
.file-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:var(--sus);border:1px solid color-mix(in srgb,var(--su) 30%,transparent);border-radius:6px;font-size:11.5px;color:var(--su);transition:background .15s,border-color .15s}
.file-chip[style*="cursor"]:hover{background:color-mix(in srgb,var(--su) 18%,transparent);border-color:var(--su)}
.file-chip button{background:none;border:none;color:var(--da);cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 2px}

/* ── IMAGE ── */
.img-layout{display:grid;grid-template-columns:280px 1fr;gap:16px}
.img-result{background:var(--be);border:1px solid var(--br);border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:380px;position:relative}
.img-result img{max-width:100%;max-height:600px;display:block}
.img-empty{text-align:center;color:var(--tf);padding:40px}
.img-empty svg{margin:0 auto 10px;display:block;opacity:.4}
.ref-drop{border:1.5px dashed var(--br);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.15s;position:relative}
.ref-drop:hover{border-color:var(--ac);background:var(--as)}
.ref-drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.ref-thumb{max-width:100%;max-height:120px;border-radius:8px;margin-top:8px}

/* ── VIDEO (Veo/Sora) ── */
.vid-layout{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
.vid-card{background:var(--be);border:1px solid var(--br);border-radius:13px;overflow:hidden;margin-bottom:10px}
.vid-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--be2);border-bottom:1px solid var(--br)}
.vid-card-body{padding:12px 14px}
.vid-player{width:100%;border-radius:0 0 8px 8px;display:block}
.vid-prog{display:flex;align-items:center;gap:10px;padding:10px 14px}
.vid-spinner{width:16px;height:16px;border:2px solid var(--ac);border-right-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
.vid-empty{text-align:center;color:var(--tf);padding:60px 20px}
.vid-empty svg{margin:0 auto 12px;display:block;opacity:.4}

/* ── WHISK ── */
.whisk-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.whisk-slot{background:var(--be2);border:1px solid var(--br);border-radius:13px;overflow:hidden}
.whisk-slot-hdr{padding:10px 12px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px}
.whisk-slot-icon{font-size:16px}.whisk-slot-title{font-weight:700;font-size:13px}
.whisk-slot-sub{font-size:10.5px;color:var(--td);margin-left:auto}
.whisk-slot-body{padding:12px}
.whisk-result{background:var(--be);border:1px solid var(--br);border-radius:13px;overflow:hidden;text-align:center;min-height:300px;display:flex;align-items:center;justify-content:center}
.whisk-result img{max-width:100%;max-height:500px}

/* ── FLOW ── */
.flow-scenes{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:14px}
.scene-card{background:var(--be);border:1px solid var(--br);border-radius:13px;overflow:hidden}
.scene-idx{font-family:var(--fm);font-size:10px;color:var(--ac);background:var(--as);padding:2px 7px;border-radius:4px}
.scene-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--be2)}
.scene-body{padding:12px}
.scene-title{font-weight:700;font-size:13.5px;margin-bottom:6px}
.scene-desc{font-size:12px;color:var(--td);line-height:1.5;margin-bottom:8px}
.scene-meta{display:flex;gap:8px;flex-wrap:wrap}
.scene-tag{font-size:10.5px;background:var(--be2);border:1px solid var(--br);padding:2px 8px;border-radius:5px;color:var(--td)}

/* ── BATCH (same as before) ── */
.jobs-list{display:flex;flex-direction:column;gap:10px}
.job-row{display:flex;background:var(--be);border:1px solid var(--br);border-radius:13px;overflow:hidden;transition:.15s}
.job-row:hover{border-color:color-mix(in srgb,var(--ac) 35%,var(--br))}
.job-rail{display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:8px;padding:12px 9px;background:var(--be2);border-right:1px solid var(--br);min-width:76px}
.jkey{font-family:var(--fm);font-size:10.5px;font-weight:600;color:var(--ac);background:var(--as);padding:3px 7px;border-radius:5px}
.job-main{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:8px;min-width:0}
.tiny{display:grid;place-items:center;width:26px;height:22px;border-radius:6px;background:var(--bi);border:1px solid var(--br);color:var(--td);cursor:pointer;transition:.15s}
.tiny:hover:not(:disabled){color:var(--t);border-color:var(--ac)}.tiny:disabled{opacity:.3;cursor:not-allowed}
.tiny.del:hover{color:var(--da);border-color:var(--da)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;width:100%;background:transparent;border:1.5px dashed var(--br);border-radius:11px;color:var(--td);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:.18s}
.add-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--as)}
.inp.name{font-family:var(--fm);font-weight:600;border:none;background:transparent;padding:5px 4px;font-size:13px}
.inp.name:focus{box-shadow:none;background:var(--bi);border-radius:6px}

/* ── MAP TABLE ── */
.maptable{background:var(--be);border:1px solid var(--br);border-radius:13px;overflow:hidden}
.mhd{display:grid;grid-template-columns:140px 30px 1fr;padding:9px 16px;background:var(--be2);border-bottom:1px solid var(--br);font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--tf);font-weight:700}
.mbody{max-height:260px;overflow:auto}
.mrow{display:grid;grid-template-columns:140px 30px 1fr;align-items:center;padding:8px 16px;border-bottom:1px solid var(--brs)}
.mrow:last-child{border-bottom:none}.mrow:hover{background:var(--as)}
.mk{font-family:var(--fm);font-size:11.5px;color:var(--ac);font-weight:600}
.mf{font-family:var(--fm);font-size:11.5px;color:var(--t)}

/* ── HIST LIST ── */

/* Auth header helper — injects Bearer token if Clerk is ready */
function authHdr(){
  // Synchronous — reads __session cookie directly, no async hang
  const cookie=document.cookie.match(/__session=([^;]+)/)?.[1];
  return cookie?{"Authorization":"Bearer "+cookie}:{};
}
/* Fresh Clerk token (cookie is stale fallback). Use for calls that 401. */
async function authHdrFresh(){
  try{
    if(window.Clerk&&window.Clerk.session){
      const t=await window.Clerk.session.getToken();
      if(t) return {"Authorization":"Bearer "+t};
    }
  }catch(e){ /* fall through to cookie */ }
  const cookie=document.cookie.match(/__session=([^;]+)/)?.[1];
  return cookie?{"Authorization":"Bearer "+cookie}:{};
}
/* Merge auth headers into existing headers object */
async function mhdr(h={}){return{...h,...(authHdr())};}

const badgeFor=s=>{if(!s)return["pend","—"];const u=s.toUpperCase();
  if(u.includes("SUCCEEDED")||u==="DONE")return["ok","done"];
  if(u.includes("RUNNING"))return["run","running"];
  if(u.includes("PENDING")||u==="QUEUED")return["pend","queued"];
  if(u.includes("FAIL")||u.includes("ERROR")||u.includes("EXPIRED")||u.includes("CANCEL"))return["fail",u.replace("JOB_STATE_","").toLowerCase()];
  return["pend",u.replace("JOB_STATE_","").toLowerCase()||"?"];};

/* ─── ProgBox ─── */
function ProgBox({job,onRefresh}){
  const logsRef=useRef(null);
  useEffect(()=>{if(logsRef.current)logsRef.current.scrollTop=logsRef.current.scrollHeight;},[job?.logs?.length]);
  if(!job)return null;
  const pct=job.total?Math.round(job.progress/job.total*100):0;
  const[cls]=badgeFor(job.status);
  return <div className="prog-wrap">
    <div className="prog-top">
      <span style={{display:"flex",alignItems:"center",gap:8}}><span className={"badge "+cls}>{job.status}</span>{job.progress||0}/{job.total||"?"}</span>
      <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontFamily:"var(--fm)",fontSize:12,color:"var(--td)"}}>{pct}%</span><button className="btn sec" style={{padding:"5px 10px",fontSize:12}} onClick={onRefresh}>{ic.refresh}</button></div>
    </div>
    <div className="prog-bar"><div className="prog-fill" style={{width:pct+"%"}}/></div>
    {job.logs?.length>0&&<div className="logs" ref={logsRef}>{job.logs.map((l,i)=>{const c=l.startsWith("✅")?"ok":l.startsWith("🔴")?"err":l.startsWith("⚠️")?"wr":"";return<div key={i} className={"log-line "+c}>{l}</div>})}</div>}
  </div>;
}

/* ─── FILE EXTRACTION UTILITY ─── */
/**
 * Parse <file name="..." mime="...">content</file> tags from AI response.
 * Returns { cleaned: string (text without file blocks), files: [{name, mime, content}] }
 */
function extractFiles(text) {
  const files = [];
  const cleaned = text.replace(
    /<file\s+name="([^"]+)"\s+mime="([^"]+)">([\s\S]*?)<\/file>/gi,
    (_, name, mime, content) => {
      files.push({ name: name.trim(), mime: mime.trim(), content: content.trim() });
      return ''; // remove from display text
    }
  );
  return { cleaned: cleaned.trim(), files };
}

/** Trigger a browser download for a single extracted file */
function downloadExtractedFile(file) {
  const blob = new Blob([file.content], { type: file.mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = file.name;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ─── CHAT SECTION ─── */
function ChatSection({settings,showToast}){
  const[sessions,setSessions]=useState(()=>{ try{return JSON.parse(localStorage.getItem("rc_sessions")||"[]");}catch{return[];} });
  const[curId,setCurId]=useState(null);
  const[input,setInput]=useState("");
  const[streaming,setStreaming]=useState(false);
  const[model,setModel]=useState("gemini-2.5-flash");
  const[apiMode,setApiMode]=useState("laozhang");
  const[chatGoogleKey,setChatGoogleKey]=useState(()=>localStorage.getItem("rc_chat_gkey")||"");
  useEffect(()=>{localStorage.setItem("rc_chat_gkey",chatGoogleKey);},[chatGoogleKey]);
  const[thinkingLevel,setThinkingLevel]=useState("");
  const[sessionCost,setSessionCost]=useState(0);
  const[useTools,setUseTools]=useState(false);
  const[uploadedFiles,setUploadedFiles]=useState([]);
  const[uploading,setUploading]=useState(false);
  const[copiedId,setCopiedId]=useState(null);
  const msgEndRef=useRef(null);
  const inputRef=useRef(null);
  const abortRef=useRef(null);
  const cur=sessions.find(s=>s.id===curId);

  useEffect(()=>{localStorage.setItem("rc_sessions",JSON.stringify(sessions));},[sessions]);
  useEffect(()=>{msgEndRef.current?.scrollIntoView({behavior:"smooth"});},[cur?.messages?.length,streaming]);

  const newSession=()=>{
    const id=mkId();
    setSessions(p=>[{id,name:"New chat",messages:[],createdAt:new Date().toISOString()},...p]);
    setCurId(id);
  };
  const delSession=id=>{ setSessions(p=>p.filter(s=>s.id!==id)); if(curId===id)setCurId(null); };
  const addMsg=(sid,msg)=>setSessions(p=>p.map(s=>s.id===sid?{...s,messages:[...s.messages,msg],name:s.messages.length===0?(msg.content.slice(0,32)||"Chat"):s.name}:s));
  const updateLast=(sid,patch)=>setSessions(p=>p.map(s=>s.id===sid?{...s,messages:s.messages.map((m,i)=>i===s.messages.length-1?{...m,...patch}:m)}:s));

  const uploadFiles=async files=>{
    setUploading(true);
    const results=[];
    for(const file of files){
      try{
        const form=new FormData();form.append("file",file);
        const r=await fetch("/api/upload",{method:"POST",body:form});
        if(!r.ok){
          const errBody=await r.json().catch(()=>({error:"Upload failed"}));
          throw new Error("Upload failed: "+file.name+" — "+(errBody.error||errBody.detail||r.statusText));
        }
        const d=await r.json();
        // Backend now returns {kind:"image"|"text", filename, ...}.
        // Old backend returned text-only; treat missing kind as text for back-compat.
        const kind=d.kind||"text";
        results.push({name:file.name,kind,...d});
        // Warn on empty text extraction (PDFs with images-only pages, etc.)
        if(kind==="text"&&(!d.text||d.text.trim().length<5)){
          showToast("⚠ "+file.name+" — extracted text is empty (scanned PDF? unreadable doc?)","wa");
        }
      }catch(e){showToast(e.message,"err");}
    }
    if(results.length)setUploadedFiles(p=>[...p,...results]);
    if(results.length){
      const nImg=results.filter(r=>r.kind==="image").length;
      const nTxt=results.length-nImg;
      showToast(`Uploaded: ${nTxt} text · ${nImg} image`,"ok");
    }
    setUploading(false);
  };

  const sendMsg=async()=>{
    if(!input.trim()&&!uploadedFiles.length)return;
    if(!curId){const id=mkId();setSessions(p=>[{id,name:input.slice(0,32)||"Chat",messages:[],createdAt:new Date().toISOString()},...p]);setCurId(id);setTimeout(()=>doSend(id),50);}
    else doSend(curId);
  };

  const doSend=async(sid)=>{
    // Partition: image files go via multimodal `images` array; text files inlined into message.
    const imageFiles=uploadedFiles.filter(f=>f.kind==="image"&&f.b64);
    const textFiles=uploadedFiles.filter(f=>f.kind!=="image");

    const msg=input.trim()||(uploadedFiles.length?"[Files: "+uploadedFiles.map(f=>f.name).join(", ")+"]":"");
    setInput("");setUploading(false);
    if(inputRef.current)inputRef.current.style.height="auto";
    // capture history BEFORE adding new messages (for Google mode)
    const prevMsgs=(sessions.find(s=>s.id===sid)?.messages||[]).filter(m=>m.content);

    // Build text-file context with a fair TOTAL budget (not per-file).
    // Backend caps `message` field at 2,000,000 chars (Python ChatRequest validator).
    // Reserve ~50K headroom for user text + history + system prompt.
    const TOTAL_FILE_BUDGET=2000000;
    let fileCtx="";
    if(textFiles.length){
      const totalChars=textFiles.reduce((a,f)=>a+(f.text?.length||0),0);
      // If total fits the budget, include everything. Otherwise scale each file proportionally.
      const scale=totalChars>TOTAL_FILE_BUDGET?TOTAL_FILE_BUDGET/totalChars:1;
      fileCtx=textFiles.map(f=>{
        if(!f.text)return "\n\n[File attached: "+f.name+"] (no text extracted)";
        const cap=Math.max(1000,Math.floor((f.text.length)*scale));
        const slice=f.text.slice(0,cap);
        const truncated=cap<f.text.length?`\n[... truncated ${f.text.length-cap} chars]`:"";
        return "\n\n[File: "+f.name+" — "+f.text.length+" chars]\n```\n"+slice+truncated+"\n```";
      }).join("");
    }

    const fullMsg=(msg+fileCtx).trim();
    const fileNames=uploadedFiles.map(f=>(f.kind==="image"?"🖼 ":"📎 ")+f.name);
    const userMsg={role:"user",content:msg+(fileNames.length?"\n\n"+fileNames.join("  "):""),id:mkId(),ts:Date.now()};
    addMsg(sid,userMsg);setUploadedFiles([]);
    const assistantMsg={role:"assistant",content:"",id:mkId(),ts:Date.now()};
    addMsg(sid,assistantMsg);setStreaming(true);

    const controller=new AbortController();abortRef.current=controller;
    // cost helpers
    const calcCost=(mdl,inp,out)=>{const p=MODEL_PRICING[mdl]||[1,4];return(inp*p[0]+out*p[1])/1e6;};
    const estTok=t=>Math.ceil((t||"").length/3.8);
    try{
      const lzk=settings?.laozhangKey||"";
      let endpoint,body,headers={"Content-Type":"application/json"};
      const isGemini3=model.startsWith("gemini-3");
      // images payload shared by both modes: [{b64, mime, name}]
      const imagesPayload=imageFiles.map(f=>({b64:f.b64,mime:f.mime||"image/png",name:f.name}));
      if(apiMode==="google"){
        endpoint="/api/chat/google";
        body=JSON.stringify({message:fullMsg,model,temperature:1.0,
          history:prevMsgs.map(m=>({role:m.role,content:m.content})),
          ...(imagesPayload.length&&{images:imagesPayload}),
          ...(isGemini3&&thinkingLevel&&{thinkingLevel}),
          ...(chatGoogleKey.trim()&&{google_api_key:chatGoogleKey.trim()})});
      }else{
        endpoint=useTools?"/api/chat/agentic":"/api/chat";
        if(lzk)headers["X-LaoZhang-API-Key"]=lzk;
        headers["X-DeepSeek-Route"]=settings?.deepseekRoute||"deepseek";
        body=JSON.stringify({sessionId:sid,message:fullMsg,model,temperature:0.9,
          ...(imagesPayload.length&&{images:imagesPayload}),
          ...(useTools&&{mcpPaths:"",system:"You are a helpful assistant. Use search_files when user asks about documents."})});
      }
      // Attach Clerk auth token (SDK is the reliable source; cookie-scraping fails on dev instances)
      try{
        const _tok = window.__clerkAuth && await window.__clerkAuth.getAuthToken();
        if(_tok) headers["Authorization"] = "Bearer " + _tok;
      }catch(_){}
      const resp=await fetch(endpoint,{method:"POST",headers,signal:controller.signal,body});
      const reader=resp.body.getReader();const decoder=new TextDecoder();
      let buf="",full="",usageInput=0,usageOutput=0;
      // estimate input tokens for LZ mode
      if(apiMode!=="google"){
        const histText=prevMsgs.map(m=>m.content||"").join(" ")+msg;
        usageInput=estTok(histText);
      }
      while(true){
        const{done,value}=await reader.read();if(done)break;
        buf+=decoder.decode(value,{stream:true});
        const lines=buf.split("\n");buf=lines.pop()||"";
        for(const line of lines){
          if(!line.startsWith("data: "))continue;
          const d=line.slice(6);
          if(d==="[DONE]")break;
          if(d.startsWith("[USAGE:")){
            try{const u=JSON.parse(d.slice(7,-1));usageInput=u.input||0;usageOutput=u.output||0;}catch{}
            continue;
          }
          if(d.startsWith("[TOOL_CALL:")||d.startsWith("[TOOL_CALL]")){
            try{const obj=JSON.parse(d.slice(d.indexOf(":")+1,-1));
              updateLast(sid,{content:full,toolEvents:[...(sessions.find(s=>s.id===sid)?.messages?.slice(-1)[0]?.toolEvents||[]),{type:"call",tool:obj.tool||"?",args:obj.args}]});}
            catch{updateLast(sid,{content:full});}
            continue;
          }
          if(d.startsWith("[TOOL_RESULT:")||d.startsWith("[TOOL_RESULT]")){
            try{const obj=JSON.parse(d.slice(d.indexOf(":")+1,-1));
              updateLast(sid,{content:full,toolEvents:[...(sessions.find(s=>s.id===sid)?.messages?.slice(-1)[0]?.toolEvents||[]),{type:"result",tool:obj.tool||"?"}]});}
            catch{updateLast(sid,{content:full});}
            continue;
          }
          if(d.startsWith("[ERROR")){full="⚠️ "+d.replace("[ERROR: ","").replace("]","");break;}
          else {
            // Decode SSE-escaped newlines/backslashes from backend (see laozhang_api.py stream_chat: chunk.replace("\\","\\\\").replace("\n","\\n"))
            // Walk char-by-char to avoid double-decoding (\\n in source must stay as literal \n, not become newline).
            let dec="";
            for(let i=0;i<d.length;i++){
              if(d[i]==="\\"&&i+1<d.length){
                const nx=d[i+1];
                if(nx==="n"){dec+="\n";i++;continue;}
                if(nx==="\\"){dec+="\\";i++;continue;}
              }
              dec+=d[i];
            }
            full+=dec;
          }
        }
        updateLast(sid,{content:full});
      }
      // finalize usage — only estimate if we didn't get real usage from [USAGE:] event
      if(apiMode!=="google"&&!usageOutput)usageOutput=estTok(full);
      if(apiMode!=="google"&&!usageInput)usageInput=estTok(prevMsgs.map(m=>m.content||"").join(" ")+msg);
      const reqCost=calcCost(model,usageInput,usageOutput);
      updateLast(sid,{content:full,usage:{input:usageInput,output:usageOutput,cost:reqCost}});
      setSessionCost(p=>p+reqCost);
    }catch(e){if(e.name!=="AbortError")updateLast(sid,{content:"[Error: "+e.message+"]"});}
    setStreaming(false);abortRef.current=null;
  };

  const stopStream=()=>{abortRef.current?.abort();setStreaming(false);};

  const onKey=e=>{};

  return <div className="chat-layout">
    <div className="chat-sessions">
      <div className="chat-sess-hdr">
        <button className="btn pri" style={{flex:1,padding:"8px",fontSize:12}} onClick={newSession}>{ic.plus} New</button>
      </div>
      <div className="sess-list">
        {sessions.length===0&&<div style={{padding:16,textAlign:"center",color:"var(--tf)",fontSize:12}}>No chats yet</div>}
        {sessions.map(s=><div key={s.id} className={"sess-item "+(s.id===curId?"on":"")} onClick={()=>setCurId(s.id)}>
          <div className="sess-name">{s.name}</div>
          <div className="sess-meta">{s.messages.length} msgs</div>
        </div>)}
      </div>
    </div>
    <div className="chat-main">
      <div className="chat-toolbar">
        <div className="api-toggle">
          <button className={"google "+(apiMode==="google"?"on":"")} onClick={()=>{setApiMode("google");const gm=GOOGLE_CHAT_MODELS.find(m=>m.value===model);if(!gm)setModel("gemini-2.5-flash");}}>🔵 Google</button>
          <button className={"lz "+(apiMode==="laozhang"?"on":"")} onClick={()=>setApiMode("laozhang")}>🟣 LaoZhang</button>
        </div>
        {apiMode==="google"
          ?<select className="inp" style={{width:"auto",padding:"6px 28px 6px 10px",fontSize:12}} value={model} onChange={e=>setModel(e.target.value)}>
              {GOOGLE_CHAT_MODELS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
            </select>
          :<select className="inp" style={{width:"auto",padding:"6px 28px 6px 10px",fontSize:12}} value={model} onChange={e=>setModel(e.target.value)}>
              {CHAT_MODEL_TIERS.map(t=><optgroup key={t.tier} label={t.tier}>
                {t.models.map(m=><option key={m.value} value={m.value}>{m.label} · ${m.price[0]}/${m.price[1]}</option>)}
              </optgroup>)}
            </select>}
        {apiMode==="google"&&GOOGLE_CHAT_MODELS.find(m=>m.value===model)?.gem3&&
          <select className="inp" style={{width:"auto",padding:"6px 24px 6px 8px",fontSize:11.5}} value={thinkingLevel} onChange={e=>setThinkingLevel(e.target.value)} title="Thinking level">
            <option value="">🧠 default</option>
            <option value="minimal">minimal</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>}
        {apiMode==="laozhang"&&<button className={"btn "+(useTools?"pri":"sec")} style={{padding:"6px 10px",fontSize:11.5}} onClick={()=>setUseTools(!useTools)}>
          {ic.folder} MCP {useTools?"ON":"OFF"}
        </button>}
        {apiMode==="laozhang"&&useTools&&<span className="tool-badge">{ic.check} Tools</span>}
        {apiMode==="google"&&<input className="inp mono" type="password"
          placeholder="Gemini key (blank = server .env)"
          value={chatGoogleKey} onChange={e=>setChatGoogleKey(e.target.value)}
          style={{width:180,padding:"5px 9px",fontSize:11.5}}/>}
        {sessionCost>0&&<span style={{marginLeft:"auto",fontSize:10.5,color:"var(--td)",fontFamily:"var(--fm)"}}>
          Session <strong style={{color:sessionCost>0.01?"var(--da)":sessionCost>0.001?"var(--wa)":"var(--su)"}}>
            ${sessionCost<0.0001?"<$0.0001":sessionCost.toFixed(4)}
          </strong>
          <button style={{marginLeft:6,background:"none",border:"none",color:"var(--tf)",cursor:"pointer",fontSize:10}} onClick={()=>setSessionCost(0)} title="Reset">↺</button>
        </span>}
        <div style={{flex:1}}/>
        {cur&&<button className="btn sec" style={{padding:"6px 10px",fontSize:12}} onClick={()=>delSession(curId)}>{ic.trash}</button>}
      </div>
      <div className="chat-messages">
        {!cur&&<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--tf)",flexDirection:"column",gap:12}}>
          {ic.chat}<div style={{fontSize:14,fontWeight:600}}>Start a new chat</div>
        </div>}
        {cur?.messages.map(m=>{
          // Extract <file> blocks from assistant responses
          const { cleaned: _fileCleanedContent, files: _extractedFiles } = m.role === "assistant" ? extractFiles(m.content || "") : { cleaned: m.content || "", files: [] };
          const copyMsg=()=>{navigator.clipboard.writeText(_fileCleanedContent).then(()=>{setCopiedId(m.id);setTimeout(()=>setCopiedId(null),1800);});};
          const dlMsg=()=>{const b=new Blob([_fileCleanedContent],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="response-"+m.id.slice(0,8)+".md";a.click();URL.revokeObjectURL(a.href);};
          return <div key={m.id} className={"msg "+m.role}>
          <div className="msg-wrap" style={{maxWidth:"75%"}}>
            {m.toolEvents&&m.toolEvents.length>0&&<div style={{marginBottom:6}}>
              {m.toolEvents.map((e,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:6,marginBottom:3,
                background:e.type==="call"?"var(--was)":"var(--sus)",
                border:"1px solid "+(e.type==="call"?"color-mix(in srgb,var(--wa) 30%,transparent)":"color-mix(in srgb,var(--su) 30%,transparent)"),
                fontSize:11,fontFamily:"var(--fm)"}}>
                <span>{e.type==="call"?"🔧":"✅"}</span>
                <span style={{color:e.type==="call"?"var(--wa)":"var(--su)",fontWeight:600}}>{e.tool}</span>
                {e.type==="call"&&e.args&&<span style={{color:"var(--tf)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:200}}>{JSON.stringify(e.args)}</span>}
                {e.type==="result"&&<span style={{color:"var(--su)"}}>done</span>}
              </div>)}
            </div>}
            
{(() => {
  if (m.role === "assistant") {
    // 1. Clean \n, strip TOOL logs, AND strip <file> blocks from display
    let cleanedText = _fileCleanedContent
      .replace(/\\n/g, '\n')
      .replace(/\[TOOL_(CALL|RESULT)[\s\S]*?\}\]/g, '');
    
    // During streaming, hide any incomplete <file ...> tag at end of text
    if (streaming) {
      cleanedText = cleanedText.replace(/<file\s[^>]*>[\s\S]*$/i, '');
      cleanedText = cleanedText.replace(/<file\s*$/i, '');
    }
    
    // 2. Parse Markdown
    const rawHtml = marked.parse(cleanedText, { breaks: true, gfm: true });
    
    // 3. Sanitize
    const safeHtml = DOMPurify.sanitize(rawHtml);
    
    return <div className="msg-bubble markdown" dangerouslySetInnerHTML={{ __html: safeHtml }} />;
  } else {
    const userText = (m.content || "").replace(/\\n/g, '\n');
    return <div className="msg-bubble" style={{ whiteSpace: "pre-wrap" }}>{userText}</div>;
  }
})()}

            {/* ── File download chips ── */}
            {_extractedFiles.length > 0 && <div className="file-chips" style={{marginTop:4}}>
              {_extractedFiles.map((f, fi) => {
                const ext = f.name.split('.').pop() || '?';
                const sizeKB = Math.round(new Blob([f.content]).size / 1024);
                return <span key={fi} className="file-chip" title={f.mime + " — " + sizeKB + " KB"} style={{cursor:"pointer"}}
                  onClick={() => downloadExtractedFile(f)}>
                  <span style={{fontSize:14}}>📄</span>
                  <span style={{fontWeight:600}}>{f.name}</span>
                  <span style={{color:"var(--tf)",fontSize:10}}>.{ext} · {sizeKB} KB</span>
                  <span style={{color:"var(--da)",fontSize:13,marginLeft:2}}>⬇</span>
                </span>;
              })}
            </div>}

            {m.role==="assistant"&&m.usage&&<div style={{display:"flex",gap:8,marginTop:3,paddingLeft:2,fontSize:10,fontFamily:"var(--fm)",color:"var(--tf)"}}>
              <span style={{color:m.usage.cost<0.0005?"var(--su)":m.usage.cost<0.005?"var(--wa)":"var(--da)",fontWeight:600}}>
                💰 {m.usage.cost<0.000001?"<$0.000001":"$"+m.usage.cost.toFixed(6)}
              </span>
              <span>↑{m.usage.input} ↓{m.usage.output} tok</span>
            </div>}
            {m.role==="assistant"&&<div className="msg-actions">
              <button className={"msg-action-btn "+(copiedId===m.id?"copied":"")} onClick={copyMsg}>{ic.copy}{copiedId===m.id?"Copied!":"Copy"}</button>
              <button className="msg-action-btn" onClick={dlMsg}>{ic.dload}Download .md</button>
            </div>}
          </div>
        </div>;})}
        {streaming&&<div style={{padding:"4px 8px",color:"var(--td)",fontSize:12}}><span className="spin" style={{display:"inline-block",marginRight:6}}/> Generating…</div>}
        <div ref={msgEndRef}/>
      </div>
      <div className="chat-input-area">
        {uploadedFiles.length>0&&<div className="file-chips">
          {uploadedFiles.map((f,i)=>{
            const isImg=f.kind==="image"&&f.b64;
            return <span key={i} className="file-chip" title={isImg?f.name+" ("+Math.round((f.size_bytes||0)/1024)+" KB)":f.name+" ("+(f.chars||0)+" chars)"}>
              {isImg
                ?<img src={"data:"+(f.mime||"image/png")+";base64,"+f.b64} alt={f.name} style={{width:24,height:24,objectFit:"cover",borderRadius:3,marginRight:2}}/>
                :<span>📎</span>}
              <span style={{maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
              {!isImg&&f.chars>0&&<span style={{color:"var(--tf)",fontSize:10}}>{f.chars>1000?(f.chars/1000).toFixed(1)+"k":f.chars}</span>}
              <button onClick={()=>setUploadedFiles(p=>p.filter((_,k)=>k!==i))}>×</button>
            </span>;
          })}
        </div>}
        <div className="chat-input-wrap">
          <label style={{cursor:"pointer",color:"var(--td)",padding:4}} title="Attach files — images and text (PDF, DOCX, XLSX, code, srt, sql, etc.)">

              accept="image/*,.txt,.md,.csv,.json,.xml,.html,.css,.js,.ts,.jsx,.tsx,.py,.sql,.yaml,.yml,.sh,.bash,.java,.cpp,.c,.h,.go,.rs,.rb,.php,.swift,.kt,.r,.toml,.ini,.env,.log,.conf,.cfg,.tf,.proto,.srt,.vtt,.ass,.ssa,.sub,.graphql,.gql,.vue,.svelte,.astro,.mdx,.tsv,.diff,.patch,.tex,.rst,.org,.pdf,.docx,.xlsx,.xls"
              style={{display:"none"}}
              onChange={e=>{if(e.target.files.length)uploadFiles(Array.from(e.target.files));e.target.value="";}}/>
          </label>
          <textarea className="chat-input" ref={inputRef} value={input} onChange={e=>{setInput(e.target.value);const ta=e.target;ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,300)+"px";}} onKeyDown={onKey} placeholder="Message... (Enter for newline, click Send to submit)" rows={1}/>
          {streaming?<button className="btn pri" style={{padding:"10px 14px"}} onClick={stopStream}>{ic.stop}</button>
            :<button className="btn pri" style={{padding:"10px 14px"}} disabled={!input.trim()&&!uploadedFiles.length} onClick={sendMsg}>{ic.send}</button>}
        </div>
      </div>
    </div>
  </div>;
}

/* ─── IMAGE GEN SECTION ─── */
function ImageSection({settings,showToast}){
  const[models,setModels]=useState([]);
  const[model,setModel]=useState("");
  const[prompt,setPrompt]=useState("");
  const[aspect,setAspect]=useState("16:9");
  const[imageSize,setImageSize]=useState("1K");
  const[refB64,setRefB64]=useState("");
  const[refMime,setRefMime]=useState("");
  const[result,setResult]=useState(null);
  const[busy,setBusy]=useState(false);
  const[apiMode,setApiMode]=useState("laozhang");
  const[gModel,setGModel]=useState("imagen-4.0-fast-generate-001");
  const[imgGoogleKey,setImgGoogleKey]=useState(()=>localStorage.getItem("rc_img_gkey")||"");
  useEffect(()=>{localStorage.setItem("rc_img_gkey",imgGoogleKey);},[imgGoogleKey]);
  const key=settings.laozhangKey||settings.imageKey||"";

  const FALLBACK_MODELS=[
    {id:"sora-image-v1",label:"Sora Image v1"},
    {id:"gpt-image-2",label:"GPT-Image-2"},
    {id:"gpt-4o-image",label:"GPT-4o Image"},
    {id:"flux-kontext-max",label:"Flux Kontext Max"},
    {id:"flux-kontext-pro",label:"Flux Kontext Pro"},
    {id:"nano-banana-hd",label:"Nano Banana HD"},
    {id:"nano-banana-pro",label:"Nano Banana Pro"},
    {id:"seedream-3",label:"SeeDream 3"},
    {id:"seedream-3.0-t2i-250415",label:"SeeDream 3.0"},
  ];
  useEffect(()=>{
    api.imageModels()
      .then(d=>{
        const list=Array.isArray(d)?d:Array.isArray(d?.models)?d.models:[];
        if(list.length){setModels(list);setModel(list[0].id||list[0]);}
        else{setModels(FALLBACK_MODELS);setModel(FALLBACK_MODELS[0].id);}
      })
      .catch(()=>{setModels(FALLBACK_MODELS);setModel(FALLBACK_MODELS[0].id);});
  },[]);

  const setRef=file=>{
    const r=new FileReader();r.onload=e=>{setRefMime(file.type||"image/jpeg");setRefB64(e.target.result.split(",")[1]);};r.readAsDataURL(file);
  };

  // ── Generate image for a single scene ──────────────────────────────
  const regenSceneImage=async(scene,idx)=>{
    const currentImageModel=apiMode==="google"?gImageModel:imageModel;
    const prompt=buildImagePrompt(scene,imgStyle);
    setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:"__loading__"}:s));
    try{
      let b64="";
      if(apiMode==="google"&&!FLOW_LZ_IMG_MODELS.has(currentImageModel)){
        const r=await fetch("/api/flow/storyboard/google",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({scenes:[{...scene,index:0}],model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        b64=(r.images||[])[0]?.image_b64||"";
      }else{
        const r=await fetch("/api/flow/images/native",{method:"POST",
          headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
          body:JSON.stringify({scenes:[{...scene,index:0}],model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        b64=(r.images||[])[0]?.image_b64||"";
      }
      setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:b64||""}:s));
      if(!b64)showToast("Image generated but no preview returned","info");
      else showToast("Scene "+(idx+1)+" image regenerated","ok");
    }catch(e){
      setScenes(prev=>prev.map((s,i)=>i===idx?{...s,image_b64:""}:s));
      showToast("Regen failed: "+e.message,"err");
    }
  };

  // ── Generate images for ALL scenes (or selected) ─────────────────
  const generateAllImages=async()=>{
    if(genAllImgBusy)return;
    const targets=scenes.map((s,i)=>({s,i})).filter(({i})=>sceneImgSel[i]!==false); // all by default
    if(!targets.length)return showToast("No scenes selected","err");
    setGenAllImgBusy(true);
    showToast("Generating "+targets.length+" images…","ok");
    const currentImageModel=apiMode==="google"?gImageModel:imageModel;
    try{
      const scenesPayload=targets.map(({s,i})=>({...s,index:i}));
      let imgMap={};
      if(apiMode==="google"&&!FLOW_LZ_IMG_MODELS.has(currentImageModel)){
        const r=await fetch("/api/flow/storyboard/google",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({scenes:scenesPayload,model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        imgMap=Object.fromEntries((r.images||[]).map(im=>[im.index,im.image_b64]));
      }else{
        const r=await fetch("/api/flow/images/native",{method:"POST",
          headers:{"Content-Type":"application/json","X-Image-API-Key":imgKey},
          body:JSON.stringify({scenes:scenesPayload,model:currentImageModel,aspect_ratio:"16:9",image_style:imgStyle,...(flowGoogleKey.trim()&&{google_api_key:flowGoogleKey.trim()})})
        }).then(x=>x.json());
        imgMap=Object.fromEntries((r.images||[]).map(im=>[im.index,im.image_b64]));
      }
      setScenes(prev=>prev.map((s,i)=>{
        const b64=imgMap[i];
        return b64!==undefined?{...s,image_b64:b64}:s;
      }));
      showToast("Done: "+targets.length+" images generated","ok");
    }catch(e){showToast("Generate all images failed: "+e.message,"err");}
    setGenAllImgBusy(false);
  };

  // ── Submit ALL videos ────────────────────────────────────────────
  const submitAllVeo=async()=>{
    if(genAllVeoBusy)return;
    const hasPicked=Object.keys(videoPicked).length>0;
    const targets=scenes.map((s,i)=>({s,i})).filter(({i})=>{
      if(hasPicked&&!videoPicked[i])return false; // respect AI picks if set
      return !sceneVeo[i]||sceneVeo[i].status==="error";
    });
    if(!targets.length)return showToast(hasPicked?"All picked scenes already submitted":"All scenes already submitted","info");
    setGenAllVeoBusy(true);
    showToast("Submitting "+targets.length+" videos…","ok");
    for(const {s,i} of targets){
      await submitSceneVeo(s,i);
      await new Promise(r=>setTimeout(r,2500)); // pace to stay under upstream rate limits
    }
    setGenAllVeoBusy(false);
    showToast("All videos submitted","ok");
  };

  // ── Poll ALL pending videos ──────────────────────────────────────
  const pollAllVeo=async()=>{
    const pending=Object.entries(sceneVeo).filter(([,v])=>v?.taskId&&v.status!=="succeeded"&&v.status!=="completed"&&v.status!=="error");
    if(!pending.length)return showToast("No pending videos to poll","info");
    await Promise.all(pending.map(([idx,v])=>pollSceneVeo(Number(idx),v.taskId)));
    showToast("Polled "+pending.length+" videos","ok");
  };

  const generate=async()=>{
    if(!prompt.trim())return showToast("Enter a prompt","err");
    setBusy(true);setResult(null);
    try{
      let r;
      if(apiMode==="google"){
        r=await fetch("/api/generate-image/google",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,model:gModel,aspect_ratio:aspect,...(imgGoogleKey.trim()&&{google_api_key:imgGoogleKey.trim()})})}).then(x=>x.json());
      }else{
        r=await api.generateImage({model,prompt,aspect_ratio:aspect,image_size:imageSize,ref_image_b64:refB64,ref_image_mime:refMime},key);
      }
      if(r.error)throw new Error(r.error);
      setResult(r.image_b64||r.url||r.image_url||null);
      if(!r.image_b64&&!r.url&&!r.image_url)showToast("Generated but no preview","info");
    }catch(e){showToast(e.message||"Failed","err");}
    setBusy(false);
  };

  const imgKeySlot=<input className="inp mono" type="password"
    placeholder="Gemini key (blank = server .env)"
    value={imgGoogleKey} onChange={e=>setImgGoogleKey(e.target.value)}
    style={{width:180,padding:"5px 9px",fontSize:11.5}}/>;
  return <div style={{display:"flex",flexDirection:"column",gap:0}}>
    <ApiToggle value={apiMode} onChange={setApiMode} keySlot={imgKeySlot}/>
    <div className="img-layout">
    <div>
      {apiMode==="google"&&<div className="card">
        <div className="lbl">🔵 Google Imagen model</div>
        <select className="inp" value={gModel} onChange={e=>setGModel(e.target.value)}>
          <option value="imagen-4.0-fast-generate-001">Imagen 4.0 Fast</option>
          <option value="imagen-4.0-generate-001">Imagen 4.0 Standard</option>
          <option value="imagen-4.0-ultra-generate-001">Imagen 4.0 Ultra</option>
        </select>

      </div>}
      {apiMode==="laozhang"&&<div className="card">
        <div className="lbl">{ic.image} Model</div>
        <select className="inp" value={model} onChange={e=>setModel(e.target.value)}>
          {models.length===0&&<option value="">Loading models…</option>}
          {models.map((m,i)=><option key={i} value={m.id||m}>{m.label||m.id||m}</option>)}
        </select>
      </div>}
      <div className="card">
        <div className="lbl">{ic.ratio} Aspect · Size</div>
        <div className="row2">
          <select className="inp" value={aspect} onChange={e=>setAspect(e.target.value)}>{ASPECTS.map(a=><option key={a}>{a}</option>)}</select>
          <select className="inp" value={imageSize} onChange={e=>setImageSize(e.target.value)}>{BATCH_SIZES.map(a=><option key={a}>{a}</option>)}</select>
        </div>
      </div>
      <div className="card">
        <div className="lbl">{ic.upload} Reference image</div>
        <div className="ref-drop">
          <div style={{color:"var(--tf)",fontSize:12}}>{refB64?"✅ Image set — click to replace":"Drop or click to upload reference"}</div>
          {refB64&&<img className="ref-thumb" src={`data:${refMime};base64,${refB64}`} alt="ref"/>}
          <input type="file" accept="image/*" onChange={e=>{if(e.target.files[0])setRef(e.target.files[0]);}}/>
        </div>
        {refB64&&<button className="btn sec" style={{marginTop:6,width:"100%",justifyContent:"center"}} onClick={()=>{setRefB64("");setRefMime("");}}>Clear reference</button>}
      </div>
      <div className="card">
        <div className="lbl">{ic.key} Image API key</div>
        <input className="inp mono" type="password" placeholder="Optional — overrides server key" value={settings.imageKey||""} onChange={e=>settings.setImageKey(e.target.value)}/>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div className="card">
        <div className="lbl">{ic.image} Prompt</div>
        <textarea className="inp ta" rows={5} value={prompt} placeholder="Describe the image you want to generate…" onChange={e=>setPrompt(e.target.value)}/>
        <button className="btn pri w lg" style={{marginTop:10}} disabled={busy||!prompt.trim()} onClick={generate}>
          {busy?<><span className="spin"/> Generating…</>:<>{ic.spark} Generate Image</>}
        </button>
      </div>
      <div className="img-result">
        {!result&&!busy&&<div className="img-empty">{ic.image}<div style={{marginTop:8,fontSize:13,color:"var(--td)"}}>Your image will appear here</div></div>}
        {busy&&<div style={{textAlign:"center",color:"var(--td)"}}><span className="spin" style={{width:32,height:32,borderWidth:3,margin:"0 auto 12px",display:"block"}}/><div>Generating…</div></div>}
        {result&&(result.startsWith("http")?<img src={result} alt="generated" style={{maxWidth:"100%",maxHeight:600}}/>:<img src={`data:image/jpeg;base64,${result}`} alt="generated" style={{maxWidth:"100%",maxHeight:600}}/>)}

      </div>
    </div>
  </div>
  </div>;
}

    <div className="vid-card-body" style={{display:"flex",gap:8,alignItems:"center"}}>
