services:
  # ── Python FastAPI: Chat · Image · Veo · Sora · Whisk · Flow ──────────────
  python-api:
    build: ./python
    restart: unless-stopped
    depends_on: [redis]
    environment:
      - LAOZHANG_API_KEY=${LAOZHANG_API_KEY}
      - LAOZHANG_IMAGE_API_KEY=${LAOZHANG_IMAGE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MCP_API_URL=http://mcp:8001
      - QDRANT_URL=http://172.17.0.2:6333
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_POOL_URL=${DATABASE_POOL_URL}
      - DATABASE_POOL_URL_DEV=${DATABASE_POOL_URL_DEV}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CLERK_JWT_ISSUER=${CLERK_JWT_ISSUER}
      # ── Step 3: Sentry (error + perf visibility). Empty = disabled. ──────────
      - SENTRY_DSN_PY=${SENTRY_DSN_PY:-}
      - NODE_ENV=${NODE_ENV:-development}
      # RAG: rank proprietary "rino" source first (rag_narration.py reads this via
      # `os.environ.get(...) or None`, so empty = disabled). Compose pulls it from .env.
      - RAG_PREFER_SOURCE=${RAG_PREFER_SOURCE:-}
      # ── Object storage (Cloudflare R2 / S3-compatible) — Step 2 ───────────
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT:-}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-}
      - STORAGE_REGION=${STORAGE_REGION:-auto}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL:-}
      # ── Step 4: credit metering. METERING_ENABLED=false disables the gate. ──
      - METERING_ENABLED=${METERING_ENABLED:-true}
      - CREDIT_USD_VALUE=${CREDIT_USD_VALUE:-0.01}
      - CREDIT_MARGIN=${CREDIT_MARGIN:-1.0}
      - BILLING_TOPUP_URL=${BILLING_TOPUP_URL:-/index.html#billing}
    volumes:
      # S3/R2 will replace veo & sora outputs (WS3) — mounts removed
      - ./data/narasi_temp:/app/data/narasi_temp
      - ./python/laozhang_api.py:/app/laozhang_api.py
      - ./python/storage.py:/app/storage.py
      - /Users/rino/Documents/ProjectQ/moat:/app/moat
      - hf-cache:/root/.cache/huggingface          # ← persist embedding model
      - ./python/auth_middleware.py:/app/auth_middleware.py
      - ./python/database.py:/app/database.py
      - ./python/redis_client.py:/app/redis_client.py
      - ./python/review_personas.json:/app/review_personas.json
      - ./python/credit_catalog.py:/app/credit_catalog.py    # Step 4: metering
      - ./python/credits.py:/app/credits.py                  # Step 4: balance primitives
      - ./python/metering.py:/app/metering.py                # Step 4: charge gate
    expose: ["8000"]

  # ── MCP File Search (optional — only starts with --profile mcp) ───────────
  mcp:
    build:
      context: ./python
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    environment:
      - LAOZHANG_API_KEY=${LAOZHANG_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MCP_SEARCH_MODE=${MCP_SEARCH_MODE:-bm25}
    volumes:
      - ${MCP_FOLDER:-./mcp-folder}:/mcp-folder:ro
    expose: ["8001"]
    profiles: ["mcp"]

  # ── Node.js: Batch Images · TTS · Imagen + proxy to Python API ───────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on: [python-api]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LAOZHANG_IMAGE_API_KEY=${LAOZHANG_IMAGE_API_KEY:-}
      - LAOZHANG_API_KEY=${LAOZHANG_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PYTHON_API_URL=http://python-api:8000
      - MCP_API_URL=http://mcp:8001
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_POOL_URL=${DATABASE_POOL_URL}
      - DATABASE_POOL_URL_DEV=${DATABASE_POOL_URL_DEV}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      # ── Step 3: Sentry (error + perf visibility). Empty = disabled. ──────────
      - SENTRY_DSN_NODE=${SENTRY_DSN_NODE:-}
      - REDIS_URL=${REDIS_URL}
      # ── Object storage (Cloudflare R2 / S3-compatible) — Step 2 ───────────
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT:-}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-}
      - STORAGE_REGION=${STORAGE_REGION:-auto}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL:-}
      # ── Step 4: Stripe billing + credit metering. Empty = gate off / Stripe disabled. ──
      - METERING_ENABLED=${METERING_ENABLED:-true}
      - CREDIT_USD_VALUE=${CREDIT_USD_VALUE:-0.01}
      - CREDIT_MARGIN=${CREDIT_MARGIN:-1.0}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - STRIPE_PRICE_STUDIO=${STRIPE_PRICE_STUDIO:-}
      - STRIPE_PRICE_PACK_SMALL=${STRIPE_PRICE_PACK_SMALL:-}
      - STRIPE_PRICE_PACK_MEDIUM=${STRIPE_PRICE_PACK_MEDIUM:-}
      - STRIPE_PRICE_PACK_LARGE=${STRIPE_PRICE_PACK_LARGE:-}
      - STRIPE_PACK_SMALL_CREDITS=${STRIPE_PACK_SMALL_CREDITS:-1000}
      - STRIPE_PACK_MEDIUM_CREDITS=${STRIPE_PACK_MEDIUM_CREDITS:-5000}
      - STRIPE_PACK_LARGE_CREDITS=${STRIPE_PACK_LARGE_CREDITS:-15000}
      - STRIPE_CHECKOUT_SUCCESS_URL=${STRIPE_CHECKOUT_SUCCESS_URL:-}
      - STRIPE_CHECKOUT_CANCEL_URL=${STRIPE_CHECKOUT_CANCEL_URL:-}
      - STRIPE_PORTAL_RETURN_URL=${STRIPE_PORTAL_RETURN_URL:-}
    volumes:
      # S3/R2 will replace batch, tts & imgs outputs (WS3) — mounts removed
      - /Users/rino/Documents/ProjectQ/moat:/app/moat
      - ./data/narasi_temp:/app/narasi_temp
      - ./data/output:/app/output
      - ./backend/server.js:/app/server.js
      - ./backend/instrument.mjs:/app/instrument.mjs
      - ./backend/storage.mjs:/app/storage.mjs
      - ./backend/auth.js:/app/auth.js
      - ./backend/db.js:/app/db.js
      - ./backend/billing.mjs:/app/billing.mjs              # Step 4: Stripe billing
    expose: ["3000"]

  # ── nginx: serve UI + reverse-proxy all /api ─────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/public:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD","wget","-q","-O","/dev/null","http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis: cancel flags + live job progress ──────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose: ["6379"]

# ── Named volumes ──────────────────────────────────────────────────────────
volumes:
  hf-cache:                                         # survives container rebuilds
