services:
  # в”Ђв”Ђ Python FastAPI: Chat В· Image В· Veo В· Sora В· Whisk В· Flow в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  python-api:
    build: ./python
    restart: unless-stopped
    depends_on: [redis]
    environment:
      - LAOZHANG_API_KEY=${LAOZHANG_API_KEY}
      - LAOZHANG_IMAGE_API_KEY=${LAOZHANG_IMAGE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MCP_API_URL=http://mcp:8001
      - QDRANT_URL=http://172.17.0.2:6333
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_POOL_URL=${DATABASE_POOL_URL}
      - DATABASE_POOL_URL_DEV=${DATABASE_POOL_URL_DEV}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CLERK_JWT_ISSUER=${CLERK_JWT_ISSUER}
      # в”Ђв”Ђ Step 6: trusted internal auth for the video worker (per-scene metering+RLS). Empty = disabled. в”Ђв”Ђ
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-}
      # в”Ђв”Ђ Step 3: Sentry (error + perf visibility). Empty = disabled. в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - SENTRY_DSN_PY=${SENTRY_DSN_PY:-}
      - NODE_ENV=${NODE_ENV:-development}
      # RAG: rank proprietary "rino" source first (rag_narration.py reads this via
      # `os.environ.get(...) or None`, so empty = disabled). Compose pulls it from .env.
      - RAG_PREFER_SOURCE=${RAG_PREFER_SOURCE:-}
      # в”Ђв”Ђ Object storage (Cloudflare R2 / S3-compatible) вЂ” Step 2 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT:-}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-}
      - STORAGE_REGION=${STORAGE_REGION:-auto}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL:-}
      # в”Ђв”Ђ Step 4: credit metering. METERING_ENABLED=false disables the gate. в”Ђв”Ђ
      - METERING_ENABLED=${METERING_ENABLED:-true}
      - CREDIT_USD_VALUE=${CREDIT_USD_VALUE:-0.01}
      - CREDIT_MARGIN=${CREDIT_MARGIN:-1.0}
      - BILLING_TOPUP_URL=${BILLING_TOPUP_URL:-/index.html#billing}
    volumes:
      # S3/R2 will replace veo & sora outputs (WS3) вЂ” mounts removed
      - ./data/narasi_temp:/app/data/narasi_temp
      - ./python/laozhang_api.py:/app/laozhang_api.py
      - ./python/storage.py:/app/storage.py
      - /Users/rino/Documents/ProjectQ/moat:/app/moat
      - hf-cache:/root/.cache/huggingface          # в†ђ persist embedding model
      - ./python/auth_middleware.py:/app/auth_middleware.py
      - ./python/database.py:/app/database.py
      - ./python/redis_client.py:/app/redis_client.py
      - ./python/review_personas.json:/app/review_personas.json
      - ./python/credit_catalog.py:/app/credit_catalog.py    # Step 4: metering
      - ./python/credits.py:/app/credits.py                  # Step 4: balance primitives
      - ./python/metering.py:/app/metering.py                # Step 4: charge gate
      - ./python/admin_credits.py:/app/admin_credits.py      # Step 4: manual credit admin CLI
      - ./python/video_segmenter.py:/app/video_segmenter.py  # Step 6: scene segmenter (/video/* routes)
    expose: ["8000"]

  # в”Ђв”Ђ MCP File Search (optional вЂ” only starts with --profile mcp) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  mcp:
    build:
      context: ./python
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    environment:
      - LAOZHANG_API_KEY=${LAOZHANG_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MCP_SEARCH_MODE=${MCP_SEARCH_MODE:-bm25}
    volumes:
      - ${MCP_FOLDER:-./mcp-folder}:/mcp-folder:ro
    expose: ["8001"]
    profiles: ["mcp"]

  # в”Ђв”Ђ Node.js: Batch Images В· TTS В· Imagen + proxy to Python API в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on: [python-api]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LAOZHANG_IMAGE_API_KEY=${LAOZHANG_IMAGE_API_KEY:-}
      - LAOZHANG_API_KEY=${LAOZHANG_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PYTHON_API_URL=http://python-api:8000
      - MCP_API_URL=http://mcp:8001
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_POOL_URL=${DATABASE_POOL_URL}
      - DATABASE_POOL_URL_DEV=${DATABASE_POOL_URL_DEV}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      # в”Ђв”Ђ Step 3: Sentry (error + perf visibility). Empty = disabled. в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - SENTRY_DSN_NODE=${SENTRY_DSN_NODE:-}
      - REDIS_URL=${REDIS_URL}
      # в”Ђв”Ђ Object storage (Cloudflare R2 / S3-compatible) вЂ” Step 2 в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT:-}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-}
      - STORAGE_REGION=${STORAGE_REGION:-auto}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL:-}
      # в”Ђв”Ђ Step 4: Stripe billing + credit metering. Empty = gate off / Stripe disabled. в”Ђв”Ђ
      - METERING_ENABLED=${METERING_ENABLED:-true}
      - CREDIT_USD_VALUE=${CREDIT_USD_VALUE:-0.01}
      - CREDIT_MARGIN=${CREDIT_MARGIN:-1.0}
      - ADMIN_API_SECRET=${ADMIN_API_SECRET:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_STARTER=${STRIPE_PRICE_STARTER:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - STRIPE_PRICE_STUDIO=${STRIPE_PRICE_STUDIO:-}
      - STRIPE_PRICE_PACK_SMALL=${STRIPE_PRICE_PACK_SMALL:-}
      - STRIPE_PRICE_PACK_MEDIUM=${STRIPE_PRICE_PACK_MEDIUM:-}
      - STRIPE_PRICE_PACK_LARGE=${STRIPE_PRICE_PACK_LARGE:-}
      - STRIPE_PACK_SMALL_CREDITS=${STRIPE_PACK_SMALL_CREDITS:-1000}
      - STRIPE_PACK_MEDIUM_CREDITS=${STRIPE_PACK_MEDIUM_CREDITS:-5000}
      - STRIPE_PACK_LARGE_CREDITS=${STRIPE_PACK_LARGE_CREDITS:-15000}
      - STRIPE_CHECKOUT_SUCCESS_URL=${STRIPE_CHECKOUT_SUCCESS_URL:-}
      - STRIPE_CHECKOUT_CANCEL_URL=${STRIPE_CHECKOUT_CANCEL_URL:-}
      - STRIPE_PORTAL_RETURN_URL=${STRIPE_PORTAL_RETURN_URL:-}
    volumes:
      # S3/R2 will replace batch, tts & imgs outputs (WS3) вЂ” mounts removed
      - /Users/rino/Documents/ProjectQ/moat:/app/moat
      - ./data/narasi_temp:/app/narasi_temp
      - ./data/output:/app/output
      - ./backend/server.js:/app/server.js
      - ./backend/instrument.mjs:/app/instrument.mjs
      - ./backend/storage.mjs:/app/storage.mjs
      - ./backend/auth.js:/app/auth.js
      - ./backend/db.js:/app/db.js
      - ./backend/billing.mjs:/app/billing.mjs              # Step 4: Stripe billing
      - ./backend/video:/app/video                          # Step 6: video engine (enqueue-only routes)
    expose: ["3000"]

  # в”Ђв”Ђ Video assembly workers (Step 6): audio В· visual В· check В· stitch (BullMQ) в”Ђв”Ђ
  # A SEPARATE process from the API so ffmpeg/generation never touch the API event
  # loop (the Step 3 discipline). Scales independently; share the same Redis + R2.
  video-worker:
    build: ./backend
    restart: unless-stopped
    depends_on: [redis, python-api]
    command: ["node", "video/worker-entry.mjs"]
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - PYTHON_API_URL=http://python-api:8000
      - NODE_ENV=${NODE_ENV:-development}
      # trusted server-to-server auth so per-scene calls carry tenant context
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET:-}
      - VIDEO_TTS_AUDIO_PATH=${VIDEO_TTS_AUDIO_PATH:-/video/tts/scene}
      - VIDEO_SYNTHETIC=${VIDEO_SYNTHETIC:-}
      - VIDEO_WIDTH=${VIDEO_WIDTH:-1920}
      - VIDEO_HEIGHT=${VIDEO_HEIGHT:-1080}
      - VIDEO_FPS=${VIDEO_FPS:-30}
      - VIDEO_PRESET=${VIDEO_PRESET:-medium}
      - VIDEO_AUDIO_CONCURRENCY=${VIDEO_AUDIO_CONCURRENCY:-10}
      - VIDEO_VISUAL_CONCURRENCY=${VIDEO_VISUAL_CONCURRENCY:-10}
      - VIDEO_STITCH_CONCURRENCY=${VIDEO_STITCH_CONCURRENCY:-2}
      # R2 (same bucket) so workers upload scene assets + the final MP4
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT:-}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-}
      - STORAGE_REGION=${STORAGE_REGION:-auto}
    volumes:
      - ./backend/video:/app/video
      - ./backend/storage.mjs:/app/storage.mjs

  # в”Ђв”Ђ nginx: serve UI + reverse-proxy all /api в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/public:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD","wget","-q","-O","/dev/null","http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # в”Ђв”Ђ Redis: cancel flags + live job progress в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose: ["6379"]

# в”Ђв”Ђ Named volumes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
volumes:
  hf-cache:                                         # survives container rebuilds
