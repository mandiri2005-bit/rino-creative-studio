# ============================================================================
# eval/golden_set.yaml — FROZEN golden set for the RAG eval gate (Step 0.2)
# Rino Creative Studio
# ============================================================================
# 25 curated documentary topics. Once committed in Step 0.2, DO NOT edit:
# every later measurement (recall@k, output rubric) runs against this exact
# set. A SHA256 of this file is stored in the frozen baseline (Step 0.4), so
# any silent change is caught the next time the gate runs.
#
# Fields per entry
#   id            unique slug — stable identifier carried across every run
#   topic         the documentary topic fed to retrieval + both gen paths
#   style         one of the 12 VERIFIED Qdrant style_label values only:
#                   conversational  epic         unlabeled   biographical
#                   expository      discovery    political   reflective
#                   lyrical         financial    suspense    dramatic
#   lang          output language: 'id' or 'en'
#   prefer_source true -> retrieval prioritises source='rino' passages.
#                 Set ONLY on styles where rino content is thick
#                 (epic 1091 · expository 295 · political 141 · discovery 41).
#
# Locked distribution
#   total          25
#   language       15 id · 10 en
#   prefer_source  6 true (all id) · 19 false
#   true styles    epic ×2 · expository ×2 · political ×1 · discovery ×1
#   coverage       all 12 style labels exercised at least once
# ============================================================================

